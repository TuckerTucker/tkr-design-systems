<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <!-- Editorial dashboard — desktop 1280×800
       grammar_family: contemporary_clean, elevation.strategy: paper_tiers
       Sidebar 280px + main 1000px on cream paper.
  -->

  <!-- Page background: cream paper -->
  <rect x="0" y="0" width="1280" height="800" fill="#F8F4EC"/>

  <!-- ════════════════════════════════════════════════════════════
       SIDEBAR
       ════════════════════════════════════════════════════════════ -->

  <!-- Brand: serif title -->
  <text x="16" y="40"
        font-family="Fraunces, Georgia, serif"
        font-size="24"
        font-weight="700"
        fill="#1A1614"
        letter-spacing="-0.48">Editorial</text>

  <!-- Volume/issue overline: tracked Inter uppercase, burgundy -->
  <text x="16" y="58"
        font-family="Inter, system-ui, sans-serif"
        font-size="9"
        font-weight="600"
        fill="#8B1E2D"
        letter-spacing="1.44">VOL. I · NO. 04 · APRIL</text>

  <!-- 3px double burgundy rule (masthead rule per grammar_extensions) -->
  <line x1="16" y1="76" x2="264" y2="76" stroke="#8B1E2D" stroke-width="1"/>
  <line x1="16" y1="80" x2="264" y2="80" stroke="#8B1E2D" stroke-width="1"/>

  <!-- Search input: Fraunces italic placeholder, 1px hairline rule below -->
  <text x="16" y="108"
        font-family="Fraunces, Georgia, serif"
        font-size="12"
        font-style="italic"
        font-weight="400"
