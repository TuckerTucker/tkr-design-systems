  <rect x="0" y="152" width="280" height="90" fill="#F1ECDF"/>
  <text x="16" y="174"
        font-family="Inter, system-ui, sans-serif"
        font-size="9"
        font-weight="600"
        fill="#8B7D6F"
        letter-spacing="1.44">2M AGO · DISPATCH</text>
  <text x="264" y="174"
        font-family="Fraunces, Georgia, serif"
        font-size="11"
        font-weight="700"
        fill="#8B1E2D"
