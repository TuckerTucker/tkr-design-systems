spec_version: "0.2"

system:
  id: wireframe
  name: Wireframe
  tagline: "Neutral Greyscale Reference Library"
  grammar_family: wireframe
  version: "1.1.0"   # bumped: v0.2 migration adds check_scope on all rules
  source_jsx: null  # The wireframe library has no React source; the existing
                    # template SVGs and UNIVERSAL-WIREFRAMING-PROCESS.md are
                    # the canonical reference materials.

# ────────────────────────────────────────────────────────────────────
# TOKENS — adopted from the existing wireframe-skill (validated across 46+ wireframes)
# ────────────────────────────────────────────────────────────────────

tokens:
  colors:
    page_bg: "#F5F5F5"
    surface: "#FFFFFF"
    surface_elevated: "#FFFFFF"
    text_primary: "#212121"
    text_secondary: "#757575"
    text_muted: "#BDBDBD"
    accent: "#424242"

    palette:
      - name: background
        value: "#F5F5F5"
        role: page fill
        usage_constraint: "the only page background; use surface (#FFFFFF) for elevated content"

      - name: surface
        value: "#FFFFFF"
        role: cards, panels, headers, modals
        usage_constraint: "any container above the page background"

      - name: border
        value: "#E0E0E0"
        role: outlines, dividers, subtle separation
        usage_constraint: "1px stroke for component boundaries"

      - name: disabled
        value: "#BDBDBD"
        role: placeholder text, inactive elements, disabled states
        usage_constraint: "text and shapes that should read as 'not currently usable'"

      - name: secondary
        value: "#757575"
        role: subtitles, labels, help text, metadata
        usage_constraint: "secondary text hierarchy below body copy"

      - name: interactive
        value: "#424242"
        role: button fills, active states, links
        usage_constraint: "the primary 'do something' color in the system"

      - name: primary_text
        value: "#212121"
        role: headings, body copy
        usage_constraint: "primary content text; the strongest text value"

      - name: inverse
        value: "#FFFFFF"
        role: text on dark fills (e.g. on interactive #424242)
        usage_constraint: "only on dark surfaces; equivalent to surface in fills"

      - name: success
        value: "#2E7D32"
        role: positive status, success states
        usage_constraint: "semantic color — use only for success communication"

      - name: warning
        value: "#E65100"
        role: caution status, warning states
        usage_constraint: "semantic color — use only for warning communication"

      - name: danger
        value: "#B71C1C"
        role: error status, destructive actions
        usage_constraint: "semantic color — use only for negative/critical communication"

      - name: info
        value: "#1565C0"
        role: informational status, info banners
        usage_constraint: "semantic color — use only for neutral informational signals"

  typography:
    families:
      - id: structural
        stack: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        role: every text element in the system
        mixing_rule: "system font stack — wireframes deliberately do not commit to a typeface"
      - id: mono
        stack: "'SF Mono', 'Monaco', 'Consolas', monospace"
        role: tokens, technical labels, code excerpts
        mixing_rule: "use sparingly — only for content that's genuinely tabular or code-like"

    scale:
      - { size: 11, role: caption }       # fine print
      - { size: 12, role: label }         # metadata, badges, captions
      - { size: 13, role: secondary }     # supporting text
      - { size: 14, role: body }          # primary content
      - { size: 16, role: heading }       # section headings
      - { size: 18, role: title }         # page headings (larger size; 16-18 range)
      - { size: 24, role: display }       # dashboard metrics, hero numbers

    case:
      metadata: uppercase
      body: mixed
      headers: mixed

    tracking:
      metadata: 0.05  # em — light tracking on uppercase metadata for legibility
      body: 0
      headers: 0

  spacing:
    grid_unit: 4
    allowed_steps: [4, 8, 12, 16, 20, 24, 32, 40, 48, 64]
    enforcement: relaxed
    page_margin:
      mobile: 12   # px from edge
      desktop: 32
    component_gap: 12
    section_gap: 32

  borders:
    radius_default: 6
    radius_inputs: 6
    radius_chrome: 8

  elevation:
    strategy: borders_only
    config:
      border_light: { width: 1, color: "#E0E0E0", style: solid }
      border_strong: { width: 1.5, color: "#E0E0E0", style: solid }
      no_shadow: true
      no_radius_bias: false   # wireframes use modest radius (4-8px); not aggressive

# ────────────────────────────────────────────────────────────────────
# COMPONENTS — 42 total (12 Primitives + 18 Composites + 12 Patterns)
# Each component declares: tier, anatomy, variants (with svg path),
# composed_of (composites and patterns only), and constraints.
# ────────────────────────────────────────────────────────────────────

components:

  # ═══════════════════════ PRIMITIVES (12) ═══════════════════════

  button:
    tier: primitive
    anatomy: [label, icon]
    variants:
      - id: primary
        svg: components/button-primary.svg
        rendering_notes: "48px tall, 6px radius, fill #424242 (interactive), text in #FFFFFF (inverse) at 14-15px weight 500. Used for the screen's primary action."
        states: [default, hover, active, disabled]
      - id: secondary
        svg: components/button-secondary.svg
        rendering_notes: "48px tall, 6px radius, fill #FFFFFF (surface), 1.5px stroke #E0E0E0, text in #757575 (secondary) at 14-15px weight 500. Used for secondary actions."
        states: [default, hover, active, disabled]
      - id: ghost
        svg: components/button-ghost.svg
        rendering_notes: "48px tall, 6px radius, transparent fill, no border, text in #757575 (secondary) at 14-15px weight 500. Used for tertiary actions."
        states: [default, hover, active]
      - id: disabled
        svg: components/button-disabled.svg
        rendering_notes: "48px tall, 6px radius, fill #E0E0E0 (border color used as disabled bg), text in #BDBDBD (disabled). Visually unactionable."
        states: [disabled]
      - id: danger
        svg: components/button-danger.svg
        rendering_notes: "48px tall, 6px radius, fill #B71C1C (danger), text in #FFFFFF. Reserved for destructive actions."
        states: [default, hover, active]
      - id: small
        svg: components/button-small.svg
        rendering_notes: "32px tall, 6px radius. Variant of primary at smaller size."
        states: [default, hover, active, disabled]
      - id: large
        svg: components/button-large.svg
        rendering_notes: "56px tall, 8px radius. Variant of primary at larger size for hero CTAs."
        states: [default, hover, active, disabled]
      - id: full_width
        svg: components/button-full-width.svg
        rendering_notes: "48px tall, 6px radius, full width minus page margins. Variant of primary for mobile primary actions."
        states: [default, hover, active, disabled]
    constraints:
      - "Primary button is the screen's PRIMARY action — only one per screen"
      - "Danger button is for irreversible destructive actions only (delete, discard)"
      - "Disabled button is visually distinct from ghost button (filled #E0E0E0 vs transparent)"

  input:
    tier: primitive
    anatomy: [placeholder, value, focus_indicator, clear_action]
    variants:
      - id: text
        svg: components/input-text.svg
        rendering_notes: "48px tall, 6px radius, fill #FFFFFF, 1.5px stroke #E0E0E0, placeholder in #BDBDBD, value in #212121."
        states: [default, focus, filled, error, disabled]
      - id: password
        svg: components/input-password.svg
        rendering_notes: "Same as text but value rendered as bullets (••••••••)."
        states: [default, focus, filled, error]
      - id: search
        svg: components/input-search.svg
        rendering_notes: "Same as text with search icon prefix and optional clear button suffix."
        states: [default, focus, filled]
      - id: numeric
        svg: components/input-numeric.svg
        rendering_notes: "Same as text but value right-aligned for numeric content."
        states: [default, focus, filled]
    constraints:
      - "Inputs always have a label associated (use form_field composite for labeled inputs)"
      - "Placeholder text uses #BDBDBD (disabled), value uses #212121 (primary text) — strong contrast"

  textarea:
    tier: primitive
    anatomy: [placeholder, value, resize_handle]
    variants:
      - id: default
        svg: components/textarea-default.svg
        rendering_notes: "Variable height starting at 96px (3 lines), 6px radius, fill #FFFFFF, 1.5px stroke #E0E0E0. Resize handle at bottom-right."
        states: [default, focus, filled, error, disabled]
      - id: auto_grow
        svg: components/textarea-auto-grow.svg
        rendering_notes: "Same as default but no resize handle; meant to grow with content."
        states: [default, focus, filled]

  select:
    tier: primitive
    anatomy: [label, current_value, indicator]
    variants:
      - id: dropdown
        svg: components/select-dropdown.svg
        rendering_notes: "48px tall, 6px radius, fill #FFFFFF, 1.5px stroke #E0E0E0, current value in #212121, chevron indicator in #757575 on right."
        states: [default, open, focus, disabled]
      - id: native
        svg: components/select-native.svg
        rendering_notes: "Same visual treatment as dropdown; differs in being a native HTML <select> in implementation."
        states: [default, open, disabled]

  checkbox:
    tier: primitive
    anatomy: [box, check_mark, label]
    variants:
      - id: default
        svg: components/checkbox-default.svg
        rendering_notes: "20x20 box with 4px radius, 1.5px stroke #E0E0E0 when unchecked. When checked: fill #424242, white check mark inside."
        states: [unchecked, checked, disabled]
      - id: indeterminate
        svg: components/checkbox-indeterminate.svg
        rendering_notes: "Same as checked but with horizontal line instead of check mark. Used for parent of partially-selected children."
        states: [indeterminate]

  radio:
    tier: primitive
    anatomy: [circle, dot, label]
    variants:
      - id: default
        svg: components/radio-default.svg
        rendering_notes: "20x20 circle, 1.5px stroke #E0E0E0 when unselected. When selected: stroke #424242, inner 8px dot in #424242."
        states: [unselected, selected, disabled]

  toggle:
    tier: primitive
    anatomy: [track, thumb, label]
    variants:
      - id: default
        svg: components/toggle-default.svg
        rendering_notes: "44x24 track with 12px radius. When off: fill #E0E0E0, thumb on left. When on: fill #424242, thumb on right. Thumb is 20x20 white circle."
        states: [off, on, disabled]

  label:
    tier: primitive
    anatomy: [text, marker]
    variants:
      - id: default
        svg: components/label-default.svg
        rendering_notes: "Inline text label. 12-14px depending on context, color #757575 (secondary) typically."
        states: [default]
      - id: required
        svg: components/label-required.svg
        rendering_notes: "Same as default with red asterisk (*) in #B71C1C suffixed."
        states: [default]
      - id: optional
        svg: components/label-optional.svg
        rendering_notes: "Same as default with '(optional)' in #BDBDBD suffixed."
        states: [default]

  icon:
    tier: primitive
    anatomy: [glyph]
    variants:
      - id: outlined
        svg: components/icon-outlined.svg
        rendering_notes: "16x16 viewBox standard. Outlined icons drawn as 1.5px strokes in current color, no fills. Typical icons: chevron, search, close, plus, more (⋯), back arrow."
        states: [default, disabled]
      - id: filled
        svg: components/icon-filled.svg
        rendering_notes: "16x16 viewBox standard. Filled icons in solid current color. Used when emphasis or active state needs distinction."
        states: [default, disabled]
    constraints:
      - "Icons in wireframes are functional placeholders, not branded glyphs — keep them generic"
      - "Use 16x16 standard size; smaller (12x12) and larger (24x24) variants permitted with the same proportions"

  avatar:
    tier: primitive
    anatomy: [identifier, status_dot]
    variants:
      - id: monogram
        svg: components/avatar-monogram.svg
        rendering_notes: "32x32 circle, fill #E0E0E0 (border color), 2-letter initials in #757575 weight 600. Default avatar variant for unknown identity."
        states: [default, with_status]
      - id: photo_placeholder
        svg: components/avatar-photo-placeholder.svg
        rendering_notes: "32x32 circle with diagonal stripe pattern indicating photo placeholder. Fill #E0E0E0."
        states: [default, with_status]
      - id: index
        svg: components/avatar-index.svg
        rendering_notes: "No avatar, just a numerical identifier (e.g. 01, 02). Used in numbered lists instead of pictographic identity."
        states: [default]
      - id: none
        svg: components/avatar-none.svg
        rendering_notes: "Empty placeholder — no visual representation. For systems where identity is established by position or label only."
        states: [default]

  badge:
    tier: primitive
    anatomy: [text, shape]
    variants:
      - id: count
        svg: components/badge-count.svg
        rendering_notes: "Small pill (16-20px tall, 10px radius), fill #424242 (interactive), white digit in 11px weight 600. Used for unread counts, notification counts."
        states: [default]
      - id: status
        svg: components/badge-status.svg
        rendering_notes: "Pill (20px tall, 10px radius), fill is one of semantic colors (success/warning/danger/info), white text label in 10px weight 600 uppercase."
        states: [default]
      - id: tag
        svg: components/badge-tag.svg
        rendering_notes: "Pill (20px tall, 10px radius), fill #FFFFFF, 1px stroke #E0E0E0, text label in #757575 12px. Used for category tags."
        states: [default]
      - id: dot
        svg: components/badge-dot.svg
        rendering_notes: "Small circle (8px diameter), filled with semantic color. Status indicator without text."
        states: [default]

  divider:
    tier: primitive
    anatomy: [line]
    variants:
      - id: hairline
        svg: components/divider-hairline.svg
        rendering_notes: "1px line in #E0E0E0. Subtle separator between content within a single section."
        states: [default]
      - id: default
        svg: components/divider-default.svg
        rendering_notes: "1px line in #E0E0E0. Standard separator between distinct content."
        states: [default]
      - id: strong
        svg: components/divider-strong.svg
        rendering_notes: "1.5px line in #757575 (secondary). Used to separate major regions."
        states: [default]
      - id: dashed
        svg: components/divider-dashed.svg
        rendering_notes: "1px dashed line in #E0E0E0 (stroke-dasharray='4,4'). Used for placeholder regions or 'add new' affordances."
        states: [default]
      - id: section
        svg: components/divider-section.svg
        rendering_notes: "1px line in #E0E0E0 with 32px vertical margin above/below. Separates major page sections."
        states: [default]


  # ═══════════════════════ COMPOSITES (18) ═══════════════════════

  card:
    tier: composite
    composed_of: [divider]   # cards may use dividers internally
    anatomy: [container, content_area, border]
    variants:
      - id: default
        svg: components/card-default.svg
        rendering_notes: "Container 6px radius, fill #FFFFFF, 1px stroke #E0E0E0. Internal padding 16px. Variable height based on content."
        states: [default, hover, selected]
      - id: with_header
        svg: components/card-with-header.svg
        rendering_notes: "Same as default but with title bar at top (40px tall), title in 14px #212121 weight 600, separated from content by 1px hairline divider."
        states: [default, hover]
      - id: interactive
        svg: components/card-interactive.svg
        rendering_notes: "Same as default but with subtle hover affordance (1.5px stroke instead of 1px). Used when whole card is a click target."
        states: [default, hover, active]
      - id: selected
        svg: components/card-selected.svg
        rendering_notes: "Same as default but stroke is 2px #424242 (interactive). Indicates the card is currently selected."
        states: [selected]
      - id: empty
        svg: components/card-empty.svg
        rendering_notes: "Same dimensions as default, dashed border (#E0E0E0 stroke-dasharray='4,4'), centered '+ Add new' label in #757575."
        states: [default, hover]
      - id: disabled
        svg: components/card-disabled.svg
        rendering_notes: "Same as default with content faded — text in #BDBDBD, indicating non-interactive."
        states: [disabled]
    constraints:
      - "Cards are the universal container — use them for any distinct content with a boundary"
      - "Card padding is consistent at 16px in all directions; component_gap (12px) for sub-elements"

  list_item:
    tier: composite
    composed_of: [avatar, label, badge, divider]
    anatomy: [avatar, title, preview, timestamp, action_indicator, badge]
    variants:
      - id: default
        svg: components/list-item-default.svg
        rendering_notes: "64-96px tall, full width minus page margins. Avatar (32px) on left, title (14px #212121 weight 500) and preview (12px #757575) stacked. Timestamp top-right (11px #757575). Optional badge on right. Hairline divider below."
        states: [default, hover, selected]
      - id: selected
        svg: components/list-item-selected.svg
        rendering_notes: "Same as default with #F5F5F5 background fill and title weight bumps to 600. NO accent bar (wireframes don't have a hero accent color); selection signaled by surface fill alone."
        states: [selected]
      - id: compact
        svg: components/list-item-compact.svg
        rendering_notes: "Same anatomy as default but 48px tall — single line of content (title + timestamp), no preview line."
        states: [default, hover, selected]
      - id: with_action
        svg: components/list-item-with-action.svg
        rendering_notes: "Same as default with secondary action button (e.g. ⋯ menu) on far right after the badge area."
        states: [default, hover]
      - id: with_metadata
        svg: components/list-item-with-metadata.svg
        rendering_notes: "Same as default with additional metadata row (12px #757575) below the preview — e.g. category tags, status indicators."
        states: [default, hover, selected]
    constraints:
      - "Preview text yields horizontal space to badge: minimum 12px gap before badge's left edge. Truncate with ellipsis."
      - "Selection signaled by background surface fill (#F5F5F5), never by colored accent bar (wireframes have no accent color)"

  form_field:
    tier: composite
    composed_of: [label, input, textarea, select, checkbox, radio, toggle]
    anatomy: [label, input_element, help_text, error_message]
    variants:
      - id: default
        svg: components/form-field-default.svg
        rendering_notes: "Label above input (12px #757575, 4px gap), input element below (varies by type), optional 11px #757575 help text below input."
        states: [default, focus, filled, error, disabled]
      - id: inline
        svg: components/form-field-inline.svg
        rendering_notes: "Label and input on same line. Used for compact forms — checkboxes, toggles, short text inputs."
        states: [default, focus, error]
      - id: with_help
        svg: components/form-field-with-help.svg
        rendering_notes: "Default plus visible 11px help text in #757575 below input."
        states: [default, focus, filled]
      - id: with_error
        svg: components/form-field-with-error.svg
        rendering_notes: "Default with input border in #B71C1C (danger) and 11px error message in #B71C1C below."
        states: [error]

  table_row:
    tier: composite
    composed_of: [label, checkbox]
    anatomy: [cells, selection_checkbox]
    variants:
      - id: default
        svg: components/table-row-default.svg
        rendering_notes: "48px tall, full width. Cells separated by vertical implied alignment, no visible vertical dividers. Bottom 1px #E0E0E0 divider. Cell content in 13px #212121."
        states: [default, hover, selected]
      - id: header
        svg: components/table-row-header.svg
        rendering_notes: "Same as default but cell content in 12px #757575 weight 600 uppercase. Bottom 1.5px #757575 divider (stronger than data rows)."
        states: [default, with_sort]
      - id: selected
        svg: components/table-row-selected.svg
        rendering_notes: "Same as default with #F5F5F5 background fill."
        states: [selected]
      - id: expanded
        svg: components/table-row-expanded.svg
        rendering_notes: "Same as default but with expanded detail area below (variable height). Indicator chevron rotated 90° in first cell."
        states: [expanded]

  table_header:
    tier: composite
    composed_of: [label, icon, button]
    anatomy: [column_labels, sort_indicators, filter_buttons]
    variants:
      - id: default
        svg: components/table-header-default.svg
        rendering_notes: "Single row of column headers (12px #757575 weight 600 uppercase), 1.5px #757575 divider below."
        states: [default]
      - id: sortable
        svg: components/table-header-sortable.svg
        rendering_notes: "Same as default with sort chevrons (▲▼) in #BDBDBD beside sortable columns. Active sort column has chevron in #424242."
        states: [default, sorted_asc, sorted_desc]
      - id: with_filter
        svg: components/table-header-with-filter.svg
        rendering_notes: "Same as default with filter buttons (small ▾) beside filterable columns."
        states: [default, with_active_filter]

  nav_item:
    tier: composite
    composed_of: [icon, label, badge]
    anatomy: [icon, label, badge, active_indicator]
    variants:
      - id: top_level
        svg: components/nav-item-top-level.svg
        rendering_notes: "Horizontal pill (32px tall) with optional 16px icon left, label in 14px #212121 (active) or #757575 (inactive). Active state: background #F5F5F5."
        states: [default, hover, active]
      - id: sub_item
        svg: components/nav-item-sub-item.svg
        rendering_notes: "Same as top_level but indented 16px and label in 13px (one step down in scale)."
        states: [default, hover, active]
      - id: breadcrumb_segment
        svg: components/nav-item-breadcrumb.svg
        rendering_notes: "Inline label in 13px #757575 (or #212121 for current segment). Used as a single segment of a breadcrumb trail."
        states: [default, current]

  tab_item:
    tier: composite
    composed_of: [label, icon, badge]
    anatomy: [label, icon, badge, active_underline]
    variants:
      - id: default
        svg: components/tab-item-default.svg
        rendering_notes: "Inline label in 13px #757575 weight 500. Optional 14px icon to left of label."
        states: [default, hover, active, disabled]
      - id: active
        svg: components/tab-item-active.svg
        rendering_notes: "Same as default but label in #212121 weight 600 and 2px #424242 underline below."
        states: [active]
      - id: disabled
        svg: components/tab-item-disabled.svg
        rendering_notes: "Same as default but text and icon in #BDBDBD; non-interactive."
        states: [disabled]

  breadcrumb_trail:
    tier: composite
    composed_of: [nav_item, divider]
    anatomy: [segments, separators]
    variants:
      - id: default
        svg: components/breadcrumb-trail-default.svg
        rendering_notes: "Sequence of nav_item.breadcrumb_segment separated by ' / ' or chevron (›) in #BDBDBD. Final segment in #212121 (current page)."
        states: [default]
      - id: truncated
        svg: components/breadcrumb-trail-truncated.svg
        rendering_notes: "First segment + ellipsis (…) + last 2 segments. Used when full trail is too long."
        states: [default]

  pagination:
    tier: composite
    composed_of: [button, label]
    anatomy: [previous_button, page_indicators, next_button]
    variants:
      - id: numbered
        svg: components/pagination-numbered.svg
        rendering_notes: "Sequence: ‹ Prev  1 2 3 ... 10  Next › . Active page in #212121 weight 600 with #F5F5F5 surface; inactive pages in #757575."
        states: [default]
      - id: simple
        svg: components/pagination-simple.svg
        rendering_notes: "Just ‹ Prev | Page 3 of 10 | Next › "
        states: [default]
      - id: infinite_scroll_indicator
        svg: components/pagination-infinite.svg
        rendering_notes: "'Loading more...' or '247 of 1,247 items' centered text in #757575."
        states: [loading, complete]

  toast:
    tier: composite
    composed_of: [icon, label, button]
    anatomy: [icon, message, dismiss_action]
    variants:
      - id: info
        svg: components/toast-info.svg
        rendering_notes: "Pill (40px tall, 8px radius) fill #FFFFFF, 1px stroke #E0E0E0. Info icon in #1565C0 left, message in 13px #212121 center, dismiss × in #757575 right."
        states: [default]
      - id: success
        svg: components/toast-success.svg
        rendering_notes: "Same as info but icon in #2E7D32 (success)."
        states: [default]
      - id: warning
        svg: components/toast-warning.svg
        rendering_notes: "Same as info but icon in #E65100 (warning)."
        states: [default]
      - id: error
        svg: components/toast-error.svg
        rendering_notes: "Same as info but icon in #B71C1C (danger). Border may also be #B71C1C for stronger emphasis."
        states: [default]

  stat:
    tier: composite
    composed_of: [label]
    anatomy: [value, label, trend, sparkline]
    variants:
      - id: default
        svg: components/stat-default.svg
        rendering_notes: "Value in 24px #212121 weight 700 (display type). Label in 12px #757575 weight 600 uppercase tracked above value. Optional trend indicator (▲ or ▼ with %) below."
        states: [default]
      - id: with_trend
        svg: components/stat-with-trend.svg
        rendering_notes: "Same as default with trend value (e.g. '+12%') in #2E7D32 (success) or #B71C1C (danger) below."
        states: [default]
