# ────────────────────────────────────────────────────────────────────
# RULEBOOK — the 7 design principles from UNIVERSAL-WIREFRAMING-PROCESS.md
# encoded as enforceable rules. These apply to all wireframes regardless
# of design system; per-system rulebooks layer additional rules on top.
# ────────────────────────────────────────────────────────────────────

rulebook:
  # NEW IN v0.2 (Change 12): every rule annotates check_scope so consumers
  # know whether the rule applies to a component fragment, a composed
  # artifact, or both.

  - id: wireframe-mobile-first
    rule: "Every wireframe is authored at mobile (375px) first, then desktop (1280px) is created as an EXPANSION of mobile. Information hierarchy on desktop matches mobile — desktop adds space and supplementary content but never rearranges the primary content order."
    rationale: "Mobile is the most constrained context; what works on mobile works on desktop with breathing room. The reverse is not true."
    severity: required
    check_method: semantic
    check_scope: artifact

  - id: wireframe-cards-universal-container
    rule: "Distinct content (anything with a boundary, title, and related data) is presented in a card. Cards are the primary container pattern; other container types (panels, sections, blocks) require a specific reason to deviate."
    rationale: "Single container pattern creates visual consistency without effort. Most wireframe content fits the card pattern."
    severity: recommended
    check_method: semantic
    check_scope: artifact

  - id: wireframe-one-channel-per-message
    rule: "Status is communicated through ONE visual channel, not multiple simultaneously. If card border color signals status (success/warning/danger), background color and icon color do NOT also encode that status."
    rationale: "Multiple channels for the same signal create visual noise and make the design harder to scan."
    severity: required
    check_method: semantic
    check_scope: both

  - id: wireframe-comments-for-intent
    rule: "SVG comments explain INTENT (why this element, what role does it play), not appearance (what color, what dimensions). Bad: '<!-- Green rectangle 4px wide -->'. Good: '<!-- Active client — green border indicates active survey -->'."
    rationale: "Future readers need to understand the system, not re-derive the visuals from prose."
    severity: required
    check_method: semantic
    check_scope: both

  - id: wireframe-consistency-over-creativity
    rule: "Every card looks like every other card. Every button uses the same dimensions. Every header follows the same pattern. Wireframes are NOT artistic statements — they are uniform structural communication."
    rationale: "Uniformity makes the wireframes feel like one product. Creativity belongs in the production design phase, not the wireframing phase."
    severity: required
    check_method: semantic
    check_scope: artifact          # consistency is an across-elements judgment

  - id: wireframe-edge-cases-first-class
    rule: "Empty state, error state, loading state, and permission-denied state are required deliverables alongside the populated state. A screen specification that only describes the happy path is incomplete."
    rationale: "Production code has to handle all these states; the design must too."
    severity: required
    check_method: semantic
    check_scope: artifact          # screen-set deliverable check

  - id: wireframe-verify-dont-assume
    rule: "After creating wireframes, verify them: file exists with non-trivial content, viewBox matches dimensions, all colors come from the palette, all sizes from the type scale, all spacing from the grid. Verification catches errors before they compound."
    rationale: "Errors in early wireframes propagate to all subsequent wireframes that copy them."
    severity: required
    check_method: mechanical
    check_scope: both

  # Mechanical rules — automatically checkable by rulebook_check.py

  - id: wireframe-palette-discipline
    rule: "Every fill and stroke value is one of the 12 palette colors (7 greyscale + 4 semantic + inverse white). Off-palette values are violations."
    rationale: "Off-palette colors break the calibrated value hierarchy."
    severity: required
    check_method: mechanical
    check_scope: both

  - id: wireframe-type-scale-discipline
    rule: "Every font-size is one of the 7 scale values (11, 12, 13, 14, 16, 18, 24). Off-scale sizes are violations."
    rationale: "Off-scale sizes break the typographic rhythm."
    severity: required
    check_method: mechanical
    check_scope: both

  - id: wireframe-no-double-hyphens-in-comments
    rule: "SVG comments NEVER contain '--' (double hyphens). XML forbids '--' inside comment bodies — only '<!--' to open and '-->' to close. Decorative dividers like '<!-- ---- Section ---- -->' cause parse errors."
    rationale: "XML parser requirement; non-compliant comments break the SVG."
    severity: required
    check_method: mechanical
    check_scope: both

  - id: wireframe-css-classes-not-inline-fills
    rule: "Text element fills MUST use CSS classes (text-primary, text-secondary, text-disabled, text-inverse) defined in <defs><style>, not inline fill attributes. Color changes must be find-and-replace at the class definition, not at every text element."
    rationale: "Inline fills make global color changes a search-and-replace nightmare."
    severity: required
    check_method: mechanical
    check_scope: both

  - id: wireframe-mobile-desktop-pair
    rule: "Every wireframe screen is delivered as a (mobile.svg, desktop.svg) pair. Mobile viewBox width = 375. Desktop viewBox width = 1280."
    rationale: "Mobile-first methodology requires both deliverables; one without the other is incomplete."
    severity: required
    check_method: mechanical
    check_scope: artifact          # screen-pair deliverable check, not a component-fragment check


# ────────────────────────────────────────────────────────────────────
# GRAMMAR EXTENSIONS — wireframe family
# ────────────────────────────────────────────────────────────────────

grammar_extensions:
  family: wireframe

  per_system_signature:
    placeholder_content:
      enabled: true
      copy_conventions:
        names: ["Alex Rivera", "Jordan Chen", "Sam Okafor", "Taylor Kim", "Robin Patel"]
        organizations: ["Northwind Trading", "Blue Harbor Consulting", "Ridge Valley Health"]
        emails_format: "user@example.com"
        dates_format: "MM/DD/YYYY"
        body_text: "Lorem ipsum dolor sit amet, consectetur adipiscing elit."
      role: "Realistic but obviously fictitious sample data — makes wireframes feel alive without confusing them with production data"

    section_structure:
      enabled: true
      banner_format: "<!-- ==================== SECTION ==================== -->"
      inline_format: "<!-- Intent description -->"
      role: "SVG comments structure the file scannably; banner comments separate major sections"

    layout_grid:
      enabled: true
      page_margin_mobile: 12
      page_margin_desktop: 32
      component_gap: 12
      section_gap: 32
      role: "Consistent spacing rhythm across all wireframes"

    desktop_expansion_patterns:
      patterns:
        - { name: "two_column_split", main_pct: 60, panel_pct: 40, gap_px: 24 }
        - { name: "card_grid", columns: [2, 3], gap_px: 16 }
        - { name: "centered_constrained", max_width_px: 640 }
        - { name: "left_sidebar", sidebar_width_px: [200, 280] }
      role: "When adapting a mobile wireframe to desktop, choose one of these patterns"
