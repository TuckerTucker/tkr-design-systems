# Capability Spec — artifact-pipeline
# 13-section architectural design
# Layer: domain | Wave: 3

capability: artifact-pipeline
status: implemented

context: |
  The artifact-pipeline capability owns the artifact lifecycle from
  generation result to inspectable, versioned canvas object. Generation
  tools (wf_generate, wf_apply_substitutions, wf_assemble_from_blueprint)
  run on the Agent SDK's own MCP connection. wf_generate and
  wf_apply_substitutions land outputs as files — the MCP server writes
  wireframe.svg + wireframe.spec.yaml to an output directory and returns
  {ok, svg_path, spec_path, errors, warnings, compliance_summary,
  selection, system_id} (GenerationResult.to_dict() in
  wireframe-skill/wireframe_skill/generator.py) — while
  wf_assemble_from_blueprint returns SVG text. Both arrive as the
  ArtifactSource discriminated union ({ kind: "paths" } | { kind:
  "text" }), the payload of agent-orchestration's artifact_produced
  event. The pipeline ingests those outputs into immutable versions under
  studio/workspaces/<ws>/artifacts/<art>/versions/<NNNN>/ (architecture
  contract), each holding wireframe.svg, wireframe.spec.yaml,
  compliance.yaml, and version.yaml provenance.

  Compliance is canonical here, not at generation: wf_generate's
  compliance_summary carries counts only, while ds_check_compliance
  (called through the mcp-bridge against the persisted SVG path) returns
  the full rule-level report — {system_id, artifact_path, scope, passed,
  failed, advisory, results: [{rule_id, status, detail}], ruleset,
  mechanical_only} inside the design-system-skill Result envelope
  {ok, data | errors}. Rule detail carries offending values (font sizes,
  colors, radii, filter refs — see tooling/rulebook_check.py), not node
  references, so this capability derives the violation-to-SVG-node
  mapping by scanning the artifact. Assembled artifacts carry structured
  group ids ({region_id}__{comp_id}_{comp_idx} per the wireframe-skill
  assembler), which sanitization must preserve for canvas highlighting.

  Persistence goes exclusively through workspace-store repositories
  (IoC — the pipeline receives repositories, never constructs paths).
  Events artifact.version_created and artifact.compliance_completed flow
  into the studio-api WebSocket stream.

problem_statement: |
  Generation results today are loose files in a temp directory:
  - No version identity — a refinement overwrites nothing and relates to
    nothing; there is no history to scrub and no head to render
  - No provenance — which brief, which tool, which parameters produced
    an SVG is unrecoverable once the chat scrolls past
  - No restore path — comparing or returning to an earlier result means
    manual file juggling outside the studio
  - Compliance lives in tool output — wf_generate returns only counts;
    the rule-level report (which rule, what evidence) is discarded, and
    nothing connects a violation to the SVG element that caused it
  - spec.yaml is unparsed YAML — the canvas inspect-on-hover and the
    compliance bar need typed metadata, not file reads
  - Raw generated SVG is served to no one — there is no sanitization
    seam between disk content and the browser

scope:
  in:
    - 'Version creation from generation results ingested via the ArtifactSource union ({ kind: "paths" } | { kind: "text" }; SVG + spec.yaml + provenance: brief, tool, parameters)'
    - Version graph (parent links, head pointer in artifact.yaml, restore-as-new-head — undo, never destructive rollback)
    - wireframe.spec.yaml parsing into typed artifact metadata (wireframe block, design_system block, components_used, rulebook_compliance summary, notes)
    - Compliance execution per version via ds_check_compliance through the mcp-bridge; full report persisted as compliance.yaml
    - Reported-state semantics — a failing rulebook never blocks version landing
    - Violation-to-SVG-node mapping (rule detail evidence matched to element ids) for canvas highlighting
    - SVG sanitization for serving (scripts, event handlers, external refs stripped; node ids preserved byte-identical)
    - artifact.version_created and artifact.compliance_completed event emission into the API event stream
  out:
    - Storage mechanics — directory layout, atomic writes, soft delete (workspace-store owns them; the pipeline consumes repositories)
    - Deciding when to generate or which tool to call (agent-orchestration)
    - Rendering the SVG, the history filmstrip, or the compliance bar (canvas)
    - WebSocket delivery of events to clients (studio-api owns the transport; the pipeline emits domain events)
    - Rulebook definitions and check implementations (live in system specs and design-systems/tooling/rulebook_check.py, read-only)
    - PNG export, download bundles, token export (export-surface, deferred)

dependencies:
  upstream:
    - "mcp-bridge — typed ds_check_compliance wrapper over the bridge's stdio connection (maps its bridge-internal RawComplianceResult onto the canonical ComplianceReport); bridge status for the unavailable state"
    - "workspace-store — artifact/version repositories (create version, read version content, update head pointer, list versions)"
    - "studio-server — configuration (workspace root), pino logger injection"
  downstream:
    - "studio-api — serves version SVG/spec/compliance over HTTP, relays artifact.version_created and artifact.compliance_completed over WebSocket"
    - "agent-orchestration — hands generation tool results to the pipeline for ingestion after each producing tool call"
    - "canvas (Phase 2) — consumes typed metadata for inspect-on-hover, version list for the filmstrip, violation node ids for highlighting"
  external:
    - "design-systems/mcp-server — ds_check_compliance tool (read-only dependency; result shape per design_system_skill/rulebook.py)"
    - "wireframe-skill emit.py — wireframe.spec.yaml schema (read-only contract; design_system block, components_used, rulebook_compliance)"
    - "yaml package — all YAML parsing (architecture contract; never hand-rolled)"

data_contracts: |
  ## Generation tool results (as ingested — shapes per mcp-server/server.py)

  ```typescript
  // studio/packages/contract/src/generation.ts
  // GenerationResult.to_dict() from wf_generate / wf_apply_substitutions
  export interface GenerationToolResult {
    ok: boolean;
    svg_path: string | null;     // absolute path to emitted wireframe.svg
    spec_path: string | null;    // absolute path to emitted wireframe.spec.yaml
    errors: string[];
    warnings: string[];
    compliance_summary: { passed: number; failed: number; advisory: number } | null;
    selection: {
      pattern_id: string;
      base_pattern: string;
      fallback: boolean;
      rationale: string;
    } | null;
    system_id: string | null;    // "wireframe" when no system applied
  }

  // wf_assemble_from_blueprint result (svg_text always; paths when output_dir given)
  export interface AssemblyToolResult {
    ok: boolean;
    svg_text: string | null;
    validation_errors: string[];
    warnings: string[];
    svg_path?: string;
    spec_path?: string;
    components_used?: ComponentUsed[];
  }
  ```

  ## Ingestion source — artifact_produced payload (agent-orchestration → ingest)

  ```typescript
  // studio/packages/contract/src/artifact.ts (owned by artifact-pipeline)
  // The payload of agent-orchestration's artifact_produced event. The
  // ingest interface accepts this union directly; both branches are
  // first-class: wf_generate / wf_apply_substitutions emit files
  // (paths), wf_assemble_from_blueprint returns SVG text.
  export type ArtifactSource =
    | { kind: "paths"; svgPath: string; specPath: string }
    | { kind: "text"; svgText: string; specYaml?: string };
  ```

  ## Version and provenance

  ```typescript
  // studio/packages/contract/src/artifact.ts
  export type GenerationTool =
    | "wf_generate"
    | "wf_apply_substitutions"
    | "wf_assemble_from_blueprint"
    | "restore";                  // restore-as-new-head is a producing tool

  // versions/<NNNN>/version.yaml
  export interface VersionProvenance {
    parent: number | null;        // parent version number; null for the first
    brief: string;                // the brief (or restore description) behind this version
    tool: GenerationTool;
    parameters: Record<string, unknown>;  // tool parameters as issued (system, platform, layout_id, substitutions, blueprint, restored_from, …)
    created: string;              // ISO 8601 UTC
  }

  export interface ArtifactVersion {
    number: number;               // 1-based; zero-padded NNNN on disk
    provenance: VersionProvenance;
    metadata: ParsedSpecMetadata; // parsed wireframe.spec.yaml
    compliance: ComplianceState;
  }

  // artifacts/<artifact-id>/artifact.yaml — the version graph root
  export interface ArtifactRecord {
    id: string;                   // kebab-case slug
    name: string;
    system: string | null;        // design system id; null = neutral library
    platform: "mobile" | "desktop";
    headVersion: number | null;   // current head version number; null = no versions yet (canonical, stored in artifact.yaml)
    created: string;
    updated: string;
  }

  export interface VersionSummary {
    number: number;
    parent: number | null;
    tool: GenerationTool;
    brief: string;
    created: string;
    compliance: { status: ComplianceState["status"]; passed?: number; failed?: number; advisory?: number };
  }
  ```

  ## Parsed spec metadata (wireframe.spec.yaml per wireframe-skill emit.py)

  ```typescript
  export interface ParsedSpecMetadata {
    wireframe: {
      brief: string;
      platform: "mobile" | "desktop";
      dimensions: { width: number; height: number };
      generated_at: string;       // ISO 8601 UTC
      generator_version: string;  // e.g. "3.0-deterministic"
      svg: string;                // emitted SVG filename
    };
    design_system: DesignSystemBlock;
    notes?: Array<{ text: string }>;
  }

  export interface DesignSystemBlock {
    id: string | null;            // null when generated against neutral templates
    note?: string;                // present when id is null
    spec_version?: string | null;
    system_version?: string | null;
    layout_template_used?: string;
    base_pattern?: string;
    pattern_source_svg?: string | null;
    selection_rationale?: string;
    selection_was_fallback?: boolean;
    components_used: ComponentUsed[];
    rulebook_compliance?: RulebookComplianceSummary;
    artifact_treatments_applied: unknown[];
  }

  export interface ComponentUsed {
    id: string;                   // component id, or "custom"
    region: string;               // blueprint region id
    x: number;
    y: number;
    type: "library" | "custom";
    svg_length?: number;          // custom components only
  }

  export interface RulebookComplianceSummary {
    checked: number;
    mechanical_passed: number;
    mechanical_failed: number;
    advisory_warnings: number;
    failed_rules: string[];
    ruleset: string | null;
    scope: string;
  }
  ```

  ## Compliance result (ds_check_compliance via mcp-bridge)

  ```typescript
  // The raw MCP wire shape is bridge-internal: RawComplianceResult in
  // studio/server/src/mcp/types.ts (not in the contract package). The
  // bridge unwraps the design-system-skill Result envelope
  // ({ok, data} | {ok, errors: [{code, message, detail}]}) and maps it
  // onto the canonical domain ComplianceReport below. The HTTP layer
  // serves ComplianceResponse (studio-api, http-payloads.ts) — a
  // projection with violation nodeIds resolved — never this type raw.
  export type RuleStatus = "pass" | "fail" | "advisory";

  export interface RuleResult {
    rule_id: string;
    status: RuleStatus;
    detail: Record<string, unknown>;  // offending evidence: actual, expected, violations, hint, … (the bridge guarantees parsing — never a JSON string above the bridge)
  }

  // versions/<NNNN>/compliance.yaml — report + derived mapping
  // THE canonical compliance type (studio/packages/contract/src/artifact.ts)
  export interface ComplianceReport {
    system_id: string;
    artifact_path: string;        // the persisted version SVG path that was checked
    scope: string;                // "component" | "artifact" (auto-detected) | "all"
    passed: number;
    failed: number;
    advisory: number;
    results: RuleResult[];
    ruleset: string | null;       // null = no mechanical ruleset for this system
    mechanical_only: boolean;
    note?: string;                // present when ruleset is null
  }

  export type ComplianceState =
    | { status: "pending" }
    | { status: "completed"; report: ComplianceReport; violations: ViolationNodeMapping[] }
    | { status: "unavailable"; reason: string };  // bridge down — version landed anyway; re-runnable
  ```

  ## Violation → SVG node mapping (canvas highlighting)

  ```typescript
  // Rule detail carries offending VALUES, not node references. The mapper
  // scans the sanitized SVG for elements matching that evidence and
  // resolves stable element ids (assembled artifacts: region__component_index).
  export interface ViolationNodeMapping {
    ruleId: string;
    nodeIds: string[];            // element ids in the sanitized document; [] when matchedBy is "document"
    matchedBy: "attribute-value" | "text-content" | "element-name" | "document";
    evidence: Record<string, unknown>;  // the RuleResult.detail subset that matched
  }
  ```

  ## Domain events (relayed by studio-api per the WS envelope)

  ```typescript
  // studio/packages/contract/src/events.ts
  export interface ArtifactVersionCreatedPayload {
    workspaceId: string;
    artifactId: string;
    version: number;
    headVersion: number;          // new head after landing (never null once a version exists)
    provenance: VersionProvenance;
  }

  export interface ArtifactComplianceCompletedPayload {
    workspaceId: string;
    artifactId: string;
    version: number;
    status: "completed" | "unavailable";
    passed?: number;
    failed?: number;
    advisory?: number;
  }
  // WS types: "artifact.version_created", "artifact.compliance_completed"
  ```

file_locations:
  - studio/server/src/artifact-pipeline/index.ts — Named exports for the capability (createArtifactPipeline factory, IoC — receives repositories, bridge, logger, event emitter)
  - studio/server/src/artifact-pipeline/ingest.ts — Generation result ingestion (accepts the ArtifactSource union — paths or text — captures provenance, lands version via store)
  - studio/server/src/artifact-pipeline/version-graph.ts — Parent links, head pointer updates, version listing, restore-as-new-head
  - studio/server/src/artifact-pipeline/spec-metadata.ts — wireframe.spec.yaml → ParsedSpecMetadata parser (yaml package)
  - studio/server/src/artifact-pipeline/compliance.ts — ds_check_compliance orchestration per version, compliance state machine, compliance.yaml persistence
  - studio/server/src/artifact-pipeline/violation-mapping.ts — Rule detail evidence → SVG element id resolution
  - studio/server/src/artifact-pipeline/sanitize.ts — Serving-side SVG sanitizer (id-preserving)
  - studio/server/src/artifact-pipeline/events.ts — Typed domain event emitter (version_created, compliance_completed)
  - studio/packages/contract/src/artifact.ts — ArtifactSource, ArtifactRecord, ArtifactVersion, VersionProvenance, VersionSummary, ParsedSpecMetadata, ComplianceReport (canonical), ComplianceState, ViolationNodeMapping (module contributed by artifact-pipeline to the @studio/contract package whose skeleton was scaffolded in Wave 1 by studio-server slice 1; shared with client)
  - studio/packages/contract/src/generation.ts — GenerationToolResult, AssemblyToolResult ingest shapes
  - studio/packages/contract/src/events.ts — Artifact event payload types
  - studio/server/test/artifact-pipeline/ingest.test.ts — Ingestion against a real temp workspace directory
  - studio/server/test/artifact-pipeline/compliance.test.ts — Real-seam test against the actual design-systems MCP server (never mocked)
  - studio/server/test/artifact-pipeline/sanitize.test.ts — Sanitizer and node-id stability unit tests

implementation_steps:
  - Define contract types in studio/packages/contract (artifact, generation, events modules — contributed to the @studio/contract skeleton scaffolded in Wave 1) mirroring the verified Python shapes; declare ArtifactSource in artifact.ts
  - Build spec-metadata parser (yaml package; typed results for malformed input; neutral-library null-id shape; forward-compatible unknown keys)
  - 'Build ingest flow — accept the ArtifactSource union ({ kind: "paths" }: read SVG + spec content from the emitted files; { kind: "text" }: take svgText/specYaml directly — both first-class branches), parse metadata, capture provenance, land version through workspace-store repositories'
  - Wire artifact.yaml creation on first version (id slug, name, system from metadata, platform, headVersion = 1)
  - Implement head pointer update and parent linking on every landing
  - Emit artifact.version_created once the version directory is durable
  - Implement restore-as-new-head (copy restored version content into a new version; provenance tool "restore", parameters.restored_from; same event path)
  - Build version listing (VersionSummary projection over version.yaml + compliance.yaml files via the store)
  - Build compliance runner — call ds_check_compliance via the mcp-bridge wrapper with the persisted version SVG path; the bridge maps its internal RawComplianceResult onto the canonical ComplianceReport; persist compliance.yaml
  - Implement the compliance state machine (pending on landing → completed | unavailable) and the re-run path for unavailable versions
  - Emit artifact.compliance_completed once compliance.yaml is durable
  - Build the SVG sanitizer (strip script/foreignObject elements, on* attributes, external href/src; preserve id attributes byte-identical; verify well-formedness)
  - Build the violation-to-node mapper (per failed RuleResult, match detail evidence — font sizes, fill/stroke colors, rx/ry values, filter references, text content — against sanitized SVG elements; resolve ids; document-scope fallback)
  - Store violation mappings alongside the report in compliance.yaml
  - Integrate with agent-orchestration's tool-result hook (every producing tool call flows through ingest)
  - Write real-seam tests — ingestion against a temp workspace, compliance against the real MCP server, sanitizer determinism and id stability

error_handling: |
  - Tool result ok=false → no version is created; typed failure result carries the tool's errors list for agent-orchestration to surface in chat
  - svgPath or specPath missing/unreadable (paths branch) or svgText empty (text branch) → typed INGEST_OUTPUT_MISSING failure with the offending path or field; no partial version lands
  - spec.yaml unparseable → version still lands (SVG is the artifact); metadata recorded as a typed parse failure the API surfaces; inspect-on-hover degrades, canvas still renders
  - ds_check_compliance returns ok=false (SYSTEM_NOT_FOUND, INVALID_PATH, RULESET_UNKNOWN, INTERNAL) → compliance state unavailable with the error code and message; version unaffected
  - Mechanical rule failures (failed > 0) → reported state in compliance.yaml; NEVER an ingestion failure — the version lands with its report
  - mcp-bridge down or call timed out → compliance state unavailable with reason "bridge_unavailable"; re-run when bridge.status recovers
  - Head pointer update fails after version directory landed → integrity error logged with workspace/artifact correlation; landing retracted is impossible (immutable), so the graph validator repairs headVersion to the highest landed version on next read
  - Restore target version does not exist → typed VERSION_NOT_FOUND failure; headVersion unchanged
  - Sanitizer finds malformed XML → typed SVG_MALFORMED error to the API (structured error response, never a broken document to the client)
  - All failures cross the capability seam as typed results, never thrown exceptions (architecture contract); every error logged via pino with requestId/workspaceId correlation

edge_cases: |
  - First version of a new artifact → parent null, headVersion 1, artifact.yaml created in the same landing
  - Neutral-library generation (system_id "wireframe", design_system.id null in spec.yaml) → metadata parses with the note; compliance runs against the "wireframe" ruleset
  - System with no mechanical ruleset → ds_check_compliance returns zero counts + note; recorded as completed (the bar shows "no mechanical rules", not an error)
  - wf_generate returns a routing_request / substitution_request / decomposition_request instead of files → not a producing result; ingestion is never invoked (agent-orchestration owns the follow-up call)
  - Assembly result arriving as { kind: "text" } (svgText, no output_dir paths) → first-class ingest branch, not an edge case in the contract; the pipeline persists svgText directly and, when specYaml is absent, synthesizes minimal metadata (brief "assembled from blueprint", components_used from the result)
  - Restore of the current head → valid no-op-shaped operation; still creates a new version (history shows the user's action)
  - Restore chain (restore of a restore) → parent links record the actual lineage; parameters.restored_from records the source each time
  - Two producing tool results racing in one workspace → version numbering serialized through the store; landings queue, never interleave
  - Violation evidence matches zero SVG nodes (value normalized away during generation) → mapping falls back to matchedBy "document" with empty nodeIds; canvas highlights the artifact frame
  - Violation evidence matches many nodes (e.g. off-palette color used widely) → all matching ids listed; canvas highlights the set
  - Duplicate id attributes in generated SVG (defs collision renaming missed a case) → sanitizer flags it; mapper treats the first occurrence as canonical and logs the duplicates
  - Version directory present but compliance.yaml absent (crash between landing and compliance) → state pending on read; compliance re-runs lazily
  - Artifact with hundreds of versions → listing is a projection over small YAML files; no SVG content read during listing

integration_points:
  - "agent-orchestration: hands every producing tool result (generate, substitution, assembly) to ingest as the ArtifactSource payload of its artifact_produced event ({ kind: 'paths' } or { kind: 'text' }); receives typed failures to surface in chat"
  - "mcp-bridge: ds_check_compliance typed wrapper; bridge.status feeds the unavailable→re-run transition"
  - "workspace-store: artifact and version repositories — all reads and writes; the pipeline never constructs filesystem paths"
  - "studio-api: GET versions/:n/svg serves sanitized content; /spec serves ParsedSpecMetadata; /compliance serves ComplianceState; WS relays artifact.version_created and artifact.compliance_completed"
  - "canvas (Phase 2): filmstrip from VersionSummary list; inspect-on-hover from ParsedSpecMetadata; click-to-highlight from ViolationNodeMapping.nodeIds"
  - "@studio/contract (studio/packages/contract): every type above declared once, imported by server and client; artifact-pipeline contributes its artifact.ts, generation.ts, and events.ts modules to the package skeleton scaffolded in Wave 1 (studio-server slice 1)"

verification_criteria:
  - Ingesting a real wf_generate result lands versions/0001/ with wireframe.svg, wireframe.spec.yaml, version.yaml; artifact.yaml headVersion = 1
  - version.yaml records parent null, brief, tool wf_generate, the exact parameters issued, and an ISO 8601 UTC created timestamp
  - A second ingestion lands 0002 with parent 1; headVersion moves to 2; version 0001 unchanged byte-for-byte
  - 'Ingesting a wf_assemble_from_blueprint result as { kind: "text" } (svgText, no paths) lands a complete version through the same path as the paths branch'
  - Restore of version 1 from head 2 creates version 0003 with content identical to 0001, tool "restore", parameters.restored_from = 1; headVersion = 3; no version deleted
  - artifact.version_created emitted exactly once per landing (generation and restore) with correct workspace/artifact/version identifiers
  - ParsedSpecMetadata from a system generation exposes design_system.id, layout_template_used, components_used entries, and the rulebook_compliance summary matching the YAML
  - Neutral-library spec.yaml (design_system.id null + note) parses without error
  - ds_check_compliance runs via the mcp-bridge against the persisted version SVG path on every landing; compliance.yaml holds the full results list (rule_id, status, detail)
  - A version whose rulebook fails (failed > 0) still lands; its compliance state is completed with the failure counts — verified against a real failing artifact
  - Bridge stopped during ingestion → version lands with compliance state unavailable and a reason; re-run after bridge recovery transitions it to completed
  - artifact.compliance_completed emitted with counts matching compliance.yaml
  - Sanitized SVG contains no script elements, no on* attributes, no external href/src, no foreignObject; every id attribute from the stored SVG present unchanged
  - Sanitizer output is deterministic across repeated calls on the same version
  - Sanitizer passes the shared adversarial SVG fixture set (script injection, event handlers, external references) — the same fixtures library-panel's client-side sanitizer is tested against
  - For a swiss artifact with an off-scale font size, the violation mapping for swiss-fixed-type-scale lists the ids of the elements carrying that font size
  - xml-well-formed failure maps with matchedBy "document" and empty nodeIds
  - Compliance tests run against the actual design-systems MCP server (never mocked); ingestion tests run against a real temp workspace directory
  - All contract types compile under TypeScript strict; all modules use named exports and ES modules

performance: |
  - Version landing is bounded by file copies of one SVG (tens of KB typical) plus three small YAML writes — no SVG parsing on the landing path
  - Compliance runs asynchronously after landing; artifact.version_created is not gated on the compliance call, so the canvas shows the artifact while the bar shows pending
  - Compliance calls are serialized per artifact through the bridge queue; concurrent artifacts do not block each other beyond the single stdio transport
  - Version listing reads only version.yaml/compliance.yaml summaries — O(versions) small-file reads, no SVG content
  - Sanitization and violation mapping are single-pass over the SVG document; results are cacheable per immutable version (same input → same output) so repeat serves hit the cache
  - Event payloads carry identifiers and counts, never SVG content — WS messages stay small regardless of artifact size
  - Memory: one SVG document held at a time per ingestion; no whole-history loading

security: |
  - Served artifact version SVGs are sanitized server-side, with node IDs preserved: script elements, on* event handlers, foreignObject, and external resource references stripped — generated SVG is treated as untrusted content even though it comes from our own pipeline (defense in depth for custom blueprint components carrying arbitrary SVG)
  - Sanitization scope: this guarantee covers artifact version SVGs only. Library component/layout SVGs never pass through this pipeline — they flow wf_read_component → studio-api → panel and are sanitized client-side by library-panel. Both sanitizers are tested against one shared adversarial fixture set (script injection, event handlers, external references)
  - Stored files are never executed or interpreted server-side beyond XML parsing
  - The pipeline writes only through workspace-store repositories, which confine all writes to studio/workspaces/ (gitignored) — no path traversal surface; version paths are store-derived, never client-supplied
  - artifact_path sent to ds_check_compliance is always a store-resolved path to a persisted version, never a client-provided string
  - Provenance parameters are recorded verbatim but contain no secrets by construction (briefs, system ids, layout ids, blueprints); ANTHROPIC_API_KEY never reaches the pipeline (agent-orchestration owns it, pino redaction applies)
  - Single-user local-only deployment (architecture contract): no auth inside the pipeline; the server binds localhost
  - Immutability is an integrity property: landed versions are never rewritten, so a served artifact always matches its compliance report
  - TypeScript strict mode and typed results prevent unsafe coercions at every seam
