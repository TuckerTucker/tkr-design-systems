# Interaction Stories — studio-server
# Layer: infrastructure | Wave: 1

capability: studio-server

stories:

  # ── config-resolution ───────────────────────────────────────────

  - name: developer-resolves-config-with-env-overrides
    feature: config-resolution
    number: 1
    actor: Studio Developer
    intent: "Start the server against a non-default port and workspace path; verify config resolution, env overrides, and validation errors behave as typed contracts."
    preconditions:
      - "studio/server package is installed (npm workspaces)"
      - "Repo-root .mcp.json contains the tkr-design-systems entry (command + args)"
    trigger_action: "Run the server entry point with and without STUDIO_* environment overrides"
    steps:
      - actor: Studio Developer
        action: "Starts the server with no STUDIO_* variables set"
        system_response: "resolveConfig returns defaults — port 4400, workspacesDir <repoRoot>/studio/workspaces, clientDistDir <repoRoot>/studio/client/dist, logLevel info — and mcpLaunch is read from .mcp.json with cwd pinned to the repo root"
      - actor: Studio Developer
        action: "Restarts with STUDIO_PORT=4500 and STUDIO_WORKSPACES_DIR=/tmp/studio-ws"
        system_response: "Resolved config reflects both overrides; the startup log line records the resolved paths and port (never env contents or secrets)"
      - actor: Studio Developer
        action: "Sets STUDIO_PORT=banana and starts the server"
        system_response: "Process exits non-zero before binding; the log contains a ConfigError with field \"port\", a message naming the invalid value, and the fix (set STUDIO_PORT to an integer 1024–65535)"
      - actor: Studio Developer
        action: "Removes the tkr-design-systems entry from a test copy of .mcp.json and points the server at it"
        system_response: "Process exits non-zero with a ConfigError naming the expected mcpServers key and the file path — the failure is caught at startup, not at first MCP spawn"
    acceptance_criteria:
      - given: "No STUDIO_* environment variables"
        when: "resolveConfig runs"
        then: "Defaults are returned and mcpLaunch.command/args match the repo-root .mcp.json with cwd = repoRoot"
      - given: "STUDIO_PORT=4500"
        when: "resolveConfig runs"
        then: "config.port is 4500 and all other values remain defaults"
      - given: "An invalid override or a missing .mcp.json entry"
        when: "The server starts"
        then: "It exits non-zero before binding, logging a ConfigError with field, message, and fix"
      - given: "Any resolution outcome"
        when: "Config is inspected"
        then: "config.host is 127.0.0.1 — no override path exists"

  # ── server-bootstrap-and-lifecycle ──────────────────────────────

  - name: developer-starts-and-stops-studio-server
    feature: server-bootstrap-and-lifecycle
    number: 2
    actor: Studio Developer
    intent: "Run the server, confirm it only answers on localhost, and stop it with a signal; verify the graceful shutdown sequence and fatal-capture behavior."
    preconditions:
      - "Config resolves successfully (story 1)"
      - "buildServer wires config, logger, and status registry via injected dependencies"
    trigger_action: "Start the server from the composition root, then send SIGTERM"
    steps:
      - actor: Studio Developer
        action: "Runs the server entry point"
        system_response: "Fastify 5 listens on 127.0.0.1:4400; a structured startup log records the resolved config; the process stays in the foreground"
      - actor: Studio Developer
        action: "Requests http://127.0.0.1:4400/api/health from the same machine, then attempts the same port via the machine's LAN address"
        system_response: "The loopback request answers; the LAN request is refused — the server is bound to 127.0.0.1 only"
      - actor: Studio Developer
        action: "Starts a second instance on the same port"
        system_response: "EADDRINUSE is reported as a structured error naming port 4400 and the STUDIO_PORT override as the fix; the second process exits non-zero"
      - actor: Studio Developer
        action: "Sends SIGTERM to the running server"
        system_response: "The server stops accepting connections, closes open WebSocket connections with code 1001, runs registered shutdown hooks in reverse registration order (each logged by name), flushes logs, and exits 0"
      - actor: Studio Developer
        action: "Sends SIGINT twice in succession during a slow shutdown"
        system_response: "The first signal starts the graceful sequence; the second force-exits non-zero with a log line noting the forced exit"
      - actor: System
        action: "An unhandled promise rejection occurs inside a request handler during development"
        system_response: "A fatal structured log with the stack is emitted and a graceful shutdown is attempted — the process never dies silently"
    acceptance_criteria:
      - given: "A started server"
        when: "A request arrives on the loopback interface"
        then: "It is answered; the same port on a non-loopback interface refuses the connection"
      - given: "A running server holding the port"
        when: "A second instance starts"
        then: "It exits non-zero with an error naming the port and the STUDIO_PORT fix"
      - given: "Registered shutdown hooks A then B"
        when: "SIGTERM arrives"
        then: "B runs before A, both are logged by name, and the process exits 0"
      - given: "A shutdown hook that rejects"
        when: "Shutdown runs"
        then: "The failure is logged, remaining hooks still run, and the process exits non-zero"
      - given: "An unhandled rejection"
        when: "It reaches the process"
        then: "A fatal structured log with the stack precedes a shutdown attempt"

  # ── structured-logging ──────────────────────────────────────────

  - name: developer-traces-request-with-correlation-id
    feature: structured-logging
    number: 3
    actor: Studio Developer
    intent: "Follow a single request and a single WebSocket connection through the JSON logs using correlation IDs, and confirm secrets never appear."
    preconditions:
      - "Server running with the shared pino instance (Fastify's native logger is the same object)"
      - "ANTHROPIC_API_KEY is present in the process environment"
    trigger_action: "Issue an HTTP request and open a WebSocket connection, then read the stdout JSON logs"
    steps:
      - actor: Studio Developer
        action: "Requests GET /api/health and inspects the log stream"
        system_response: "Request-scoped log lines share one requestId (UUID); request completion is logged with status code and the same requestId"
      - actor: Studio Developer
        action: "Opens a WebSocket to /ws and later closes it"
        system_response: "Connection open and close events are logged with the same connectionId; no log line for the connection lacks it"
      - actor: Studio Developer
        action: "Greps the captured log output for the ANTHROPIC_API_KEY value"
        system_response: "No match — redaction paths replace the key at the logger level, so no downstream capability can leak it"
      - actor: System
        action: "A capability logs through its child logger (logger.child({ component: 'bridge' }))"
        system_response: "Its lines carry the component binding alongside the correlation IDs, so per-capability filtering is a single jq expression"
    acceptance_criteria:
      - given: "One HTTP request"
        when: "Its log lines are collected"
        then: "All share a single requestId and the completion line includes the status code"
      - given: "One WebSocket connection"
        when: "Open and close are logged"
        then: "Both lines carry the same connectionId"
      - given: "ANTHROPIC_API_KEY set in the environment"
        when: "The full log output is searched for its value"
        then: "Zero occurrences — redaction is asserted in a test against captured output"
      - given: "A child logger with a component binding"
        when: "It logs"
        then: "Lines carry component plus correlation fields in valid JSON"

  # ── health-and-readiness ────────────────────────────────────────

  - name: scripted-client-checks-health-readiness
    feature: health-and-readiness
    number: 4
    actor: Scripted Client
    intent: "Poll GET /api/health and read truthful process, bridge, store, and auth status — including before sibling capabilities exist and while a provider is failing."
    preconditions:
      - "Server running (story 2)"
      - "StatusRegistry injected into buildServer; providers register independently"
    trigger_action: "Request GET /api/health at different registry states"
    steps:
      - actor: Scripted Client
        action: "Requests /api/health on a fresh Wave 1 server with no providers registered"
        system_response: "200 with status ok; process carries pid, uptimeSeconds, and version; bridge, store, and auth each report status \"unregistered\""
      - actor: System
        action: "mcp-bridge (Wave 2) registers its provider reporting up; workspace-store registers reporting ok"
        system_response: "Subsequent health responses show bridge \"up\" and store \"ok\" without studio-server importing either capability — the registry is the only seam"
      - actor: Scripted Client
        action: "Requests /api/health while a stub provider throws"
        system_response: "200 with overall status degraded; the failing component reports \"unavailable\" with the error message as detail; all other fields are unaffected"
      - actor: Scripted Client
        action: "Requests /api/health while a stub provider hangs"
        system_response: "The per-provider timeout converts it to \"unavailable\" with a timeout detail; the response returns within the bounded budget"
    acceptance_criteria:
      - given: "No registered providers"
        when: "GET /api/health"
        then: "200 ok with process populated and bridge/store/auth = \"unregistered\""
      - given: "A provider reporting ok and a provider throwing"
        when: "GET /api/health"
        then: "Overall status is degraded; only the throwing component is \"unavailable\" with detail"
      - given: "A hanging provider"
        when: "GET /api/health"
        then: "The response arrives within the timeout budget and marks that component \"unavailable\""
      - given: "Any health state"
        when: "The endpoint answers"
        then: "HTTP status is 200 — readiness is expressed in the body, liveness by answering"

  # ── client-hosting-and-ws-upgrade ───────────────────────────────

  - name: user-loads-built-client
    feature: client-hosting-and-ws-upgrade
    number: 5
    actor: Studio User
    intent: "Open the studio in a browser and receive the built SPA — or a clear instruction page when the client has not been built — while the API keeps working either way."
    preconditions:
      - "Server running with clientDistDir resolved from config"
    trigger_action: "Navigate to http://127.0.0.1:4400/ with and without a client build present"
    steps:
      - actor: Studio User
        action: "Opens / with a built client in studio/client/dist"
        system_response: "index.html is served; hashed assets load with immutable cache headers; index.html itself is served no-cache so new builds appear on reload"
      - actor: Studio User
        action: "Refreshes the browser on a client-side route like /workspace/my-project"
        system_response: "The extensionless unknown path falls back to index.html and the SPA router resumes the route — no 404 on refresh"
      - actor: Studio User
        action: "Requests /api/health and a missing asset like /logo-missing.png"
        system_response: "/api/health answers JSON (API precedence over the fallback); the missing asset with a file extension returns 404, not index.html"
      - actor: Studio User
        action: "Opens / before the client has ever been built"
        system_response: "A plain page names the client build command; a startup warning was logged; /api and /ws remain fully functional"
    acceptance_criteria:
      - given: "A built client in clientDistDir"
        when: "GET /"
        then: "index.html is served and hashed assets carry immutable cache headers"
      - given: "A client-side route refresh (extensionless unknown path)"
        when: "The browser requests it"
        then: "index.html is served (SPA fallback); /api and /ws paths never fall back"
      - given: "A missing path with a file extension"
        when: "It is requested"
        then: "404 is returned, not index.html"
      - given: "No client build present"
        when: "GET /"
        then: "A plain instruction page names the build command while /api/health still answers"

  - name: scripted-client-opens-websocket-connection
    feature: client-hosting-and-ws-upgrade
    number: 6
    actor: Scripted Client
    intent: "Connect to /ws and exercise the connection plumbing — acceptance, not-ready envelope, heartbeat termination, and shutdown close code — before studio-api supplies any message semantics."
    preconditions:
      - "Server running; no WsConnectionHandler registered yet (Wave 1 state)"
      - "Heartbeat interval and missed-pong policy configured"
    trigger_action: "Open a real WebSocket to ws://127.0.0.1:4400/ws and exchange traffic"
    steps:
      - actor: Scripted Client
        action: "Opens a WebSocket to /ws"
        system_response: "The upgrade is accepted; a connectionId is assigned and logged with the open event"
      - actor: Scripted Client
        action: "Sends any message before studio-api exists"
        system_response: "A typed server.not_ready error envelope is returned on the connection (what is missing and that the API surface arrives with studio-api); the connection stays open"
      - actor: System
        action: "A test handler is registered via the WsConnectionHandler seam and a new client connects"
        system_response: "onConnection receives a WsConnection; send and onMessage round-trip raw strings — message parsing stays out of studio-server"
      - actor: Scripted Client
        action: "Stops answering heartbeat pings"
        system_response: "After the missed-pong threshold the server terminates the connection and logs the reason with the connectionId"
      - actor: System
        action: "SIGTERM arrives while connections are open"
        system_response: "Every open connection is closed with code 1001 before shutdown hooks run; the scripted client observes the close code"
    acceptance_criteria:
      - given: "No registered connection handler"
        when: "A client sends a message on /ws"
        then: "A server.not_ready error envelope is returned and the connection remains open"
      - given: "A registered stub handler"
        when: "A client connects and sends a raw string"
        then: "onConnection fired with a WsConnection and the string round-trips unmodified"
      - given: "A client that never answers pings"
        when: "The missed-pong threshold is reached"
        then: "The connection is terminated and the reason is logged with its connectionId"
      - given: "Open connections during shutdown"
        when: "SIGTERM arrives"
        then: "Clients receive close code 1001 before shutdown hooks run"
