# Interaction Stories — mcp-bridge
# Layer: infrastructure | Wave: 2

capability: mcp-bridge

stories:

  # ── transport-and-supervision ───────────────────────────────────

  - name: engineer-connects-bridge-to-real-mcp-server
    feature: transport-and-supervision
    number: 1
    actor: Server Engineer
    intent: "Start the bridge from studio-server configuration and verify it spawns, handshakes with, and cleanly shuts down the real design-systems MCP server."
    preconditions:
      - "studio-server config resolves the launch command (command /usr/local/bin/python3, args design-systems/mcp-server/server.py, cwd = repo root, per .mcp.json)"
      - "The design-systems MCP server runs from the repo (the same setup Claude Code uses via .mcp.json)"
      - "@modelcontextprotocol/sdk is installed in studio/server"
    trigger_action: "Call createMcpBridge(config, logger) and await bridge.start() in an integration test"
    steps:
      - actor: Server Engineer
        action: "Constructs the bridge via createMcpBridge with injected config and pino logger, then awaits start()"
        system_response: "StdioClientTransport spawns the python3 subprocess with cwd = repo root; the MCP initialize handshake completes; subprocess stderr is piped into pino"
      - actor: System
        action: "Runs the startup verification — listTools against the connected server"
        system_response: "The tool list contains ds_list_systems, ds_load_system, ds_get_rulebook, ds_check_compliance, wf_get_tokens, wf_read_component; bridge status transitions to up and is registered in the health registry"
      - actor: Server Engineer
        action: "Calls bridge.listSystems() as a smoke check"
        system_response: "BridgeResult resolves ok: true with the registered system descriptors (id, name, tagline, grammar_family, version, spec_version, status)"
      - actor: Server Engineer
        action: "Awaits bridge.stop()"
        system_response: "The transport closes, the subprocess terminates (no orphan python3 process), status transitions to stopped, and the shutdown is logged"
    acceptance_criteria:
      - given: "Valid bridge config mirroring .mcp.json"
        when: "start() is awaited"
        then: "The real MCP server subprocess is running, the handshake has completed, and status() reports state up"
      - given: "A connected bridge"
        when: "listTools runs during startup verification"
        then: "All six direct-call tool names are present; if any were missing, start() would resolve into failed with a configuration error naming them"
      - given: "A bridge with state up"
        when: "stop() is awaited"
        then: "The subprocess exits, no orphan process remains, and status() reports stopped"

  - name: bridge-recovers-from-server-crash
    feature: transport-and-supervision
    number: 2
    actor: Studio User
    intent: "Keep working when the MCP server subprocess dies — the bridge restarts it with backoff and surfaces its state the whole time."
    preconditions:
      - "Bridge is up with the real MCP server subprocess running"
      - "Supervisor restart budget and backoff are configured via BridgeConfig"
      - "studio-api forwards bridge.status events over WS and reports bridge state on /api/health"
    trigger_action: "The MCP server subprocess is killed mid-session (integration test sends SIGKILL)"
    steps:
      - actor: System
        action: "Detects the transport close and subprocess exit"
        system_response: "Status transitions up → restarting; a bridge.status event is emitted; the exit code is logged with pino"
      - actor: Studio User
        action: "Had a compliance call in flight when the crash happened"
        system_response: "The in-flight call resolves { ok: false, error.kind: 'protocol' } — surfaced in place by the consumer, never a hung request or thrown exception"
      - actor: Studio User
        action: "Issues a library request while the bridge is restarting"
        system_response: "The call holds in the queue; the supervisor respawns the subprocess with exponential backoff and re-runs the handshake"
      - actor: System
        action: "Completes the restart handshake"
        system_response: "Status transitions restarting → up with restartCount incremented; a bridge.status event is emitted; held calls dispatch and resolve normally"
      - actor: System
        action: "Exhausts the restart budget when the server keeps dying (failure-path variant)"
        system_response: "Status transitions to failed with lastError set; held and new calls resolve { ok: false, error.kind: 'bridge_down' }; /api/health reports the failed bridge"
    acceptance_criteria:
      - given: "A bridge with state up and a call in flight"
        when: "The subprocess is killed"
        then: "The in-flight call resolves as a protocol-kind failure and status transitions to restarting with a bridge.status event"
      - given: "A bridge in restarting with held calls"
        when: "The respawn handshake completes"
        then: "Status is up, restartCount has incremented, and the held calls resolve successfully without resubmission"
      - given: "A server that crashes on every spawn attempt"
        when: "The restart budget is exhausted"
        then: "Status is failed, lastError is populated, and every call resolves bridge_down — nothing hangs and nothing throws"

  # ── call-management ─────────────────────────────────────────────

  - name: engineer-cancels-slow-tool-call
    feature: call-management
    number: 3
    actor: Server Engineer
    intent: "Bound every bridge call with a timeout and cancel calls that no longer matter, without destabilizing the shared transport."
    preconditions:
      - "Bridge is up against the real MCP server"
      - "Per-call timeout default is configured; CallOptions accepts timeoutMs and an AbortSignal"
      - "Calls serialize FIFO over the single stdio transport"
    trigger_action: "Issue concurrent bridge calls with a tight timeoutMs on one and an AbortController on another"
    steps:
      - actor: Server Engineer
        action: "Fires three calls concurrently (loadSystem, getTokens, readComponents)"
        system_response: "The queue dispatches them one at a time in submission order; queue depth is logged per call with its requestId"
      - actor: Server Engineer
        action: "Sets timeoutMs deliberately below the real duration of a heavy call"
        system_response: "The call resolves { ok: false, error.kind: 'timeout' }; the transport is NOT torn down; a late response for that requestId is discarded"
      - actor: Server Engineer
        action: "Aborts a still-queued call via AbortController.abort()"
        system_response: "The call is removed from the queue without ever dispatching and resolves { ok: false, error.kind: 'cancelled' }"
      - actor: Server Engineer
        action: "Issues a fresh call after the timeout and the cancellation"
        system_response: "The call dispatches normally and resolves ok: true — timeout and cancellation left the bridge healthy"
    acceptance_criteria:
      - given: "Three concurrent calls"
        when: "The queue processes them"
        then: "They dispatch serially in FIFO order and all settle exactly once"
      - given: "A call with timeoutMs smaller than the tool's real duration"
        when: "The timer expires"
        then: "The call resolves kind timeout, the bridge stays up, and the next call succeeds"
      - given: "A queued call with an AbortSignal"
        when: "The signal aborts before dispatch"
        then: "The call never reaches the MCP server and resolves kind cancelled"
      - given: "A call that completes and a timeout/abort racing it"
        when: "Both settle paths fire"
        then: "The first settlement wins and the result is delivered exactly once"

  # ── error-translation ───────────────────────────────────────────

  - name: consumer-receives-typed-error-result
    feature: error-translation
    number: 4
    actor: API Developer
    intent: "Branch on a typed BridgeResult for every failure mode instead of catching exceptions or parsing strings."
    preconditions:
      - "Bridge is up against the real MCP server"
      - "BridgeResult/BridgeError types are declared in the bridge-owned contract bridge.ts module (@studio/contract) and re-exported from studio/server/src/mcp"
      - "Skill error codes (SYSTEM_NOT_FOUND, INVALID_PATH, …) pass through as BridgeError.code"
    trigger_action: "Call bridge.loadSystem({ systemId: 'no-such-system' }) from a consumer"
    steps:
      - actor: API Developer
        action: "Calls loadSystem with an id that is not in the registry"
        system_response: "The MCP call itself succeeds; the tool returns the skill envelope { ok: false, errors: [{ code: 'SYSTEM_NOT_FOUND', message, detail }] }"
      - actor: System
        action: "Translates the envelope at the seam"
        system_response: "The wrapper resolves { ok: false, error: { kind: 'tool', code: 'SYSTEM_NOT_FOUND', message, detail } } — no exception crosses the seam"
      - actor: API Developer
        action: "Branches on result.ok and error.code in the library endpoint"
        system_response: "The endpoint returns a structured error response (what failed, how to fix) that the UI renders in place — no toast, no console-only error"
      - actor: API Developer
        action: "Calls getTokens for a system whose spec fails to load (flat wf_* error shape with string entries)"
        system_response: "Translation handles the string error list the same way — kind tool, message from the first entry, no code; pino logs requestId, tool, kind"
      - actor: API Developer
        action: "Calls listSystems while one registered spec file is missing from disk"
        system_response: "The result is ok: true with a degraded stub descriptor for that system and a SPEC_FILE_MISSING entry in warnings — warnings passed through, not flattened into an error"
    acceptance_criteria:
      - given: "loadSystem called with an unknown system id"
        when: "The result settles"
        then: "result.ok is false, error.kind is 'tool', error.code is 'SYSTEM_NOT_FOUND', and no exception was thrown"
      - given: "A tool failure carrying plain string errors (wf_* flat shape or the server's exception catchall)"
        when: "Translation runs"
        then: "The consumer still receives a BridgeError with kind 'tool' and a human-readable message"
      - given: "A successful call whose skill Result carries warnings"
        when: "The result settles"
        then: "result.ok is true and result.warnings contains the {code, message, detail} entries unmodified"
      - given: "Any bridge failure mode (protocol, tool, timeout, cancelled, bridge_down)"
        when: "A consumer compiles against BridgeResult in TypeScript strict mode"
        then: "The discriminated union forces handling of the failure branch before value access"

  # ── typed-tool-wrappers ─────────────────────────────────────────

  - name: server-fetches-tokens-through-typed-wrapper
    feature: typed-tool-wrappers
    number: 5
    actor: API Developer
    intent: "Serve library and compliance data through the injected bridge using fully typed wrappers for the six direct-call tools."
    preconditions:
      - "All six typed wrappers are implemented and integration-tested against the real MCP server"
      - "studio-api and artifact-pipeline receive the McpBridge instance via constructor injection (IoC — never a module-level singleton)"
      - "Payload types mirror the actual server.py result shapes"
    trigger_action: "The /api/library/:systemId/tokens endpoint handles a request for the swiss system"
    steps:
      - actor: API Developer
        action: "Implements the endpoint to call bridge.getTokens({ systemId: 'swiss' }) on the injected bridge"
        system_response: "The wrapper maps systemId → system_id, dispatches wf_get_tokens over the queue, parses the FastMCP JSON text content, and resolves AuthoringTokens (system_id, palette, drawing_rules, typography, layout)"
      - actor: API Developer
        action: "Implements the component endpoint with bridge.readComponent({ systemId: 'swiss', componentId: 'toggle' })"
        system_response: "The server resolves the bare family id to 'toggle-default'; ComponentRead carries the canonical component_id, raw svg_source, viewBox {w, h}, rendering_notes, anatomy, tier, states, constraints"
      - actor: Artifact Pipeline
        action: "Runs bridge.checkCompliance({ systemId, artifactPath }) with the absolute path of a freshly stored version SVG"
        system_response: "RawComplianceResult resolves with passed/failed/advisory counts and results [{rule_id, status, detail}] where detail is a structured Record parsed by the bridge from the wire's JSON string; for a system without a mechanical ruleset, ruleset is null with an explanatory note the pipeline branches on"
      - actor: API Developer
        action: "Implements the systems endpoint with bridge.listSystems() and the rulebook endpoint with bridge.getRulebook({ systemId })"
        system_response: "SystemDescriptor[] and RulebookEntry[] resolve fully typed; TypeScript strict mode verifies every field access at compile time"
    acceptance_criteria:
      - given: "An injected McpBridge and the swiss system registered"
        when: "getTokens({ systemId: 'swiss' }) resolves"
        then: "value.palette entries carry name, value, role, usage_constraint and value.system_id is 'swiss'"
      - given: "readComponent called with the bare id 'toggle'"
        when: "The result settles"
        then: "value.component_id is the canonical default variant and value.svg_source is non-empty with viewBox dimensions"
      - given: "A stored artifact version SVG and its system id"
        when: "checkCompliance runs with the absolute artifact path"
        then: "The raw result's passed + failed + advisory equals results.length and each result carries rule_id, status, and structured detail (Record<string, unknown>, not a JSON string)"
      - given: "The full wrapper surface"
        when: "The integration suite runs"
        then: "Every wrapper is exercised against the REAL design-systems MCP server — no mock of the server exists in the suite"
      - given: "A consumer module importing the bridge"
        when: "Code review checks the wiring"
        then: "The bridge arrives via injection (constructor/factory parameter); no module imports a shared bridge instance directly"
