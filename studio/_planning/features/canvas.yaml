# Features — canvas
# Capability: The always-center stage — native SVG artifact rendering, inspection, history, compliance
# Layer: ui | Wave: 6

capability: canvas

features:

  - name: svg-stage
    description: |
      The center stage surface. Renders artifact version SVG natively
      (inline DOM, no rasterization) from sanitized server content served
      by studio-api. Device frames at true platform dimensions (375×812
      mobile, 1280×800 desktop) with a side-by-side mode showing both
      platforms at once. Empty state points at the chat panel when no
      artifact exists. Live updates: artifact.version_created swaps the
      stage to the new head; generation renders progressively and never
      blocks interaction with the current version.
    scope:
      - Canvas panel registered in the docking-shell panel registry (always center, never railed)
      - Native inline SVG rendering of the active artifact version (no <img>, no canvas rasterization)
      - SVG content fetched from GET /api/workspaces/:wsId/artifacts/:artId/versions/:n/svg (server-sanitized, stable node IDs preserved)
      - Device frame chrome at true platform dimensions (375×812 mobile, 1280×800 desktop)
      - Platform mode switcher (mobile, desktop, side-by-side) with side-by-side rendering both platform artifacts when available
      - Empty state (no artifact in workspace) directing the user to the chat panel — no dead-end blank stage
      - Live swap on artifact.version_created WebSocket event (new head renders without user action)
      - Progressive, non-blocking loading state during generation (current version stays visible and interactive; generation status shown contextually on the stage)
      - Inline error display when SVG fetch fails (what failed, how to fix, in place — no toasts)
      - Reduced-motion respect for stage transitions (prefers-reduced-motion disables animated swaps)

  - name: stage-navigation
    description: |
      Zoom and pan over the framed artifact. Fit-to-frame is the default
      on every new artifact and platform-mode change. Mouse, trackpad,
      touch, and keyboard all drive the same viewport — full input parity.
      Zoom is clamped to a sane range; pan is bounded so the artifact can
      never be lost off-screen.
    scope:
      - Viewport model (zoom factor, pan offset) applied as a single transform over the framed stage
      - Fit-to-frame default on artifact load, platform-mode change, and panel resize
      - Mouse/trackpad zoom (scroll + modifier, pinch) and drag-to-pan
      - "Keyboard controls: +/- zoom, 0 fit-to-frame, 1 actual size (100%), arrow keys pan, all focusable without a pointer"
      - Zoom clamped (e.g. 10%–400%) and pan bounded (artifact edge never beyond viewport center)
      - Zoom level indicator with click/keyboard reset to fit
      - Side-by-side mode zooms/pans both frames as one viewport
      - Viewport state remembered per artifact within the session (switching artifacts and back restores the view)
      - Reduced-motion respect (no animated zoom easing when prefers-reduced-motion is set)

  - name: inspect-overlay
    description: |
      Devtools-style inspect-on-hover. With inspect toggled on, hovering
      an SVG node outlines it and shows a popover with component identity
      (component, variant) and token references (colors, type sizes,
      spacing) read from the version's spec metadata — never guessed from
      the SVG. Toggleable so plain viewing has zero overlay noise.
      Keyboard parity: inspect targets are reachable by keyboard, not
      hover-only.
    scope:
      - Inspect mode toggle (toolbar button + keyboard shortcut), off by default
      - Hover hit-testing against SVG nodes with stable node IDs from artifact metadata
      - Hovered node outline (non-destructive overlay rectangle, never mutates the artifact SVG)
      - Popover showing component id/name, variant, and token references (color, typography, spacing, radius) resolved from wireframe.spec.yaml metadata via the version spec endpoint
      - Mapping built from spec metadata (components_used, design_system block) keyed by stable node ID — no inference from visual attributes
      - Keyboard inspection (Tab/arrow keys cycle inspectable nodes while inspect mode is on; same popover as hover)
      - Popover positioning that stays inside the panel (flips/shifts at edges)
      - Nodes without metadata mapping show the node id and a "no component metadata" note rather than nothing
      - Screen-reader support (popover content exposed via aria-describedby on the focused inspect target)

  - name: history-filmstrip
    description: |
      Generation history as a filmstrip under the stage. Every version of
      the active artifact appears as a thumbnail in order; scrubbing
      previews any version on the stage without changing state; restore
      makes the selected version the new head through artifact-pipeline's
      restore-as-new-head semantics — undo, never a confirmation dialog,
      never a destructive rollback.
    scope:
      - Filmstrip strip of version thumbnails (native SVG scaled down, ordered oldest → newest, head marked)
      - Version metadata on hover/focus (version number, brief excerpt, tool, created timestamp from version provenance)
      - Scrub-to-preview (hover/arrow-key over a thumbnail renders that version on the stage; leaving returns to head)
      - Restore-as-new-head action (select a version, restore creates a new head pointing at that content — no confirmation dialog)
      - Undo affordance after restore (inline "Undo" restores the previous head as another new head; nothing is ever destroyed)
      - Live append on artifact.version_created (new version thumbnail appears without refresh)
      - Keyboard parity (Left/Right move scrub position, Home/End jump to first/head, Enter restores)
      - Filmstrip scrolls horizontally when versions exceed panel width; head always reachable
      - Collapsed/empty handling (single version → filmstrip shows one thumbnail, restore disabled with reason)

  - name: compliance-bar
    description: |
      Persistent compliance strip under the stage, fed by the compliance
      result artifact-pipeline computed for the rendered version. Per-rule
      pass/warn/fail chips; expanding a failed rule lists violations;
      clicking a violation highlights the offending SVG node on the stage
      via the stable node ID mapping. Pure rendering — the canvas never
      computes compliance.
    scope:
      - Persistent bar docked under the stage showing overall status (pass/warn/fail/pending) and per-rule chips
      - Compliance data fetched from GET /api/workspaces/:wsId/artifacts/:artId/versions/:n/compliance (rendered version, including scrub previews)
      - Per-rule expansion listing violations (rule, message, severity) inline — no modal
      - Click/Enter on a violation highlights the offending SVG node on the stage (outline + scroll/pan into view) via stable node IDs
      - Violations without a node mapping shown as list-only (highlight action disabled with reason, not hidden)
      - Pending state while artifact.compliance_completed has not yet arrived for the rendered version (non-blocking, current results stay visible)
      - Live refresh on artifact.compliance_completed WebSocket event
      - Keyboard parity (Tab through rule chips, Enter expands, arrow keys through violations, Enter highlights)
      - WCAG AA status colors with non-color status indicators (icon/shape per pass/warn/fail, not color alone)
