version: 1
# Index of design systems available to consumers (wireframe-skill, future
# mockup-skill, etc.). Maintained by design-system-skill — do not edit
# the entry shape by hand; use `python -m design_system_skill register`.
#
# Each entry:
#   id            — system identifier used in load_system() and consumer briefs
#   spec          — path to spec.yaml relative to this registry's directory
#                   (now lives inside the system's library directory)
#   status        — available | draft | deprecated
#   library_root  — path to the system's library (components/ + layouts/)
#                   relative to this registry's directory
systems:
  - id: wireframe
    spec: wireframe-library/spec.yaml
    status: available
    library_root: wireframe-library
  - id: swiss
    spec: swiss-library/spec.yaml
    status: available
    library_root: swiss-library
  - id: terminal
    spec: terminal-library/spec.yaml
    status: available
    library_root: terminal-library
  - id: editorial
    spec: editorial-library/spec.yaml
    status: available
    library_root: editorial-library
  - id: sketch
    spec: sketch-library/spec.yaml
    status: available
    library_root: sketch-library
  - id: prism
    spec: prism-library/spec.yaml
    status: available
    library_root: prism-library
  - id: revolt
    spec: revolt-library/spec.yaml
    status: available
    library_root: revolt-library
  - id: riso
    spec: riso-library/spec.yaml
    status: available
    library_root: riso-library
