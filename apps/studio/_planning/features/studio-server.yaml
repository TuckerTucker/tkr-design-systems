# Features — studio-server
# Capability: Fastify 5 process foundation for the studio server
# Layer: infrastructure | Wave: 1

capability: studio-server

features:

  - name: config-resolution
    description: |
      Single typed configuration object resolved at process start and
      injected into every other module (IoC — consumers receive config,
      never read the environment themselves). Resolves the repo root,
      the design-systems MCP server launch command from the repo-root
      .mcp.json, the workspace storage path, the client dist directory,
      the port, and the log level. Environment variables override
      defaults. Validation runs before the server binds: invalid config
      produces a typed error list naming each field and its fix, never
      a stack trace.
    scope:
      - Monorepo scaffolding delivered with this feature's slice — the apps/studio/package.json npm-workspaces root and the @studio/contract package skeleton (apps/studio/packages/contract with package.json + empty src/), scaffolded in Wave 1; each capability contributes its own contract modules in its own wave
      - StudioConfig type (repoRoot, mcpLaunch, workspacesDir, clientDistDir, port, host, logLevel)
      - Repo root detection (default: ancestor of apps/studio/server; STUDIO_REPO_ROOT override)
      - MCP launch command parsed from <repoRoot>/.mcp.json (mcpServers["tkr-design-systems"].command + args, cwd pinned to repo root because args are repo-root-relative)
      - Workspace path default <repoRoot>/apps/studio/workspaces (STUDIO_WORKSPACES_DIR override)
      - Client dist default <repoRoot>/apps/studio/client/dist (STUDIO_CLIENT_DIST override)
      - Port default 4400 (STUDIO_PORT override); host hard-coded to 127.0.0.1 (not configurable)
      - Log level default info (STUDIO_LOG_LEVEL override)
      - Validation as typed result (ok/errors), each error carrying field, message, and fix
      - Validation rules — repo root exists, .mcp.json exists and parses, MCP entry script path exists, port is an integer 1024–65535, log level is a known pino level

  - name: server-bootstrap-and-lifecycle
    description: |
      Fastify 5 instance construction and process lifecycle. buildServer
      receives its dependencies (config, logger, status registry,
      optional WS connection handler) and returns a StudioServer with
      start/shutdown plus a shutdown-hook registration seam other
      capabilities use for teardown (close MCP subprocess, flush store
      writes). Binds 127.0.0.1 only — localhost is the security boundary
      for this single-user local tool. SIGINT/SIGTERM trigger graceful
      shutdown; unhandled rejections and uncaught exceptions are
      captured, logged structurally, and escalate to shutdown.
    scope:
      - buildServer(deps) factory — Fastify 5 instance created from injected dependencies, never from globals
      - StudioServer interface (app, start, shutdown, registerShutdownHook)
      - Listen on config.port at 127.0.0.1 exclusively; EADDRINUSE reported with the fix (change STUDIO_PORT) and a non-zero exit
      - Signal handling — SIGINT and SIGTERM invoke shutdown exactly once (second signal forces exit)
      - Graceful shutdown sequence — stop accepting connections, close open WebSocket connections with code 1001, run registered shutdown hooks in reverse registration order, flush logs, exit 0
      - Shutdown deadline — hooks that do not settle within the configured budget are logged and abandoned; process force-exits non-zero
      - process.on("unhandledRejection") and process.on("uncaughtException") capture — structured fatal log with stack, then graceful shutdown attempt
      - Composition root (index.ts) wiring config → logger → registry → server, the only file with side effects at import

  - name: structured-logging
    description: |
      pino structured JSON logging shared by every server capability.
      The logger is built once from config and injected (Fastify's
      native pino integration receives the same instance). Correlation
      IDs follow the architecture contract: requestId per HTTP/WS
      request, connectionId per WebSocket connection, workspaceId
      wherever applicable. ANTHROPIC_API_KEY and authorization values
      are redacted at the logger level so no downstream capability can
      leak them.
    scope:
      - createLogger(config) factory returning a pino instance at config.logLevel
      - Fastify integration — the same pino instance passed as the Fastify logger option (no second logger)
      - requestId generation per HTTP request (UUID), echoed in the request log bindings and available to handlers
      - connectionId binding for WebSocket connection lifecycle logs
      - Child-logger convention — capabilities receive logger.child({ component }) bindings (bridge, store, api)
      - Redaction paths for ANTHROPIC_API_KEY, env dumps, and authorization headers
      - Startup log line recording resolved config (paths, port — never secrets)
      - Lifecycle events logged — server started, signal received, shutdown hook ran, shutdown complete, fatal capture

  - name: health-and-readiness
    description: |
      GET /api/health reporting process, bridge, store, and auth status
      in one envelope. studio-server owns only the process field and the
      registry; bridge, store, and auth values are supplied by
      mcp-bridge, workspace-store, and agent-orchestration through a
      StatusRegistry interface (IoC — providers register themselves,
      the endpoint never imports sibling capabilities). Components that
      have not registered yet report "unregistered", so the endpoint is
      truthful from the first request of Wave 1 onward.
    scope:
      - StatusRegistry interface (register(component, provider), snapshot()) injected into buildServer
      - HealthResponse and StatusReport declared in apps/studio/packages/contract/src/health.ts (canonical contract module, owned by studio-server) so the client and scripted clients import them
      - GET /api/health route returning { status, process, bridge, store, auth }
      - process field owned by studio-server — pid, uptimeSeconds, version (server package.json)
      - bridge/store/auth fields resolved through registered providers; "unregistered" placeholder when absent
      - Overall status derivation — ok when every registered provider reports ok/configured, degraded otherwise
      - Provider failure isolation — a throwing or hanging provider yields status "unavailable" with detail for that component only; the endpoint still answers
      - Per-provider timeout so one slow component cannot stall the health response
      - HTTP 200 for ok and degraded (readiness is expressed in the body; the process answering is liveness)

  - name: client-hosting-and-ws-upgrade
    description: |
      The HTTP/WS front door. Serves the built Vite client from
      clientDistDir with SPA fallback to index.html, and accepts
      WebSocket upgrades at /ws via @fastify/websocket — connection
      plumbing only: accept, assign connectionId, heartbeat, close
      semantics, and hand the connection to an injected handler.
      Message schemas and routing belong to studio-api; until a handler
      is registered, connections are accepted and any message is
      answered with a structured not-ready error.
    scope:
      - Static hosting of clientDistDir under / with SPA fallback (unknown non-/api, non-/ws GET paths serve index.html)
      - Missing client build handled gracefully — / serves a plain page naming the build command; /api and /ws remain fully functional
      - "/api and /ws route precedence over static fallback"
      - WebSocket endpoint /ws via @fastify/websocket (one connection per client per the architecture contract)
      - WsConnection abstraction (connectionId, send, close, onMessage, onClose) decoupling studio-api from the ws library
      - Injected WsConnectionHandler seam — studio-api registers the handler that owns message semantics
      - No-handler behavior — connection accepted; inbound messages answered with a typed server.not_ready error envelope
      - Heartbeat — server ping on an interval; missed pongs terminate the connection with a logged reason
      - Close semantics — client close logged with code; server shutdown closes all connections with code 1001
      - Connection lifecycle logging (open, close, terminate) bound to connectionId
