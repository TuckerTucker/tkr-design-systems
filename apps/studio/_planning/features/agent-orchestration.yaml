# Features — agent-orchestration
# Capability: Conversational agent loop — Claude Agent SDK sessions, intent routing, decision chips, event stream
# Layer: domain | Wave: 3

capability: agent-orchestration

features:

  - name: agent-session
    description: |
      Claude Agent SDK session per workspace. The session wraps the SDK's
      query() API with the design-systems MCP server configured through
      options (the SDK owns this connection — independent of mcp-bridge,
      which serves direct calls only). Session lifecycle: lazy creation on
      first chat message, reuse across turns within a workspace, disposal
      on workspace close or server shutdown. Plain-conversation turns run
      with no tool calls. SDK streaming messages are translated into the
      capability's typed AgentEvent stream.
    scope:
      - "SessionManager registry: one AgentSession per workspace, lazy create, dispose on close/shutdown"
      - AgentSession built on @anthropic-ai/claude-agent-sdk query() (TypeScript)
      - SDK MCP server configuration from studio-server config (design-systems/mcp-server launch command per repo-root .mcp.json)
      - ANTHROPIC_API_KEY injected into the SDK subprocess environment (resolved by auth-and-cancellation feature)
      - Routing system prompt authored once and injected per session (intents, default-selection rules, chip emission, grammar respect)
      - Plain conversation path — no tool invocation for messages that are questions/discussion
      - SDK stream → AgentEvent translation (message_started, assistant_delta, tool_started, tool_finished, message_completed)
      - Single in-flight run per workspace (second chat.send while busy is rejected with a typed, in-place error)
      - Typed error results across the capability seam (never thrown exceptions per architecture contract)
      - pino child logger per session with workspaceId and requestId correlation

  - name: intent-routing
    description: |
      Agent-driven routing of every chat message to one of four flows.
      New generation → wf_generate (routing_request → agent picks
      layout_id, directly or via wf_select_layout → full 7-step run).
      Content refinement → two-pass
      substitution (wf_build_substitution_request → agent judgment
      produces {find, replace, rationale} list → wf_apply_substitutions
      with grammar validation). Novel layout → compose flow (wf_generate
      compose=True returns a decomposition_request → agent authors a
      LayoutBlueprint JSON → wf_assemble_from_blueprint). Plain
      conversation → no tools. Routing is realized through the system
      prompt and tool availability, recorded as a typed RoutingResult
      per turn.
    scope:
      - Four-way intent classification per message (generate, substitute, compose, converse) recorded as RoutingResult with rationale, persisted as TranscriptRecord kind "routing_result"
      - Generate flow — wf_generate without layout_id returns routing_request (available patterns + components); agent selects layout_id (directly or via wf_select_layout) and calls again for the full run
      - Substitution flow — wf_build_substitution_request(brief, system_id, platform, layout_id) returns text_nodes + grammar_caveats; agent judgment produces substitutions; wf_apply_substitutions(svg_path, substitutions, system_id) returns svg_text + unapplied_finds + grammar_warnings
      - Compose flow — wf_generate(compose=True) returns decomposition_request; agent authors LayoutBlueprint {canvas, regions[{id, components[{component_id, x, y}]}]}; wf_assemble_from_blueprint(blueprint, system_id, output_dir) validates then assembles
      - Blueprint validation failure recovery — unknown component_ids and out-of-bounds placements come back as validation_errors; agent revises the blueprint and retries
      - Grammar-warning surfacing — unapplied_finds and grammar_warnings flow into the event stream, never silently dropped
      - "artifact_produced event per successful flow carrying an ArtifactSource (artifact.ts, artifact-pipeline-owned: kind 'paths' {svgPath, specPath} for wf_generate / wf_apply_substitutions; kind 'text' {svgText, specYaml?} for wf_assemble_from_blueprint) and provenance (brief, tool, parameters, parent version)"
      - Refinement targets the in-context artifact — no brief restatement required (context supplied by conversation-context-and-events feature)

  - name: decision-chips
    description: |
      Anticipate, don't ask. The agent never asks "which system?" up
      front — it picks defaults (design system, layout archetype,
      platform) from the brief and the routing_request's available
      patterns, then surfaces those choices as editable decision chips
      attached to the agent turn. Changing a chip re-runs only the
      affected step: system or layout change re-runs generation; platform
      change re-runs with the new platform; chips on a substitution or
      compose turn re-run that flow. Chip state persists in the
      transcript with the turn that produced it.
    scope:
      - Default selection rules in the routing prompt — system from brief cues or workspace setting, layout archetype from the routing_request pattern list, platform defaulting to desktop unless the brief implies mobile
      - "DecisionChip model (kind: system | layout | platform; value; valid options; which step a change re-runs)"
      - chips_updated event emitted with every tool-bearing agent turn, bound to the artifact and message that produced it
      - Chip option vocabularies sourced from real data — systems from the registry, layouts from the routing_request's available_patterns, platforms from the pipeline's supported set (mobile, desktop)
      - "updateChip entry point — the chip.update wire payload is ChipUpdatePayload {messageId, kind, value} (studio-api, ws-messages.ts); studio-api resolves artifactId from the ChipSet emitted for that messageId and hands this capability its domain ChipUpdate {requestId, artifactId, kind, value}; the session re-runs the affected step with the changed parameter, producing a new artifact version"
      - Re-run scoping — a platform chip change re-runs generation at the new platform; a layout chip change re-selects the pattern; a system chip change re-generates in the new system
      - Chip persistence in the transcript so restored workspaces show historical choices

  - name: conversation-context-and-events
    description: |
      Per-workspace, per-artifact conversation context and the typed
      event stream. Each artifact carries its own context window — the
      brief, the choices made, and prior refinement turns — so "swap the
      header copy" needs no restatement and refinements to artifact A
      never bleed into artifact B. Every message, tool-call record, and
      chip set persists through workspace-store repositories; reopening a
      workspace restores the conversation. The AgentEvent stream is the
      capability's outbound contract, consumed by studio-api which maps
      it onto the WS envelope (chat.*, chips.updated).
    scope:
      - Per-artifact context windows — transcript slices keyed by artifactId assembled into the session context for refinement turns
      - Active-artifact tracking — refinements without an explicit target apply to the workspace's active artifact
      - Context assembly bounds — oldest refinement turns summarized/truncated before the window grows unbounded
      - AgentEvent union (message_started, assistant_delta, tool_started, tool_finished, chips_updated, artifact_produced, message_completed, error) declared in studio/packages/contract/src/agent-events.ts (this capability's contributed module in the already-scaffolded @studio/contract package) and consumed by studio-api
      - Event ordering guarantee — message_started first, message_completed or error last, deltas and tool events strictly ordered between
      - Transcript persistence through the injected TranscriptRepository (IoC — the session receives the repository, never constructs paths)
      - Tool-call records persisted (tool name, parameters minus secrets, result summary, ok/failed)
      - Transcript restore on session creation — prior turns load from workspace-store and seed the context

  - name: auth-and-cancellation
    description: |
      ANTHROPIC_API_KEY resolution and run cancellation. The key resolves
      from the process environment first, then studio/.env (gitignored);
      it is injected into the Agent SDK subprocess environment, never
      logged (pino redaction), and never written into workspace files.
      Auth status (configured / missing / invalid) is reported for
      /api/health and the auth.status event. Keyless mode degrades
      gracefully: the session refuses generation with the reason and fix
      in place rather than crashing. chat.cancel aborts an in-flight run
      mid-generation and leaves the transcript and artifact state
      consistent. claude.ai subscription login is explicitly out —
      Anthropic policy prohibits it for embedded SDK apps.
    scope:
      - Key resolution order — process environment, then studio/.env (parsed with the yaml/dotenv conventions of the server config loader)
      - Key injection into the SDK subprocess environment only; never into workspace files or logs
      - pino redaction paths covering the key in all session and config loggers
      - "AuthState (status: configured | missing | invalid; source: env | dotenv | null) exposed to studio-server health and pushed as auth.status"
      - Invalid-key detection — SDK authentication failures map to status invalid with the fix shown in place
      - Keyless degradation — chat.send with no key returns a typed error event (what is missing, where to put it); no SDK process spawns; library/canvas/compliance paths unaffected
      - Cancellation — chat.cancel(requestId) aborts the SDK query via AbortController, emits a cancelled error event, marks the transcript turn cancelled
      - Cancellation consistency — no partial artifact version is produced; a cancelled run leaves the prior head version untouched
