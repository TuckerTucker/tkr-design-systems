# ═══════════════════════════════════════════════════════════════════════
# EXECUTION NOTES
# ═══════════════════════════════════════════════════════════════════════

execution_notes:

  launch_order_within_waves:
    wave_1: >
      Launch w1-studio-server first. w1-workspace-store starts as soon
      as the monorepo root and @studio/contract skeleton land
      (studio-server slice 1) — everything after that is fully
      parallel. Neither agent touches the other's directories.
    wave_2: >
      Single agent. Before launching, verify the design-systems MCP
      server starts locally (python per repo-root .mcp.json) — the
      integration suite depends on it.
    wave_3: >
      Launch w3-artifact-pipeline first — its slice 1 declares
      ArtifactSource in artifact.ts, which w3-agent-orchestration's
      generation flow (slice 3) imports. The agent-orchestration agent
      starts immediately on slices 1-2 (auth resolution, plain
      conversation), which need no artifact types. Real-key SDK tests
      incur API cost — run the keyed suite once per slice completion,
      not per edit.
    wave_4: >
      Single agent. Implement slices in order — the contract modules
      (slice 1) underpin everything. Slice 7 (headless loop) is the
      capstone: run it last, with ANTHROPIC_API_KEY present, against
      the real MCP server. It is the executable Phase 1 exit criterion.

  binding_documents: >
    studio/_planning/architecture.md is authoritative over any
    individual spec if a conflict surfaces mid-implementation — fix
    the spec, don't fork the contract. Each agent reads its own
    specs/<capability>.yaml (13 sections) and slices/<capability>.yaml
    before writing code. The contract package ownership table in
    architecture.md is binding: an agent only creates contract modules
    it owns; it imports everything else.

  reference_usage: >
    The design-systems MCP server (design-systems/mcp-server/) and the
    wireframe-skill python modules are read-only upstream dependencies
    — consult them for exact tool result shapes (Result envelope,
    GenerationResult, RawComplianceResult wire form, spec.yaml schema
    from emit.py) but never modify them. The compass_app repo
    (/Users/tucker/@tucker/compass_app/) is a format/process reference
    only — no code is shared.

  testing_strategy: >
    Tests ship with each slice, not after the wave. Real seams per
    architecture.md: temp-dir store tests, real-MCP-server bridge
    tests, real HTTP/WS protocol tests. The MCP server is never
    mocked. Two test tiers for agent-orchestration: keyless
    (degradation, routing, persistence — runs in any environment) and
    keyed (real SDK generation — requires ANTHROPIC_API_KEY, incurs
    API cost, gates L4/L5 only). Gates at L4+ block wave completion;
    no wave advances with a red suite.

  cross_agent_communication: >
    Producing agents complete contract deliverables before consumers
    import them. In practice:
    - Wave 1: studio-server lands the monorepo + contract skeleton
      before workspace-store contributes store.ts
    - Wave 3: artifact-pipeline lands artifact.ts (ArtifactSource)
      before agent-orchestration emits typed artifact_produced events
    - Wave 4: studio-api consumes every prior contract; any shape
      mismatch discovered here is a spec bug — fix the owning spec and
      architecture.md together, then resume.
