# Interaction Stories — artifact-pipeline
# Layer: domain | Wave: 3

capability: artifact-pipeline

stories:

  # ── version-ingestion ───────────────────────────────────────────

  - name: agent-result-lands-as-version
    feature: version-ingestion
    number: 1
    actor: Agent Orchestration (system)
    intent: "Hand a completed wf_generate result to the pipeline so it lands as an immutable, provenance-carrying version the canvas can render."
    preconditions:
      - "Workspace exists; workspace-store repositories are available"
      - "wf_generate completed over the Agent SDK's MCP connection with ok=true, svg_path, and spec_path"
      - "The brief and the exact tool parameters used are known to the orchestrator"
    trigger_action: "Agent loop finishes a producing tool call and invokes the pipeline's ingest with the tool result and provenance"
    steps:
      - actor: Agent Orchestration (system)
        action: "Calls ingest with the ArtifactSource payload of artifact_produced ({ kind: 'paths', svgPath, specPath } from the wf_generate result, plus system_id and selection) and provenance (brief, tool wf_generate, parameters)"
        system_response: "Pipeline reads the SVG and spec.yaml from the tool's output paths, parses metadata, and lands versions/0001/ (wireframe.svg, wireframe.spec.yaml, version.yaml) through workspace-store"
      - actor: System
        action: "First version of a new artifact detected"
        system_response: "artifact.yaml created with id, name, system (from metadata), platform, and headVersion = 1"
      - actor: System
        action: "Version directory is durable"
        system_response: "artifact.version_created emitted with workspaceId, artifactId, version 1, headVersion 1, and the provenance summary; the API stream relays it"
      - actor: Agent Orchestration (system)
        action: "Hands a follow-up substitution result for the same artifact to ingest"
        system_response: "versions/0002/ lands with parent 1, tool wf_apply_substitutions; headVersion moves to 2; version 0001 untouched"
      - actor: Agent Orchestration (system)
        action: "Hands a wf_assemble_from_blueprint result as { kind: 'text', svgText, specYaml? } — SVG text, no output paths"
        system_response: "Text ingestion is a first-class branch of the ArtifactSource contract: the pipeline persists svgText through the same landing path; the resulting version is structurally identical to a paths-branch version"
      - actor: Agent Orchestration (system)
        action: "Hands a tool result with ok=false (generation failed)"
        system_response: "No version is created; a typed failure carrying the tool's errors returns to the orchestrator to surface in chat in place"
    acceptance_criteria:
      - given: "A successful wf_generate result with svg_path and spec_path"
        when: "Ingest runs"
        then: "versions/0001/ contains wireframe.svg, wireframe.spec.yaml, and version.yaml with parent null, brief, tool, parameters, and created timestamp"
      - given: "A version has landed"
        when: "The event stream is observed"
        then: "Exactly one artifact.version_created event carries the workspace, artifact, version number, and new head"
      - given: "A tool result with ok=false or a missing svg_path"
        when: "Ingest runs"
        then: "No version directory exists and the caller receives a typed failure naming what was missing"
      - given: "A second producing result for the same artifact"
        when: "Ingest runs"
        then: "Version 0002 records parent 1, headVersion reads 2, and 0001 is byte-identical to before"
      - given: "An assembly result arriving as { kind: 'text' } with svgText"
        when: "Ingest runs"
        then: "The version lands complete through the same path as the paths branch — no edge-case handling visible to the caller"

  # ── version-graph ───────────────────────────────────────────────

  - name: user-restores-prior-version-as-new-head
    feature: version-graph
    number: 2
    actor: Studio User
    intent: "Scrub back to an earlier version and make it current without losing any later work — undo, not confirmation."
    preconditions:
      - "An artifact has versions 0001–0003 with headVersion = 3"
      - "Version listing is reachable through the API (headless: scripted client; Phase 2: history filmstrip)"
    trigger_action: "User selects version 1 in the history and triggers restore"
    steps:
      - actor: Studio User
        action: "Requests the version list for the artifact"
        system_response: "Pipeline returns VersionSummary entries (number, parent, tool, brief, created, compliance counts) ordered for the scrubber"
      - actor: Studio User
        action: "Triggers restore of version 1 — no 'Are you sure?' dialog appears"
        system_response: "Pipeline creates version 0004 whose content copies 0001, with provenance tool 'restore' and parameters.restored_from = 1; headVersion moves to 4"
      - actor: System
        action: "Restore version lands"
        system_response: "artifact.version_created emitted exactly as for a generation; the canvas re-renders the new head; compliance runs on 0004 like any version"
      - actor: Studio User
        action: "Changes their mind and restores version 3"
        system_response: "Version 0005 lands copying 0003, restored_from = 3; nothing was ever deleted — the full history including both restores remains scrubbable"
    acceptance_criteria:
      - given: "An artifact with headVersion = 3"
        when: "Version 1 is restored"
        then: "Version 0004 exists with content identical to 0001, tool 'restore', parameters.restored_from = 1, and headVersion = 4"
      - given: "A completed restore"
        when: "The version list is read"
        then: "Versions 0001–0004 all appear; no version was deleted or modified"
      - given: "A restore request for a version that does not exist"
        when: "Restore runs"
        then: "A typed VERSION_NOT_FOUND failure returns and headVersion is unchanged"
      - given: "A restore has landed"
        when: "The event stream is observed"
        then: "artifact.version_created fires with the new version number — the canvas needs no restore-specific handling"

  # ── spec-metadata ───────────────────────────────────────────────

  - name: client-reads-typed-version-metadata
    feature: spec-metadata
    number: 3
    actor: Scripted API Client (headless Phase 1; canvas in Phase 2)
    intent: "Read a version's metadata as typed JSON — design system, layout, components used, compliance summary — without parsing YAML."
    preconditions:
      - "A version landed from a system generation (e.g. swiss) with a populated design_system block"
      - "The spec endpoint serves ParsedSpecMetadata through studio-api"
    trigger_action: "Client requests the version's spec metadata"
    steps:
      - actor: Scripted API Client
        action: "GETs /api/workspaces/:wsId/artifacts/:artId/versions/1/spec"
        system_response: "Pipeline parses wireframe.spec.yaml with the yaml package and returns ParsedSpecMetadata: wireframe block (brief, platform, dimensions, generated_at, generator_version) and design_system block (id, spec_version, layout_template_used, pattern_source_svg)"
      - actor: Scripted API Client
        action: "Reads design_system.components_used"
        system_response: "Each entry is typed (id, region, x, y, type library|custom; svg_length for custom) — inspect-on-hover renders component identity from this list"
      - actor: Scripted API Client
        action: "Reads design_system.rulebook_compliance"
        system_response: "Generation-time summary (checked, mechanical_passed, mechanical_failed, advisory_warnings, failed_rules, ruleset, scope) is present; the canonical per-version report lives in the compliance endpoint"
      - actor: Scripted API Client
        action: "Requests metadata for a neutral-library version (no system)"
        system_response: "design_system.id is null with the explanatory note; the parse succeeds and the wireframe block is fully populated"
    acceptance_criteria:
      - given: "A swiss-generated version"
        when: "The spec endpoint is read"
        then: "design_system.id is 'swiss' and layout_template_used names the pattern actually selected (matching the YAML on disk)"
      - given: "An assembled version with custom components"
        when: "components_used is read"
        then: "Custom entries carry type 'custom' and svg_length; library entries carry their component id and region"
      - given: "A neutral-library version"
        when: "The spec endpoint is read"
        then: "design_system.id is null, the note is present, and no parse error occurs"
      - given: "A version whose spec.yaml is malformed"
        when: "The spec endpoint is read"
        then: "A typed parse error names the offending field; the SVG endpoint still serves the artifact"

  # ── compliance-pipeline ─────────────────────────────────────────

  - name: compliance-attaches-to-every-version
    feature: compliance-pipeline
    number: 4
    actor: System (compliance runner)
    intent: "Run ds_check_compliance through the mcp-bridge on every landed version and attach the full rule-level report as a reported state — failures included."
    preconditions:
      - "mcp-bridge is up with its stdio connection to tools/mcp-server"
      - "A version has landed (any producing tool, including restore)"
    trigger_action: "artifact.version_created fires; the compliance runner picks up the version with state pending"
    steps:
      - actor: System (compliance runner)
        action: "Calls the bridge's ds_check_compliance wrapper with system_id and the persisted versions/0001/wireframe.svg path"
        system_response: "Bridge maps its internal RawComplianceResult onto the canonical ComplianceReport: {system_id, artifact_path, scope, passed, failed, advisory, results: [{rule_id, status, detail}], ruleset, mechanical_only} — rule detail arrives as structured Record<string, unknown>, never a JSON string"
      - actor: System (compliance runner)
        action: "Persists the report plus derived violation mappings as compliance.yaml beside the SVG"
        system_response: "Version state transitions pending → completed; artifact.compliance_completed emits with the counts"
      - actor: System (compliance runner)
        action: "Processes a version whose rulebook fails (failed > 0)"
        system_response: "The version remains landed and renderable; compliance.yaml records the failures with rule-level detail — a reported state, not an ingestion error"
      - actor: System (compliance runner)
        action: "Attempts a run while the bridge is restarting"
        system_response: "State becomes unavailable with reason 'bridge_unavailable'; when bridge.status recovers, the re-run path transitions the version to completed"
      - actor: System (compliance runner)
        action: "Processes a version for a system with no mechanical ruleset"
        system_response: "Zero-count report with the explanatory note recorded as completed — the compliance bar shows 'no mechanical rules', not an error"
    acceptance_criteria:
      - given: "Any landed version"
        when: "The compliance runner completes"
        then: "compliance.yaml exists in the version directory with the full results list (rule_id, status pass|fail|advisory, detail)"
      - given: "A version with mechanical failures"
        when: "Ingestion and compliance both finish"
        then: "The version is landed and head-pointed normally; failed counts appear in the report — landing never blocked on compliance"
      - given: "The bridge is down during the run"
        when: "Compliance is attempted"
        then: "State is unavailable with a reason; the version serves normally and the run is repeatable after recovery"
      - given: "Compliance completes"
        when: "The event stream is observed"
        then: "artifact.compliance_completed carries passed/failed/advisory matching compliance.yaml"

  # ── svg-serving + violation mapping ─────────────────────────────

  - name: violation-highlights-svg-node
    feature: svg-serving
    number: 5
    actor: Studio User
    intent: "Click a violation in the compliance bar and see the offending SVG element highlighted on the canvas."
    preconditions:
      - "A version landed with a failing rule (e.g. swiss-fixed-type-scale: an off-scale font size)"
      - "compliance.yaml carries the report and ViolationNodeMapping entries"
      - "The SVG endpoint serves the sanitized document"
    trigger_action: "User clicks the failing rule in the compliance bar"
    steps:
      - actor: System
        action: "At compliance time, the mapper scanned the sanitized SVG for elements matching the rule's detail evidence (the offending font-size value)"
        system_response: "ViolationNodeMapping for swiss-fixed-type-scale lists the element ids carrying that value, matchedBy 'attribute-value', with the evidence subset"
      - actor: Studio User
        action: "Loads the artifact — the client fetches the sanitized SVG"
        system_response: "Document contains no scripts, event handlers, or external references; every element id from the stored SVG is present unchanged (assembled group ids like region__component_index intact)"
      - actor: Studio User
        action: "Clicks the swiss-fixed-type-scale violation in the compliance bar"
        system_response: "Canvas resolves the mapping's nodeIds against the rendered document and highlights the offending elements in place"
      - actor: Studio User
        action: "Clicks a document-scope violation (e.g. xml-well-formed)"
        system_response: "matchedBy is 'document' with empty nodeIds; the canvas highlights the artifact frame instead of a specific node"
    acceptance_criteria:
      - given: "A swiss artifact with one element at an off-scale font size"
        when: "Compliance and mapping complete"
        then: "The swiss-fixed-type-scale mapping lists exactly the ids of the elements carrying that font size"
      - given: "The stored wireframe.svg"
        when: "The SVG endpoint serves it"
        then: "Scripts, on* attributes, foreignObject, and external href/src are absent; all id attributes are byte-identical to the stored file"
      - given: "A violation whose evidence matches no element (value normalized away)"
        when: "The mapping is read"
        then: "matchedBy is 'document' with empty nodeIds — the canvas degrades to whole-artifact highlight, never a broken click"
      - given: "The same version served repeatedly"
        when: "Sanitized documents are compared"
        then: "Output is deterministic, so mapped nodeIds always resolve against what the client renders"
