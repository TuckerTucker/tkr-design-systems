# Interaction Stories — chat-panel
# Layer: ui | Wave: 6

capability: chat-panel

stories:

  # ── composer ────────────────────────────────────────────────────

  - name: designer-sends-brief-from-composer
    feature: composer
    number: 1
    actor: Designer
    intent: "Type a multiline brief and send it; see the message land and the composer hand off to the agent without losing context."
    preconditions:
      - Workspace is attached over the WebSocket connection (shell-driven workspace.attach)
      - auth.status reports configured
      - No generation is in flight
    trigger_action: Type a brief in the composer and press Enter
    steps:
      - actor: Designer
        action: "Types a multi-line brief using Shift+Enter for line breaks ('Login screen for a banking app / mobile / keep it minimal')"
        system_response: "Composer auto-grows with the content; Shift+Enter inserts newlines without sending"
      - actor: Designer
        action: "Presses Enter (or activates the send affordance)"
        system_response: "chat.send dispatched with the workspace context; the user message appends to the transcript optimistically; composer clears and disables with visible reason ('Agent is working — cancel to send a new message')"
      - actor: System
        action: "chat.message_started arrives for the request"
        system_response: "A streaming assistant message opens beneath the user turn; the cancel control replaces the send affordance"
      - actor: System
        action: "chat.message_completed arrives"
        system_response: "Streaming message closes; composer re-enables and receives focus, ready for a refinement"
    acceptance_criteria:
      - given: "A multi-line draft in the composer"
        when: "The designer presses Shift+Enter"
        then: "A newline is inserted; nothing is sent"
      - given: "A non-empty draft and an idle agent"
        when: "The designer presses Enter"
        then: "chat.send is dispatched and the user message appears in the transcript immediately (optimistic append)"
      - given: "A whitespace-only draft"
        when: "The designer presses Enter"
        then: "Nothing is sent; the send affordance is disabled"
      - given: "The agent is busy after a send"
        when: "The designer looks at the composer"
        then: "It is disabled with the reason text rendered adjacent to the input — not silently greyed"
      - given: "A component reference dropped into the composer from the library panel"
        when: "The message is sent"
        then: "The reference rendered as a removable chip on the draft and chat.send carries it in ChatSendPayload's references field"

  - name: designer-sees-missing-key-guidance
    feature: composer
    number: 2
    actor: Designer
    intent: "Understand why generation is unavailable and how to fix it, without leaving the panel or opening a console."
    preconditions:
      - Studio server is running without ANTHROPIC_API_KEY (keyless mode)
      - auth.status has been pushed with state missing
    trigger_action: Open the studio and look at the chat panel
    steps:
      - actor: Designer
        action: "Opens the studio with no API key configured"
        system_response: "Transcript (if any) renders normally; the composer is disabled with in-place guidance: 'Add ANTHROPIC_API_KEY to studio/.env'"
      - actor: Designer
        action: "Adds the key to studio/.env and the server detects it"
        system_response: "auth.status configured is pushed; the composer enables in place without a reload and receives focus"
    acceptance_criteria:
      - given: "auth.status reports missing"
        when: "The designer views the chat panel"
        then: "The composer is disabled with the visible reason 'Add ANTHROPIC_API_KEY to studio/.env' — no toast, no console-only error"
      - given: "Keyless mode"
        when: "The designer reads the existing transcript"
        then: "All prior messages, chips, and references render read-only and intact"
      - given: "auth.status transitions to configured"
        when: "The event arrives"
        then: "The composer enables in place; any preserved draft is intact"

  - name: designer-cancels-generation
    feature: composer
    number: 3
    actor: Designer
    intent: "Stop a generation that is heading the wrong way and immediately redirect the agent."
    preconditions:
      - A generation is streaming (chat.message_started received, not yet completed)
      - The cancel control has replaced the send affordance
    trigger_action: Activate the cancel control during streaming
    steps:
      - actor: Designer
        action: "Activates the cancel control (click or keyboard)"
        system_response: "chat.cancel is dispatched with the active requestId"
      - actor: System
        action: "Server stops the agent turn and emits the closing event"
        system_response: "The streaming message closes marked as cancelled in place; composer re-enables and receives focus"
      - actor: Designer
        action: "Types a corrected brief and sends"
        system_response: "New chat.send dispatched; conversation continues with the cancelled turn preserved in the transcript"
    acceptance_criteria:
      - given: "A streaming generation"
        when: "The designer activates cancel"
        then: "chat.cancel is sent and the composer re-enables when the closing event arrives"
      - given: "A cancelled turn"
        when: "The designer views the transcript"
        then: "The partial assistant message remains, marked cancelled in place — no confirmation dialog was shown"
      - given: "Cancel racing completion"
        when: "chat.message_completed arrives before the cancel takes effect"
        then: "The turn completes normally and the cancel is a silent no-op"

  # ── message-stream ──────────────────────────────────────────────

  - name: designer-watches-assistant-stream
    feature: message-stream
    number: 4
    actor: Designer
    intent: "Follow the agent's response and tool activity as it happens, with screen-reader parity."
    preconditions:
      - A brief has been sent; chat.message_started has opened a streaming message
      - The transcript is scrolled to the bottom (pinned)
    trigger_action: Assistant deltas and tool events stream over the WebSocket
    steps:
      - actor: System
        action: "chat.assistant_delta events arrive for the active requestId"
        system_response: "Text appends into the streaming message; the aria-live region announces it without moving focus; the view stays pinned to the bottom"
      - actor: System
        action: "chat.tool_started arrives (wf_generate, system=swiss)"
        system_response: "An inline progress marker renders inside the message: 'generating in Swiss…' — contextual to the turn, not a toast"
      - actor: System
        action: "chat.tool_finished arrives"
        system_response: "The marker resolves to its completed state in place"
      - actor: Designer
        action: "Scrolls up mid-stream to re-read an earlier turn"
        system_response: "Auto-scroll suspends; a jump-to-latest affordance appears; streaming continues unaffected"
      - actor: System
        action: "chat.message_completed arrives"
        system_response: "The message closes; the streaming indicator clears; the final text persists in the view model"
    acceptance_criteria:
      - given: "A streaming assistant message"
        when: "Deltas arrive"
        then: "Only the active message updates; the rest of the list does not re-render"
      - given: "A screen reader user"
        when: "Assistant text streams"
        then: "The aria-live polite region announces the text without stealing focus"
      - given: "chat.tool_started for wf_generate with system swiss"
        when: "The marker renders"
        then: "It reads 'generating in Swiss…' inline within the owning message — no toast appears"
      - given: "The designer has scrolled up"
        when: "More deltas arrive"
        then: "The scroll position holds; a jump-to-latest affordance is available"

  - name: designer-recovers-from-generation-error
    feature: message-stream
    number: 5
    actor: Designer
    intent: "See exactly what failed and how to fix it, in the conversation where it happened."
    preconditions:
      - A brief has been sent and a tool call fails server-side (e.g. unknown layout for the chosen system)
      - chat.error is emitted for the request
    trigger_action: chat.error arrives for the active turn
    steps:
      - actor: System
        action: "chat.error arrives with structured payload (what failed, how to fix, diagnostic detail)"
        system_response: "A structured error block renders in place on the failed turn: what failed ('Layout dashboard-3col is not available in Terminal') and the fix ('Pick another layout from the chip, or switch system'); detail is expandable"
      - actor: Designer
        action: "Reads the error and adjusts using the suggested fix (edits the layout chip)"
        system_response: "chip.update dispatched; the affected step re-runs and streams a new result; the error block remains on the failed turn as history"
      - actor: System
        action: "Composer state updates"
        system_response: "Composer re-enabled from the moment the error closed the turn — the designer was never blocked without a stated reason"
    acceptance_criteria:
      - given: "A failed tool call"
        when: "chat.error arrives"
        then: "The error renders in place on the failed turn with what failed and how to fix — no toast, no console-only error"
      - given: "A rendered error block"
        when: "The designer expands detail"
        then: "Diagnostic context is shown inline without leaving the conversation"
      - given: "An error has closed the turn"
        when: "The designer looks at the composer"
        then: "It is enabled and focused, ready for the corrective message"
      - given: "A restored transcript containing a failed turn"
        when: "The workspace reopens"
        then: "The error block reproduces exactly as it was shown live"

  # ── decision-chips ──────────────────────────────────────────────

  - name: designer-edits-decision-chip
    feature: decision-chips
    number: 6
    actor: Designer
    intent: "Adjust the agent's system/layout/platform choice without re-stating the brief."
    preconditions:
      - An agent turn has produced an artifact; chips.updated rendered system/layout/platform chips on that turn
      - The turn is the latest decision set (chips editable)
    trigger_action: Change the system chip from Swiss to Terminal
    steps:
      - actor: Designer
        action: "Opens the system chip select on the latest agent turn"
        system_response: "The select lists the registered systems from the chips.updated option list, current value Swiss"
      - actor: Designer
        action: "Selects Terminal"
        system_response: "chip.update dispatched; all three chips disable with an in-flight indication (no double-fire)"
      - actor: System
        action: "Server re-runs the affected step in Terminal"
        system_response: "Tool progress streams inline ('generating in Terminal…'); a new artifact version lands and chips.updated re-renders the row with Terminal confirmed"
      - actor: Designer
        action: "Scrolls to an earlier agent turn"
        system_response: "Chips on historical turns render read-only — only the latest decision set is editable"
    acceptance_criteria:
      - given: "Editable chips on the latest agent turn"
        when: "The designer changes the system chip"
        then: "chip.update is sent and the affected step re-runs without the brief being retyped"
      - given: "A chip re-run in flight"
        when: "The designer tries to change another chip"
        then: "The selects are disabled with an in-flight indication until the run completes"
      - given: "A completed re-run"
        when: "chips.updated arrives"
        then: "The chip row shows the confirmed values in place — no duplicate chip rows"
      - given: "A historical agent turn with chips"
        when: "The designer views it"
        then: "Its chips are read-only and visibly so"
      - given: "A screen reader user on the chip row"
        when: "A chip select receives focus"
        then: "Its purpose is announced ('Design system, Terminal, collapsed, combo box')"

  # ── artifact-references ─────────────────────────────────────────

  - name: designer-focuses-artifact-from-message
    feature: artifact-references
    number: 7
    actor: Designer
    intent: "Jump from the message that produced an artifact to that exact version on the canvas, keeping the conversation in view."
    preconditions:
      - A past turn produced an artifact (artifact.version_created correlated to the message)
      - The canvas currently shows a newer version of the same artifact
    trigger_action: Click the artifact reference on the earlier message
    steps:
      - actor: Designer
        action: "Clicks the reference 'login-screen v2 — Swiss / mobile' on an earlier message"
        system_response: "Shared shell state updates to that artifact version; the canvas focuses v2 — no navigation, the chat panel and conversation stay exactly where they were"
      - actor: Designer
        action: "Looks back at the transcript"
        system_response: "The clicked reference shows an active-version indication; references to other versions do not"
      - actor: Designer
        action: "Activates a reference with Enter while navigating by keyboard"
        system_response: "Same focus behavior as click — input-agnostic parity"
    acceptance_criteria:
      - given: "A message with an artifact reference"
        when: "The designer clicks it"
        then: "That exact version focuses on the canvas via shared shell state, with no page navigation or mode switch"
      - given: "A version focused from a reference"
        when: "The designer views the transcript"
        then: "The reference for the focused version shows an active indication"
      - given: "A message that produced two platform variants"
        when: "The designer views it"
        then: "Both references render and each focuses its own version"
      - given: "A reference whose version no longer exists on disk"
        when: "The designer activates it"
        then: "The reference shows unavailable-with-reason in place — not a dead click or console error"

  # ── transcript-and-accessibility ────────────────────────────────

  - name: designer-resumes-conversation-on-workspace-open
    feature: transcript-and-accessibility
    number: 8
    actor: Designer
    intent: "Reopen the studio and continue the conversation exactly where it left off — nothing to reload, nothing lost."
    preconditions:
      - A workspace exists with a transcript containing assistant turns, tool records, chips, artifact references, and one failed turn
      - The studio has been closed and reopened
    trigger_action: The shell attaches the workspace (workspace.attach) on open
    steps:
      - actor: System
        action: "workspace.attach resolves and the transcript payload arrives"
        system_response: "The full conversation rehydrates — messages in order, tool-call records as resolved progress markers, chips (latest set editable, history read-only), artifact references clickable, the failed turn's error block intact"
      - actor: System
        action: "Restore completes"
        system_response: "The list is scrolled to the latest message and the composer is focused and enabled — the designer can type immediately"
      - actor: Designer
        action: "Sends a refinement referencing the prior context ('swap the header copy')"
        system_response: "chat.send dispatched; the agent resolves it against the restored per-artifact context server-side — no restating the brief"
    acceptance_criteria:
      - given: "A workspace with prior conversation"
        when: "The studio reopens and attaches it"
        then: "Every message, tool record, chip row, artifact reference, and error block renders as it did live"
      - given: "A restored transcript"
        when: "Restore completes"
        then: "Scroll is at the latest message and the composer has focus — zero clicks before typing"
      - given: "Restored artifact references"
        when: "The designer clicks one"
        then: "The referenced version focuses on the canvas exactly as it would have live"
      - given: "A transcript payload that fails contract validation"
        when: "Restore runs"
        then: "An in-place load error names the failing workspace; the composer is disabled with that reason"

  - name: keyboard-user-operates-chat-panel
    feature: transcript-and-accessibility
    number: 9
    actor: Keyboard / Screen Reader User
    intent: "Operate the entire chat surface — send, cancel, chips, references — without a pointer, with everything announced."
    preconditions:
      - A workspace is attached with a transcript containing chips and artifact references
      - The chat panel has keyboard focus (shell-level panel focus)
    trigger_action: Navigate the panel with Tab/Shift+Tab and operate controls with Enter/Space/arrows
    steps:
      - actor: Keyboard User
        action: "Tabs through the panel"
        system_response: "Focus moves in logical order — message interactive elements (chip selects, artifact references) in transcript order, then composer, then send/cancel; focus ring visible on every stop"
      - actor: Keyboard User
        action: "Opens a chip select with Enter and changes the value with arrow keys"
        system_response: "chip.update dispatched on commit; in-flight state announced; focus stays on the chip"
      - actor: Keyboard User
        action: "Activates an artifact reference with Enter"
        system_response: "The version focuses on the canvas; focus remains on the reference in the chat panel (no focus theft)"
      - actor: Keyboard User
        action: "Types a brief and presses Enter to send"
        system_response: "Message sends; when the turn completes, focus returns to the composer"
      - actor: Screen Reader User
        action: "Listens during a streaming turn"
        system_response: "The aria-live polite region announces assistant text and tool progress ('generating in Swiss…'); the composer's disabled reason is announced when focus reaches it"
    acceptance_criteria:
      - given: "The chat panel with chips and references"
        when: "A keyboard user tabs through it"
        then: "Tab order is logical (transcript interactive elements → composer → send/cancel); no focus trap and no skipped control"
      - given: "A disabled composer (busy or keyless)"
        when: "Focus reaches it"
        then: "The reason text is announced by the screen reader, not just visually greyed"
      - given: "A streaming assistant turn"
        when: "A screen reader is active"
        then: "Streamed text and tool progress are announced via the polite live region without focus moving"
      - given: "All chat surfaces including disabled-with-reason states"
        when: "Contrast is measured"
        then: "WCAG AA is met (≥ 4.5:1 normal text, ≥ 3:1 large)"
      - given: "prefers-reduced-motion is set"
        when: "A turn streams"
        then: "The streaming indicator is static; text still appends live"
