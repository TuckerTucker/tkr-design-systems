# Interaction Stories — canvas
# Layer: ui | Wave: 6

capability: canvas

stories:

  # ── svg-stage ───────────────────────────────────────────────────

  - name: designer-sees-generated-artifact-on-canvas
    feature: svg-stage
    number: 1
    actor: Designer
    intent: "Open a workspace and see the active artifact rendered as a real SVG inside a true-size device frame — or a clear pointer to chat when nothing exists yet."
    preconditions:
      - Docking shell is running with the canvas in the center slot
      - studio-api serves artifact metadata and version SVG content
    trigger_action: Open a workspace from the workspace switcher
    steps:
      - actor: Designer
        action: Opens a workspace that has no artifacts yet
        system_response: "Canvas shows the empty state pointing at the chat panel ('Describe a screen in chat to put an artifact here') — no blank stage, no dead chrome"
      - actor: Designer
        action: "Sends a brief in chat; the agent generates a wireframe"
        system_response: "Canvas receives artifact.version_created, fetches the sanitized SVG, and renders it as native inline SVG inside a 375×812 mobile device frame, fit to the panel"
      - actor: Designer
        action: Hovers text and shapes in the artifact
        system_response: "Content is real vector DOM (selectable structure, crisp at any zoom) — no rasterized image"
      - actor: Designer
        action: Reopens the studio later
        system_response: "Workspace restores with the same artifact head rendered on the canvas — no save action was ever needed"
    acceptance_criteria:
      - given: A workspace with no artifacts
        when: The canvas mounts
        then: The empty state renders and directs the user to the chat panel
      - given: An artifact head version exists
        when: The canvas renders it
        then: "The DOM contains the artifact as inline <svg> with stable node IDs preserved — no <img> tag, no rasterization"
      - given: A mobile-platform artifact at 100% zoom
        when: The device frame is measured
        then: "The frame content area is exactly 375×812"
      - given: The SVG fetch fails
        when: The canvas handles the error
        then: "An inline error appears on the stage naming what failed and how to fix it, with a retry action — no toast, no console-only error"

  - name: designer-compares-platforms-side-by-side
    feature: svg-stage
    number: 2
    actor: Designer
    intent: "View the mobile and desktop variants of an artifact at true device dimensions at the same time."
    preconditions:
      - An artifact with both mobile and desktop platform variants exists
      - Platform mode switcher is on the stage toolbar
    trigger_action: Select side-by-side in the platform mode switcher
    steps:
      - actor: Designer
        action: Switches platform mode from mobile to desktop
        system_response: "Stage swaps to the desktop variant in a 1280×800 frame and refits to the panel; transition is instant under prefers-reduced-motion"
      - actor: Designer
        action: Selects side-by-side mode
        system_response: "Both frames render simultaneously — 375×812 mobile beside 1280×800 desktop — sharing one viewport, fit to the panel together"
      - actor: Designer
        action: Zooms in while in side-by-side mode
        system_response: Both frames scale as a single viewport; relative positions stay locked
      - actor: Designer
        action: Opens an artifact that has only a mobile variant
        system_response: "Side-by-side option is greyed out (not hidden) with a tooltip explaining a desktop variant is required; mobile renders alone"
    acceptance_criteria:
      - given: An artifact with both platform variants
        when: Side-by-side mode is selected
        then: "Both frames render at true dimensions (375×812 and 1280×800) under one shared viewport"
      - given: An artifact with only one platform variant
        when: The mode switcher renders
        then: "Side-by-side is disabled with a visible reason, not removed"
      - given: Side-by-side mode is active
        when: The user zooms or pans
        then: Both frames move and scale together as one viewport

  - name: designer-watches-live-generation
    feature: svg-stage
    number: 3
    actor: Designer
    intent: "Keep working with the current artifact while a new generation runs, and see the result land on the canvas the moment it exists."
    preconditions:
      - An artifact version is rendered on the canvas
      - WebSocket connection is attached to the workspace
      - The agent is processing a refinement request from chat
    trigger_action: Agent begins generating a new version
    steps:
      - actor: Designer
        action: Sends a refinement in chat ("swap the header copy") and returns attention to the canvas
        system_response: "A contextual generation indicator appears on the stage; the current version remains fully visible, zoomable, and inspectable — nothing blocks"
      - actor: System
        action: artifact-pipeline creates the new version and emits artifact.version_created
        system_response: "Stage swaps to the new head; the filmstrip appends the new thumbnail; the compliance bar enters pending state for the new version"
      - actor: System
        action: artifact-pipeline finishes the compliance run and emits artifact.compliance_completed
        system_response: Compliance bar refreshes with per-rule results for the rendered version
      - actor: Designer
        action: "Loses the WebSocket connection mid-generation, then it resumes"
        system_response: "Canvas resyncs on resume — re-fetches the head and compliance for the active artifact; connection state was surfaced inline by the shell throughout"
    acceptance_criteria:
      - given: A generation is in progress
        when: The designer interacts with the current version
        then: "Zoom, pan, inspect, and filmstrip all work — loading is progressive and non-blocking"
      - given: artifact.version_created arrives for the active artifact
        when: The canvas handles it
        then: The stage shows the new head and the filmstrip appends the version without any user action
      - given: artifact.compliance_completed has not yet arrived for the rendered version
        when: The compliance bar renders
        then: "It shows a pending state; prior results never display against the wrong version"
      - given: An event arrives for a non-active artifact
        when: The canvas handles it
        then: "Caches update but the stage does not hijack to the other artifact"

  # ── stage-navigation ────────────────────────────────────────────

  - name: designer-navigates-stage-with-keyboard
    feature: stage-navigation
    number: 4
    actor: Designer (Keyboard)
    intent: "Zoom and pan the artifact entirely from the keyboard, with fit-to-frame always one keystroke away."
    preconditions:
      - An artifact is rendered in a device frame
      - The canvas stage has keyboard focus
    trigger_action: Press viewport keyboard controls while the stage is focused
    steps:
      - actor: Designer (Keyboard)
        action: "Presses + repeatedly"
        system_response: "Zoom increases per press, centered on the frame, stopping at the 400% clamp; the zoom indicator shows the current level"
      - actor: Designer (Keyboard)
        action: Presses arrow keys
        system_response: "View pans in the pressed direction; panning stops at the bound so the artifact can never be lost off-screen"
      - actor: Designer (Keyboard)
        action: Presses 0
        system_response: View refits the frame to the panel (fit-to-frame)
      - actor: Designer (Keyboard)
        action: Presses 1
        system_response: "View sets 100% actual size — mobile frame measures exactly 375×812 on screen"
      - actor: Designer (Mouse)
        action: Scroll-zooms and drags to pan
        system_response: "Identical viewport behavior to the keyboard path — full input parity; no animated easing when prefers-reduced-motion is set"
      - actor: Designer
        action: Switches to another artifact and back within the session
        system_response: The previous viewport (zoom, pan) is restored for each artifact
    acceptance_criteria:
      - given: The stage has keyboard focus
        when: "+, -, 0, 1, and arrow keys are pressed"
        then: "Zoom in/out, fit-to-frame, actual size, and pan all execute — every viewport action is reachable without a pointer"
      - given: Zoom is at the 400% clamp
        when: "+ is pressed again"
        then: "Nothing changes and no error appears; the indicator shows the bound"
      - given: The user pans toward an edge
        when: The artifact edge would pass the viewport center
        then: Panning stops at the bound
      - given: prefers-reduced-motion is set
        when: Any zoom or fit action runs
        then: The viewport change applies immediately with no animated easing

  # ── inspect-overlay ─────────────────────────────────────────────

  - name: designer-inspects-component-and-tokens
    feature: inspect-overlay
    number: 5
    actor: Designer
    intent: "Toggle inspect mode and read the component identity and token references of any node in the artifact, devtools-style."
    preconditions:
      - An artifact version is rendered with stable node IDs
      - The version spec endpoint serves components_used and design_system metadata
    trigger_action: Toggle inspect mode on from the stage toolbar or keyboard shortcut
    steps:
      - actor: Designer
        action: Toggles inspect mode on
        system_response: "Toggle shows active state; the canvas builds the node map from spec metadata (fetched once per version); plain viewing before the toggle had zero overlay noise"
      - actor: Designer
        action: Hovers a card in the artifact
        system_response: "The node is outlined by a non-destructive overlay; a popover shows component id (e.g. card-default), variant, and token references (color, type size, spacing) resolved from the spec metadata — never guessed from the SVG"
      - actor: Designer
        action: Hovers a node near the panel edge
        system_response: The popover flips/shifts to stay fully inside the panel
      - actor: Designer (Keyboard)
        action: Presses Tab/arrow keys while inspect mode is on
        system_response: "Focus cycles through inspectable nodes with the same outline and popover; popover content is exposed to screen readers via aria-describedby"
      - actor: Designer
        action: Hovers a decorative node with no metadata mapping
        system_response: "The popover shows the node id and a 'no component metadata' note rather than showing nothing"
      - actor: Designer
        action: Toggles inspect mode off
        system_response: All overlay chrome disappears; the artifact SVG was never mutated at any point
    acceptance_criteria:
      - given: Inspect mode is off
        when: The designer hovers the artifact
        then: No outlines or popovers appear
      - given: "Inspect mode is on and a mapped node (e.g. card-default) is hovered"
        when: The popover renders
        then: "Component id, variant, and token refs match the version's wireframe.spec.yaml metadata exactly"
      - given: Inspect mode is on
        when: The keyboard user cycles nodes with Tab/arrows
        then: The same outline and popover appear as for hover — inspection is not hover-only
      - given: A hovered node has no metadata mapping
        when: The popover renders
        then: "It shows the node id with a 'no component metadata' note"
      - given: The spec metadata fetch failed
        when: The designer reaches for inspect
        then: "The toggle is disabled with the reason shown in place, and the stage still renders normally"

  # ── history-filmstrip ───────────────────────────────────────────

  - name: designer-scrubs-history-and-restores-version
    feature: history-filmstrip
    number: 6
    actor: Designer
    intent: "Scrub through every generation of the artifact, preview any version on the stage, and bring an earlier one back as the new head — with undo, never a confirmation dialog."
    preconditions:
      - An artifact with at least three versions exists
      - The filmstrip renders under the stage
      - "studio-api exposes POST /api/workspaces/:wsId/artifacts/:artId/versions/:n/restore backed by artifact-pipeline's restore-as-new-head"
    trigger_action: Hover or arrow-key across the filmstrip thumbnails
    steps:
      - actor: Designer
        action: "Looks at the filmstrip"
        system_response: "All versions render as SVG thumbnails, oldest → newest, with the head marked; hover/focus on a thumbnail shows version number, brief excerpt, tool, and created time from provenance"
      - actor: Designer
        action: Scrubs across thumbnails with hover (or Left/Right arrows)
        system_response: "The stage previews each version as the scrub passes it; head state is unchanged; moving off the filmstrip returns the stage to head"
      - actor: Designer
        action: "Selects version 2 of 4 and activates Restore (click or Enter)"
        system_response: "No confirmation dialog. artifact-pipeline creates version 5 with version 2's content as the new head; the filmstrip appends it and marks it head; an inline Undo affordance appears"
      - actor: Designer
        action: Activates the inline Undo
        system_response: "The previous head returns as version 6 — another new head; nothing was ever destroyed, every version remains on disk"
      - actor: Designer (Keyboard)
        action: Presses Home, then End, on the filmstrip
        system_response: Scrub jumps to the first version, then to the head
    acceptance_criteria:
      - given: An artifact with versions 1–4 and head at 4
        when: The designer scrubs to version 2 and away again
        then: "The stage previews version 2 then returns to version 4; the head pointer never changed"
      - given: Version 2 is selected
        when: Restore is activated
        then: "A new head version is created with version 2's content, with no confirmation dialog, and prior versions remain intact"
      - given: A restore just completed
        when: The inline Undo is activated
        then: The previous head returns as another new head version
      - given: The filmstrip has focus
        when: "Left/Right, Home/End, and Enter are pressed"
        then: "Scrub moves, jumps to first/head, and restores — full keyboard parity"
      - given: The artifact has a single version
        when: The filmstrip renders
        then: "Restore is disabled with a visible reason, not hidden"

  # ── compliance-bar ──────────────────────────────────────────────

  - name: designer-locates-compliance-violation
    feature: compliance-bar
    number: 7
    actor: Designer
    intent: "Read per-rule compliance status for the rendered version and jump straight to the offending node on the artifact by clicking a violation."
    preconditions:
      - An artifact version with a completed compliance result exists (at least one warn or fail)
      - artifact-pipeline mapped violations to stable SVG node IDs
    trigger_action: Review the persistent compliance bar under the stage
    steps:
      - actor: Designer
        action: Looks at the compliance bar after a generation
        system_response: "The bar shows overall status and per-rule chips (pass/warn/fail) for the rendered version, each with a non-color indicator (icon/shape) alongside its WCAG AA status color"
      - actor: Designer
        action: Clicks a failed rule chip
        system_response: "The rule expands inline (no modal) listing each violation with its message and severity"
      - actor: Designer
        action: Clicks a violation that carries a node mapping
        system_response: The offending SVG node is outlined on the stage and panned into view via its stable node ID
      - actor: Designer
        action: Reaches a violation with no node mapping
        system_response: "The violation is listed with its message, but the highlight action is disabled with the reason shown — not hidden"
      - actor: Designer (Keyboard)
        action: "Tabs through rule chips, presses Enter to expand, arrows through violations, Enter to highlight"
        system_response: "Identical behavior to the mouse path — full keyboard parity"
      - actor: Designer
        action: Scrubs the filmstrip to an earlier version
        system_response: "The compliance bar swaps to that version's stored result — results always belong to the version on stage"
    acceptance_criteria:
      - given: A rendered version with compliance results
        when: The bar renders
        then: "Overall and per-rule pass/warn/fail status display with non-color indicators and WCAG AA contrast"
      - given: A violation mapped to a stable node ID
        when: It is clicked or activated with Enter
        then: That exact SVG node is outlined on the stage and panned into view
      - given: A violation with nodeId null
        when: The violation list renders
        then: "Its highlight action is disabled with a visible reason, while other violations remain actionable"
      - given: The filmstrip previews an earlier version
        when: The compliance bar updates
        then: "It shows that version's result — never another version's data"
      - given: The compliance result has not yet arrived for the rendered version
        when: The bar renders
        then: "A pending state shows without blocking the stage, and it resolves when artifact.compliance_completed arrives"
