# Interaction Stories — docking-shell
# Layer: ui | Wave: 5

capability: docking-shell

stories:

  # ── spa-scaffold ────────────────────────────────────────────────

  - name: user-opens-studio-shell
    feature: spa-scaffold
    number: 1
    actor: Designer
    intent: "Open the studio in a browser and land in a working shell — canvas center, panels on the rails — without any setup."
    preconditions:
      - studio-server is running and hosting the built client bundle
      - studio-api endpoints (preferences, workspaces, /ws) are available
      - Chat and library panels are registered in the panel registry
    trigger_action: Navigate to the studio URL in a browser
    steps:
      - actor: Designer
        action: "Opens the studio URL"
        system_response: "ShellFrame renders — canvas slot center, chat panel on the left rail, library panel on the right rail (first-run defaults)"
      - actor: System
        action: "Fetches preferences before first rail paint"
        system_response: "No stored preference exists, so defaults apply directly; no layout flash or jump"
      - actor: Designer
        action: "Looks at the shell chrome"
        system_response: "Workspace switcher and inline connection state are visible; the WebSocket client is connecting in the background"
      - actor: System
        action: "A panel placeholder fails to render (forced error in test)"
        system_response: "The panel-level error boundary shows what failed in place; the shell, rails, and other panels keep working — nothing lands only in the console"
    acceptance_criteria:
      - given: "A running studio-server with the built client"
        when: "A user opens the studio URL"
        then: "The shell renders with canvas center and both rails populated from the registry defaults"
      - given: "No stored layout preference"
        when: "The shell first paints"
        then: "Defaults render directly with no default-then-stored layout flash"
      - given: "A panel's content throws during render"
        when: "The shell renders"
        then: "That panel shows the failure in place while the rest of the shell keeps working"

  # ── panel-registry-and-rails ────────────────────────────────────

  - name: developer-registers-new-panel
    feature: panel-registry-and-rails
    number: 2
    actor: UI Engineer
    intent: "Add a future panel (compliance detail) by registering a PanelDefinition — no changes to shell code."
    preconditions:
      - Panel registry and dock reducer are implemented
      - Chat and library panels are already registered
    trigger_action: "Register a new PanelDefinition (id, title, icon, lazy component, defaultPlacement, minWidth) at bootstrap"
    steps:
      - actor: UI Engineer
        action: "Calls registry.register() with a compliance-detail PanelDefinition (defaultPlacement right rail, order 1)"
        system_response: "The panel appears on the right rail below the library panel; because two panels share the rail they render as tabs"
      - actor: UI Engineer
        action: "Inspects the shell source for required changes"
        system_response: "Zero shell changes — ShellFrame, Rail, PanelHost, drag, collapse, and persistence all operate on the registry and dock state generically"
      - actor: UI Engineer
        action: "Registers a second definition with the same id by mistake"
        system_response: "Startup fails with an error naming both registrations (fail fast on developer error)"
      - actor: Designer
        action: "Drags, collapses, and re-tabs the new panel"
        system_response: "Every docking operation works identically to the built-in panels, and the arrangement persists through preferences"
    acceptance_criteria:
      - given: "A new PanelDefinition for compliance-detail"
        when: "It is registered at bootstrap"
        then: "The panel appears at its default placement with no shell code changes"
      - given: "Two definitions sharing one id"
        when: "The second registers"
        then: "Startup fails with an error naming both registrations"
      - given: "The newly registered panel"
        when: "The user drags, collapses, or tabs it"
        then: "All docking operations and persistence work identically to chat and library"

  - name: user-stacks-panels-on-one-rail
    feature: panel-registry-and-rails
    number: 3
    actor: Designer
    intent: "Put both panels on one rail to give the canvas maximum width, switching between them as tabs."
    preconditions:
      - Chat panel is on the left rail, library panel on the right rail
      - Drag-to-swap or the settings toggle is available
    trigger_action: Move the library panel onto the left rail where chat already lives
    steps:
      - actor: Designer
        action: "Moves the library panel to the left rail"
        system_response: "Chat and library stack on the left rail as tabs — one visible panel, a tab strip above; the right rail collapses to zero width and the canvas absorbs the space"
      - actor: Designer
        action: "Clicks the chat tab, then the library tab"
        system_response: "Exactly one panel is visible at a time; the active tab is visually distinct"
      - actor: Designer (Keyboard)
        action: "Focuses the tab strip and presses ArrowRight/ArrowLeft"
        system_response: "Tab activation moves between panels with a visible focus ring — full keyboard parity"
      - actor: System
        action: "Debounces the arrangement change"
        system_response: "A single PUT /api/preferences records the stacked layout silently — no save action"
    acceptance_criteria:
      - given: "Both panels moved to one rail"
        when: "The arrangement settles"
        then: "Panels render as tabs with exactly one visible; the empty rail is zero width and the canvas widens"
      - given: "A rail hosting exactly one panel"
        when: "It renders"
        then: "No tab strip appears"
      - given: "Focus on the tab strip"
        when: "The user presses arrow keys"
        then: "Tab activation moves between panels without a pointer"

  # ── panel-movement-and-collapse ─────────────────────────────────

  - name: user-drags-panel-to-other-rail
    feature: panel-movement-and-collapse
    number: 4
    actor: Designer
    intent: "Drag the library panel from the right rail to the left rail using the panel header, guided by drop indicators."
    preconditions:
      - Chat panel on the left rail, library panel on the right rail
      - Drag controller and drop indicators are implemented
    trigger_action: Press and drag the library panel header toward the left rail
    steps:
      - actor: Designer
        action: "Presses the library panel header and starts dragging"
        system_response: "A drag ghost follows the pointer; valid drop targets (left rail positions, right rail reorder positions) show indicators as the pointer approaches"
      - actor: Designer
        action: "Hovers over the left rail below the chat panel"
        system_response: "A drop indicator highlights the exact stack position the panel will take"
      - actor: Designer
        action: "Releases the pointer"
        system_response: "The library panel docks at the indicated position; focus follows the moved panel; the arrangement persists silently"
      - actor: Designer
        action: "Starts another drag, then presses Escape"
        system_response: "The drag cancels; the panel returns to its origin with no state change"
      - actor: Designer (with prefers-reduced-motion set)
        action: "Repeats the drag"
        system_response: "Placement is instant — no ghost animation — while drop indicators still render (information, not motion)"
    acceptance_criteria:
      - given: "A drag in progress over the other rail"
        when: "The pointer nears a valid position"
        then: "A drop indicator shows the exact target slot; invalid targets never highlight"
      - given: "A drag in progress"
        when: "The user presses Escape"
        then: "The drag cancels and the panel returns to its origin with no state change"
      - given: "A drop on the panel's own rail"
        when: "The pointer releases on a different stack position"
        then: "The stack reorders instead of swapping rails"
      - given: "prefers-reduced-motion is set"
        when: "A panel is dragged and dropped"
        then: "Placement is instant with no transition animation"

  - name: keyboard-user-moves-panel
    feature: panel-movement-and-collapse
    number: 5
    actor: Designer (Keyboard)
    intent: "Move a panel to the other rail without a pointer, via the keyboard shortcut or the settings toggle."
    preconditions:
      - Keyboard bindings for panel operations are implemented
      - Per-panel settings menu with the move toggle exists
    trigger_action: Focus a panel and invoke the move-to-other-rail operation
    steps:
      - actor: Designer (Keyboard)
        action: "Cycles panel focus with the panel-focus shortcut until the library panel header is focused"
        system_response: "A visible focus ring marks the focused panel header; the focused panel is announced by screen readers"
      - actor: Designer (Keyboard)
        action: "Presses the move-panel shortcut"
        system_response: "The library panel moves to the other rail; focus follows the panel to its new position"
      - actor: Designer (Keyboard)
        action: "Opens the panel settings menu with Enter and chooses 'Move to right rail'"
        system_response: "The panel moves back — the settings toggle produces the identical result to drag and shortcut"
      - actor: System
        action: "Debounces the changes"
        system_response: "The final arrangement persists through a single silent PUT; no save action"
    acceptance_criteria:
      - given: "Focus on a panel header"
        when: "The move-panel shortcut is pressed"
        then: "The panel moves to the other rail and focus follows it"
      - given: "The panel settings menu"
        when: "'Move to left/right rail' is chosen"
        then: "The result is identical to completing the same move by drag"
      - given: "Any panel operation (move, collapse, restore, focus, tab activation)"
        when: "Attempted with keyboard only"
        then: "It completes without a pointer, with a visible focus ring throughout"

  - name: user-collapses-and-restores-panel
    feature: panel-movement-and-collapse
    number: 6
    actor: Designer
    intent: "Collapse the chat panel to an icon strip to maximize canvas space, then restore it with one click."
    preconditions:
      - Chat panel is expanded on the left rail
      - Icon strip collapse/restore is implemented
    trigger_action: Click the collapse control in the chat panel header
    steps:
      - actor: Designer
        action: "Clicks the collapse control on the chat panel"
        system_response: "The panel collapses to an icon (with accessible name) on the rail edge; the canvas widens; focus moves to the icon strip entry"
      - actor: Designer
        action: "Collapses the library panel too"
        system_response: "Both rails show only icon strips; the canvas is at maximum width"
      - actor: Designer
        action: "Clicks the chat icon in the strip"
        system_response: "The chat panel restores to its prior rail, order, and tab state in one click; focus moves into the restored panel"
      - actor: Designer (with prefers-reduced-motion set)
        action: "Collapses and restores a panel"
        system_response: "Collapse and expand are instant — no transition animation"
      - actor: System
        action: "Persists each settled change"
        system_response: "Collapsed state round-trips through preferences; reloading the app restores the same collapsed/expanded arrangement"
    acceptance_criteria:
      - given: "An expanded panel"
        when: "The collapse control is activated (click or keyboard)"
        then: "The panel collapses to an icon strip entry with an accessible name, and the canvas widens"
      - given: "A collapsed panel"
        when: "Its icon strip entry is clicked once"
        then: "The panel restores to its prior rail, order, and tab state with focus inside"
      - given: "The active tab on a rail with two panels"
        when: "It is collapsed"
        then: "The next panel in stack order becomes the active tab"
      - given: "prefers-reduced-motion is set"
        when: "A panel collapses or restores"
        then: "The transition is instant"

  # ── silent-layout-persistence ───────────────────────────────────

  - name: user-layout-persists-across-sessions
    feature: silent-layout-persistence
    number: 7
    actor: Designer
    intent: "Arrange panels once and have the exact arrangement return on every visit — without ever saving."
    preconditions:
      - Preferences endpoints (GET/PUT /api/preferences) are available
      - Layout persistence with hydrate-before-first-paint is implemented
    trigger_action: Re-arrange panels, close the browser, and reopen the studio
    steps:
      - actor: Designer
        action: "Stacks both panels on the left rail, collapses chat, and resizes the rail"
        system_response: "Each settled change debounces into a PUT /api/preferences; nothing in the UI asks to save"
      - actor: Designer
        action: "Closes the browser and reopens the studio"
        system_response: "Preferences hydrate before the rails first paint; the exact arrangement — stacked rail, collapsed chat, rail width — returns with no layout flash"
      - actor: System
        action: "Finds a persisted placement for a panel id that is no longer registered"
        system_response: "That placement is dropped, the rest of the layout hydrates, and the next PUT writes the cleaned layout back"
      - actor: System
        action: "A PUT fails while the server restarts"
        system_response: "Local state stays authoritative; a background retry resumes; sync status is visible inline in the panel settings menu — never a toast, never blocking"
    acceptance_criteria:
      - given: "A re-arranged layout (stacking, collapse, rail width)"
        when: "The studio is reopened"
        then: "The exact arrangement returns, hydrated before first rail paint with no default-layout flash"
      - given: "Any arrangement change"
        when: "The user looks for a save affordance"
        then: "None exists anywhere — persistence is silent"
      - given: "A burst of rapid arrangement changes"
        when: "The changes settle"
        then: "A single debounced PUT is sent"
      - given: "A persisted placement referencing an unregistered panel id"
        when: "The layout hydrates"
        then: "That placement is dropped while the remainder applies"
      - given: "A failing PUT"
        when: "The user keeps working"
        then: "Local state remains authoritative, retry happens in the background, and sync status appears inline (not a toast)"

  # ── workspace-routing-and-connection ────────────────────────────

  - name: user-switches-workspace-via-url
    feature: workspace-routing-and-connection
    number: 8
    actor: Designer
    intent: "Move between workspaces with the switcher or a deep link, with the URL always reflecting the active workspace."
    preconditions:
      - Two workspaces exist (created via the API or the switcher)
      - Workspace routing and the WebSocket client are implemented
    trigger_action: "Open a deep link to /w/<workspace-id>, then switch workspaces from the shell chrome"
    steps:
      - actor: Designer
        action: "Opens /w/checkout-flow directly"
        system_response: "The shell loads, the WebSocket client attaches the checkout-flow workspace by message, and the switcher shows it active"
      - actor: Designer
        action: "Opens the workspace switcher and selects 'onboarding'"
        system_response: "The URL updates to /w/onboarding, the client re-attaches, and panels receive the workspace change"
      - actor: Designer
        action: "Presses the browser back button"
        system_response: "The URL returns to /w/checkout-flow and the active workspace follows — URL and workspace stay in lockstep"
      - actor: Designer
        action: "Opens the studio root with no workspace in the URL"
        system_response: "The last active workspace (lastWorkspaceId from preferences) reopens; with none stored, the switcher presents the workspace list"
      - actor: Designer
        action: "Opens /w/does-not-exist"
        system_response: "The switcher opens in place naming the unresolved id and listing available workspaces — no redirect loop, no dead end"
    acceptance_criteria:
      - given: "A deep link to /w/<workspace-id>"
        when: "It is opened"
        then: "That workspace attaches and the switcher shows it active"
      - given: "A workspace switch from the shell chrome"
        when: "It completes"
        then: "The URL updates and back/forward traverse workspace history"
      - given: "No workspace in the URL"
        when: "The studio opens"
        then: "The last active workspace reopens from preferences"
      - given: "A URL naming an unknown workspace id"
        when: "It is opened"
        then: "The switcher opens in place with the unresolved id named and available workspaces listed"

  - name: user-sees-connection-state-inline
    feature: workspace-routing-and-connection
    number: 9
    actor: Designer
    intent: "Keep working through a connection drop, with the shell showing what is happening inline and resuming automatically."
    preconditions:
      - The studio is open with a workspace attached over /ws
      - Reconnect with capped backoff and re-attach resume is implemented
    trigger_action: The WebSocket connection drops (server restart or network blip)
    steps:
      - actor: System
        action: "Detects the dropped connection"
        system_response: "Connection state transitions to reconnecting; the shell chrome shows it inline — what happened and that reconnection is in progress; no toast appears"
      - actor: Designer
        action: "Tries an action that needs the connection (a panel calls send())"
        system_response: "send() returns a typed disconnected result; the panel disables its affordance with the reason shown in place — nothing is silently dropped"
      - actor: System
        action: "Backoff retries succeed"
        system_response: "The client reconnects and re-sends workspace.attach automatically; the inline state returns to connected; no user action was required"
      - actor: System
        action: "The server stays down past the backoff cap"
        system_response: "State shows offline with retries continuing at the capped interval; the shell, persisted layout, and routing keep working"
      - actor: System
        action: "bridge.status or auth.status events arrive after reconnect"
        system_response: "The shell distributes them to subscribed panels so panel-level affordances (e.g. generation disabled without a key) update in place"
    acceptance_criteria:
      - given: "An open studio with an attached workspace"
        when: "The WebSocket connection drops"
        then: "Reconnecting state appears inline in the shell chrome — never as a toast"
      - given: "A reconnecting client"
        when: "The connection is restored"
        then: "workspace.attach is re-sent automatically and the state returns to connected with no user action"
      - given: "A disconnected client"
        when: "A panel calls send()"
        then: "A typed { ok: false, reason: \"disconnected\" } result is returned — no silent drop"
      - given: "A server down past the backoff cap"
        when: "The user keeps using the shell"
        then: "Docking, layout, and routing keep working while retries continue at the capped interval"
