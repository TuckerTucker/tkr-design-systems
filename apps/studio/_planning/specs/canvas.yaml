  - apps/studio/client/src/canvas/api.ts — Typed fetchers for artifact/version/spec/compliance/restore routes (restore returns RestoreResponse — the new head's VersionSummary)
  - apps/studio/client/src/canvas/index.ts — Named exports; panel registration
  - apps/studio/packages/contract/ — WS and HTTP payload types (consumed, READ-ONLY from this capability)

implementation_steps:
  - Register the canvas panel in the docking-shell registry as the fixed center stage
  - Build typed API fetchers over the artifact routes using packages/contract types
  - Implement CanvasViewState and the SvgStage native inline SVG renderer (sanitized content, stable node IDs intact)
  - Build EmptyState (points at chat) and inline fetch-error display
  - Build DeviceFrame at true platform dimensions and the platform-mode switcher with side-by-side composition
  - Implement useViewport — fit-to-frame default, zoom/pan transform, clamping/bounding, keyboard controls, reduced-motion handling
  - Build the inspect node map from the version spec endpoint (components_used + design_system block keyed by stable node ID)
  - Build InspectOverlay — toggle, hover hit-testing, keyboard cycling, outline + edge-aware popover, unmapped fallback, aria-describedby exposure
  - Build FilmstripModel and HistoryFilmstrip — thumbnails, metadata on hover/focus, scrub-to-preview, keyboard parity
  - Wire restore through POST /api/workspaces/:wsId/artifacts/:artId/versions/:n/restore; use the RestoreResponse (new head's VersionSummary) to drive the inline Undo's new version number; render inline Undo (previous head as another new head) while the filmstrip also appends live via artifact.version_created
  - Build ComplianceBarModel mapping and ComplianceBar — overall + per-rule chips, inline violation expansion, non-color status indicators
  - Implement violation click-to-highlight (outline offending node via stable node ID, pan into view; disabled-with-reason when nodeId is null)
  - Implement useArtifactEvents — live head swap, filmstrip append, compliance refresh, pending state, stale-event guarding, reconnect resync
  - Implement progressive generation state (current version stays interactive; contextual status on the stage)
  - Component tests (Testing Library) for stage, viewport, inspect, filmstrip, compliance bar; axe checks for WCAG AA

error_handling: |
  - SVG fetch fails (network, 404) → inline error on the stage with the failing version and a retry action; previous content retained if present
  - Spec metadata fetch fails → stage still renders; inspect toggle disabled-with-reason ("component metadata unavailable for this version")
  - Compliance fetch fails → bar shows inline error state with retry; never blocks the stage
  - Restore request fails → filmstrip head marker unchanged, inline error at the restore action (what failed, how to fix); no optimistic head swap left dangling
  - WebSocket disconnected → docking-shell surfaces connection state; canvas freezes live updates and resyncs (head + compliance) on resume
  - Malformed SVG content (parse failure on inline insertion) → inline error naming the version; offending content never half-rendered
  - Violation references a nodeId absent from the rendered SVG → highlight action disabled-with-reason on that violation; remaining violations unaffected
  - Event payload fails contract validation → event dropped and logged; canvas state never corrupted by a bad message
  - All errors render in place at the affected surface — no toasts, no console-only errors

edge_cases: |
  - Workspace with no artifact → empty state pointing at chat; filmstrip and compliance bar absent (not empty chrome)
  - Artifact with a single version → filmstrip shows one thumbnail; restore disabled with reason
  - Restore of the current head → restore action disabled on the head thumbnail (no-op prevented, not errored)
  - Scrub preview active when artifact.version_created arrives → filmstrip appends; scrub preview preserved; head indicator updates; leaving scrub returns to the NEW head
  - compliance_completed arrives for a version that is not currently rendered → cached for that version; bar unchanged until that version renders
  - Side-by-side requested when only one platform variant exists → mode disabled-with-reason (greyed, tooltip explains), single frame shown
  - Very large SVG (long-page desktop artifact) → fit-to-frame computes from full bounds; progressive render keeps the panel responsive
  - Zoom at clamp boundaries → further input is a no-op; indicator shows the bound; no error
  - Inspect hover over nested nodes → innermost mapped node wins; unmapped innermost falls back to nearest mapped ancestor
  - Panel resized (rail collapse/expand) while fitToFrame is true → viewport refits; while false → pan re-bounded, zoom preserved
  - prefers-reduced-motion set → no animated zoom easing, no animated stage swaps; all state changes immediate
  - Rapid successive generations → each version_created appends; stage swaps to the latest head only (no intermediate flicker)
  - Undo offered after restore, then a new generation arrives → undo target preserved (restore is just another version; undo still creates a new head)

integration_points:
  - "docking-shell: panel registry hosts the canvas in the fixed center slot; WS client and connection state come from the shell"
  - "studio-api: all artifact/spec/compliance content over HTTP; artifact.version_created and artifact.compliance_completed over WS; restore via studio-api's POST /api/workspaces/:wsId/artifacts/:artId/versions/:n/restore (studio-api slice 4), which returns RestoreResponse and delegates to artifact-pipeline's restore-as-new-head"
  - "artifact-pipeline (via studio-api): sanitized SVG with stable node IDs, violation-to-node mapping, version provenance — the canvas renders, never recomputes"
  - "chat-panel: messages that produced artifacts focus the corresponding canvas version; decision-chip changes land as new versions the canvas picks up live"
  - "packages/contract: every payload type imported, no stringly-typed messages"
  - "system-comparison / blueprint-editor / project-board (deferred): build on the canvas stage, node highlighting, and version focus"

verification_criteria:
  - Empty workspace renders the empty state directing the user to chat; no dead chrome
  - Generated artifact head renders as native inline SVG (DOM contains <svg>, no <img>/rasterized fallback) with stable node IDs intact
  - Mobile frame measures 375×812 and desktop 1280×800 at 100% zoom; side-by-side shows both simultaneously
  - Side-by-side is disabled-with-reason when only one platform variant exists
  - Fit-to-frame applies on load, mode change, and panel resize; 0 refits, 1 sets 100%, +/- zoom, arrows pan — keyboard-only operation covers every viewport action
  - Zoom clamps at 10% and 400%; artifact can never be panned fully out of view
  - Inspect toggle off by default; hovering a mapped node outlines it and shows component id, variant, and token refs matching wireframe.spec.yaml metadata exactly
  - Keyboard inspection cycles mapped nodes with the same popover; popover content exposed to screen readers via aria-describedby
  - Unmapped nodes show node id with a "no component metadata" note
  - Filmstrip lists all versions oldest → newest with head marked; scrubbing previews a version without changing head; leaving scrub returns to head
  - Restore creates a new head (version count increases by one, prior versions untouched on disk); no confirmation dialog appears anywhere
  - Inline Undo after restore creates another new head matching the previous one
  - Compliance bar shows overall + per-rule status for the rendered version; expanding a rule lists violations inline
  - Clicking/Enter on a violation with a nodeId outlines that exact SVG node and pans it into view; node-less violations show highlight disabled-with-reason
  - artifact.version_created swaps the stage and appends to the filmstrip without user action; artifact.compliance_completed refreshes the bar; pending state shown in between
  - During generation the current version stays visible and interactive; generation status is contextual on the stage, non-blocking
  - All status colors meet WCAG AA contrast and carry non-color indicators; prefers-reduced-motion disables all stage animation
  - Testing Library + axe checks pass for stage, inspect, filmstrip, and compliance bar; no console-only errors in any failure path

performance: |
  - Stage render of a typical artifact (≤ 500 SVG nodes): < 100ms from fetched content to painted DOM
  - Zoom/pan applied as a single CSS/SVG transform — no re-render of artifact nodes per frame; interaction stays at 60fps
  - Inspect hit-testing via cached node bounds (computed once per version render), not per-mousemove getBBox calls
  - Filmstrip thumbnails lazy-rendered as scrolled into view; scrub preview reuses fetched version content (cached per version, no refetch on repeat scrub)
  - Version SVG, spec, and compliance responses cached client-side per (artifact, version) — immutable versions never refetched
  - Live event handling is O(1) state updates; no full-canvas re-render on compliance refresh
  - Progressive loading: generation status never blocks input on the current version

security: |
  - Artifact version SVGs are rendered only from server-sanitized content prepared by artifact-pipeline; the canvas never injects raw third-party SVG. Library component/layout SVGs are rendered by library-panel (not the canvas) and are covered by library-panel's own client-side sanitizer per architecture.md's dual-sanitizer contract.
  - Inline insertion strategy still treats content as untrusted: script elements, event-handler attributes, and external references are rejected client-side as defense in depth
  - All artifact content comes from the localhost-only studio-api; the canvas never reads the filesystem or spawns processes (browser boundary per product.yaml)
  - No credentials handled in the canvas; ANTHROPIC_API_KEY never reaches the client
  - Spec metadata and compliance payloads validated against contract types at the boundary before entering canvas state
  - Restore requests carry only workspace/artifact/version identifiers — no content round-trips from the client
  - TypeScript strict mode and named exports throughout; no any-typed message handling
