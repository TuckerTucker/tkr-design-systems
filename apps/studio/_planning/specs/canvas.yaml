  - apps/studio/client/src/canvas/inspect.ts — InspectModel, spec-metadata → node-map builder
  - apps/studio/client/src/canvas/InspectOverlay.tsx — Outline + popover rendering, hover/keyboard targeting
  - apps/studio/client/src/canvas/filmstrip.ts — FilmstripModel and restore/undo actions
  - apps/studio/client/src/canvas/HistoryFilmstrip.tsx — Thumbnail strip, scrub, restore, undo affordance
  - apps/studio/client/src/canvas/compliance.ts — ComplianceBarModel mapping from API payloads
  - apps/studio/client/src/canvas/ComplianceBar.tsx — Persistent bar, rule chips, violation list, highlight dispatch
