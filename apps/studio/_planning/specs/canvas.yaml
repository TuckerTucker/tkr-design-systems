# Capability Spec — canvas
# 13-section architectural design
# Layer: ui | Wave: 6

capability: canvas
status: implemented

context: |
  The canvas is the always-center stage of the Studio docking shell —
  the one panel that never moves to a rail. It renders artifact versions
  produced by the generation pipeline as native inline SVG (no
  rasterization), framed at true platform dimensions (375×812 mobile,
  1280×800 desktop per architecture.md), with zoom/pan, a devtools-style
  inspect-on-hover overlay, a generation-history filmstrip, and a
  persistent compliance bar.

  The capability boundary from capabilities.yaml is binding: compliance
  COMPUTATION belongs to artifact-pipeline (server-side, via
  ds_check_compliance); version storage belongs to workspace-store; the
  canvas renders and interacts. Restore is artifact-pipeline's
  restore-as-new-head semantics — the canvas only requests it. Direct
  SVG editing is explicitly out of scope; blueprint-editor (deferred) is
  the future editing path. All data arrives through studio-api: HTTP for
  SVG/spec/compliance content, WebSocket events
  (artifact.version_created, artifact.compliance_completed) for live
  updates, with every message type imported from packages/contract.

problem_statement: |
  Wave 5 delivers the docking shell and Wave 6's chat panel produces
  artifacts — but without the canvas there is nowhere to see them:
  - Generated SVGs exist as versioned files behind the API with no
    rendering surface; the conversational loop has no visible result
  - Component identity and token references live in wireframe.spec.yaml
    metadata but are invisible without reading YAML by hand
  - Version history exists in the artifact pipeline but cannot be
    browsed, previewed, or restored from the UI
  - Compliance results are computed per version yet have no persistent
    display, and violations cannot be located visually on the artifact
  - Platform dimensions are part of every generation, but nothing shows
    artifacts at true device size or compares mobile/desktop together

scope:
  in:
    - Canvas panel in the docking-shell registry (center stage, never railed)
    - Native inline SVG rendering of artifact versions from sanitized server content (stable node IDs preserved)
    - Device frames at true platform dimensions (375×812 mobile, 1280×800 desktop), side-by-side mode
    - Zoom/pan viewport with fit-to-frame default, input parity (mouse, trackpad, touch, keyboard)
    - Inspect-on-hover overlay (component identity + token refs from artifact spec metadata, devtools-style, toggleable, keyboard-reachable)
    - Generation-history filmstrip (thumbnails, scrub-to-preview, restore-as-new-head with inline undo)
    - Persistent compliance bar (per-rule pass/warn/fail, violation click-to-highlight via stable node IDs)
    - Live updates on artifact.version_created / artifact.compliance_completed WebSocket events
    - Empty state pointing at chat; progressive non-blocking loading during generation
    - WCAG AA, reduced-motion respect, screen-reader support for inspect and compliance surfaces
  out:
    - Compliance computation (artifact-pipeline owns ds_check_compliance runs)
    - Version storage and head-pointer mechanics (workspace-store + artifact-pipeline)
    - Restore semantics (artifact-pipeline owns restore-as-new-head; canvas requests it)
    - Direct SVG editing or node manipulation (blueprint-editor, deferred, is the editing path)
    - Generation triggering and intent routing (chat-panel + agent-orchestration)
    - Panel docking mechanics (docking-shell)
    - Comparison-mode grid across systems (system-comparison, deferred)
    - PNG export and download bundles (export-surface, deferred)

dependencies:
  upstream:
    - "docking-shell — panel registry, center-slot hosting, WebSocket client with reconnect/resume"
    - "studio-api — artifact HTTP routes (/api/workspaces/:wsId/artifacts/:artId, .../versions/:n/svg, .../versions/:n/spec, .../versions/:n/compliance) and WS events (artifact.version_created, artifact.compliance_completed)"
    - "studio-api — restore endpoint POST /api/workspaces/:wsId/artifacts/:artId/versions/:n/restore (owned by studio-api, slice 4) delegating to artifact-pipeline's restore-as-new-head; returns RestoreResponse (the new head's VersionSummary); canvas never mutates versions itself"
    - "artifact-pipeline — sanitized SVG with stable node IDs, violation-to-node mapping, version provenance (parent, brief, tool, parameters)"
    - "packages/contract — typed payloads for every message and HTTP body consumed"
  downstream:
    - "chat-panel — artifact references in messages focus a canvas version"
    - "system-comparison (deferred) — extends the canvas with a comparison grid mode"
    - "blueprint-editor (deferred) — syncs tree selection with canvas node highlighting"
    - "project-board (deferred) — opens board cells on the canvas"
  external:
    - "Browser native SVG DOM (inline rendering, getBBox/getBoundingClientRect hit-testing)"
    - "prefers-reduced-motion media query (system motion preference)"

data_contracts: |
  ## Canvas View State

  ```typescript
  // apps/studio/client/src/canvas/state.ts
  export type PlatformMode = "mobile" | "desktop" | "side-by-side";

  export interface Viewport {
    zoom: number;            // 1 = 100%; clamped 0.1–4
    pan: { x: number; y: number };
    fitToFrame: boolean;     // true → zoom/pan derived from panel size
  }

  export interface CanvasViewState {
    artifactId: string | null;     // null → empty state
    headVersion: number | null;    // head pointer as reported by the API
    renderedVersion: number | null; // head, or filmstrip scrub preview
    platformMode: PlatformMode;
    viewport: Viewport;
    inspectEnabled: boolean;
    highlightedNodeId: string | null; // compliance click-to-highlight target
    generationInProgress: boolean;    // progressive, non-blocking indicator
  }
  ```

  ## Inspect Overlay Model

  ```typescript
  // apps/studio/client/src/canvas/inspect.ts
  export interface TokenRef {
    category: "color" | "typography" | "spacing" | "radius" | "elevation";
    name: string;            // token name from the system spec
    value: string;           // resolved value, e.g. "#E3000B", "14px"
  }

  export interface InspectTarget {
    nodeId: string;          // stable node ID preserved by artifact-pipeline
    componentId: string | null;   // e.g. "card-default"; null when unmapped
    componentName: string | null;
    variant: string | null;
    tokenRefs: TokenRef[];   // empty when unmapped
    bounds: { x: number; y: number; width: number; height: number }; // stage coords
  }

  export interface InspectModel {
    enabled: boolean;
    targets: ReadonlyMap<string, InspectTarget>; // nodeId → target, built from spec metadata
    active: InspectTarget | null;                // hovered or keyboard-focused
  }
  ```

  ## Filmstrip Model

  ```typescript
  // apps/studio/client/src/canvas/filmstrip.ts
  export interface FilmstripEntry {
    version: number;          // zero-padded sequential on disk; numeric here
    parentVersion: number | null;
    isHead: boolean;
    createdAt: string;        // ISO 8601 from version provenance
    brief: string;            // provenance brief (excerpted for display)
    tool: string;             // wf_generate | substitution | blueprint
    thumbnailSvgUrl: string;  // versions/:n/svg
  }

  export interface FilmstripModel {
    entries: FilmstripEntry[];   // ordered oldest → newest
    headVersion: number;
    scrubVersion: number | null; // null → stage renders head
    restorePending: boolean;     // restore request in flight
    undoTarget: number | null;   // previous head, offered as inline undo after restore
  }
  ```

  ## Restore Response

  The restore fetcher in api.ts calls
  POST /api/workspaces/:wsId/artifacts/:artId/versions/:n/restore and
  returns `RestoreResponse` (packages/contract http-payloads.ts) — the
  new head's `VersionSummary`. The inline Undo affordance reads the new
  version number from this response; the filmstrip also updates live via
  the normal artifact.version_created event, identical to generation.

  ## Compliance Bar Model

  ```typescript
  // apps/studio/client/src/canvas/compliance.ts
  export type RuleStatus = "pass" | "warn" | "fail";

  export interface ComplianceViolation {
    id: string;
    ruleId: string;
    message: string;
    severity: "warn" | "fail";
    nodeId: string | null;    // stable SVG node ID; null → highlight unavailable
  }

  export interface ComplianceRule {
    ruleId: string;
    name: string;
    status: RuleStatus;
    violations: ComplianceViolation[];
  }

  export interface ComplianceBarModel {
    version: number;                    // version the result belongs to
    overall: RuleStatus | "pending";    // pending until compliance_completed arrives
    rules: ComplianceRule[];
    expandedRuleId: string | null;
  }
  ```

