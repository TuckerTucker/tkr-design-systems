# Capability Spec — chat-panel
# 13-section architectural design
# Layer: ui | Wave: 6

capability: chat-panel
status: planned

context: |
  The chat-panel capability delivers the agentic chat surface of the Studio
  MVP triangle (chat panel + canvas with compliance bar) as a docked panel
  inside the docking-shell. It is a thin client over the verified Wave 4
  protocol: every behavior consumes or produces the WebSocket vocabulary
  defined in _planning/architecture.md — client → server: workspace.attach,
  chat.send, chat.cancel, chip.update; server → client: chat.message_started,
  chat.assistant_delta, chat.tool_started, chat.tool_finished,
  chat.message_completed, chat.error, chips.updated, artifact.version_created,
  auth.status. All message and payload types come from packages/contract;
  nothing is stringly-typed.

  Boundaries are binding per capabilities.yaml: agent reasoning and tool
  routing live server-side in agent-orchestration; panel docking mechanics
  (rails, drag-to-swap, stack, collapse) live in docking-shell. This
  capability renders the conversation: streaming assistant output in an
  aria-live region, a multiline composer that disables with a visible reason,
  the agent's choices as editable decision chips, inline tool progress
  contextual to the message, structured errors in place, artifact references
  that focus the canvas through shared shell state, and transcript restore
  on workspace attach.

problem_statement: |
  The headless protocol (Wave 4) proves the conversational loop, but a
  scripted WebSocket client is not a working surface:
  - There is no place to type a brief; chat.send has no human entry point
  - Streamed assistant output (chat.assistant_delta) has no rendering, no
    live region, and no screen-reader path
  - The agent's system/layout/platform decisions (chips.updated) are
    invisible and uneditable; adjusting one requires re-stating the brief
  - Tool progress and errors exist only as WS events; without inline
    rendering a user cannot tell what is running or what failed and how to
    fix it
  - artifact.version_created has no message-side anchor; the conversation
    and the canvas version it produced are disconnected
  - Keyless operation (auth.status missing) has no in-place guidance — the
    failure would surface as a dead composer or a console-only error,
    violating the UX contract

scope:
  in:
    - ChatPanel as a registered docking-shell panel (content only; docking mechanics are the shell's)
    - Message list with streaming assistant rendering from chat.message_started / chat.assistant_delta / chat.message_completed
    - aria-live region for streamed assistant text and tool progress
    - Multiline composer with submit affordance (Enter to send, Shift+Enter newline) sending chat.send
    - Composer reference intake — incoming LibraryReference payloads from library-panel (drag or explicit send action) render as removable reference chips attached to the draft and ride chat.send as references
    - Disabled-with-reason composer states — agent busy, auth missing/invalid (auth.status → "Add ANTHROPIC_API_KEY to apps/studio/.env" in place)
    - Cancel control during generation sending chat.cancel
    - Decision chips on agent turns from chips.updated — editable selects for system/layout/platform; change sends chip.update and re-runs the affected step
    - Inline tool progress contextual to the message ("generating in Swiss…" from chat.tool_started/chat.tool_finished) — never a toast
    - Structured error display in place from chat.error (what failed, how to fix)
    - Artifact references in messages correlated from artifact.version_created; click focuses that version on the canvas via shared shell state
    - Transcript restore on workspace.attach (messages, tool records, chips, references, errors)
    - Keyboard and screen-reader support — focus management, logical tab order, WCAG AA contrast
    - Component tests (vitest + Testing Library) including accessibility assertions
  out:
    - Agent reasoning, intent routing, and MCP tool invocation (agent-orchestration, server side)
    - Panel docking mechanics — rails, drag-to-swap, stack, collapse, layout persistence (docking-shell)
    - WebSocket connection lifecycle, reconnect/resume, and the shared WS client (docking-shell provides it)
    - Message schema definitions (packages/contract owns them; this capability imports, never declares)
    - Canvas rendering of the focused artifact version (canvas capability consumes the shared shell state)
    - Transcript storage format (workspace-store, server side)
    - claude.ai subscription login — prohibited for embedded SDK apps; API key guidance is the only auth path

dependencies:
  upstream:
    - "docking-shell — panel registry, shared WebSocket client with reconnect/resume, shared shell state (canvas focus), workspace routing"
    - "studio-api — WS event vocabulary (chat.*, chips.updated, artifact.version_created, auth.status) and transcript delivery on workspace.attach"
    - "packages/contract — typed message and payload definitions imported by every chat component (incl. LibraryReference from library.ts, owned by library-panel)"
    - "library-panel — emits LibraryReference payloads into the composer's reference intake (drag or explicit send action)"
    - "agent-orchestration (transitive, server side) — produces the event stream the panel renders"
  downstream:
    - "canvas — receives artifact-version focus through shared shell state when a message reference is activated"
  external:
    - "React 19 + Vite + TypeScript strict (architecture contract)"
    - "vitest + Testing Library for component tests (architecture contract)"

data_contracts: |
  ## Message View Model (derived from packages/contract payload types)

  ```typescript
  // apps/studio/client/src/panels/chat/messageViewModel.ts
  // Reducer state built exclusively from contract WS payloads —
  // ChatMessageStartedPayload, ChatAssistantDeltaPayload,
  // ChatToolStartedPayload, ChatToolFinishedPayload,
  // ChatMessageCompletedPayload, ChatErrorPayload, ChipsUpdatedPayload,
  // ArtifactVersionCreatedPayload, AuthStatusPayload.

  export type MessageRole = "user" | "assistant";

  export interface ToolProgressView {
    toolName: string;                       // e.g. "wf_generate"
    label: string;                          // "generating in Swiss…"
    state: "running" | "finished" | "failed";
  }

  export interface DecisionChipsView {
    system: string;
    layout: string;
    platform: "mobile" | "desktop";
    options: {
      systems: ReadonlyArray<string>;
      layouts: ReadonlyArray<string>;
      platforms: ReadonlyArray<"mobile" | "desktop">;
    };
    editable: boolean;                      // only the latest decision set
    pending: boolean;                       // chip.update in flight
  }

  export interface ArtifactReferenceView {
    artifactId: string;
    version: number;
    label: string;                          // "login-screen v4 — Swiss / mobile"
  }

  export interface StructuredErrorView {
    what: string;                           // what failed
    fix: string;                            // how to fix it, in place
    detail?: string;                        // expandable diagnostic
  }

  export interface ChatMessageView {
    id: string;
    requestId: string;                      // correlation key for deltas, chips, artifacts
    role: MessageRole;
    text: string;                           // user text or accumulated assistant deltas
    streaming: boolean;
    toolProgress: ReadonlyArray<ToolProgressView>;
    chips?: DecisionChipsView;
    artifactRefs: ReadonlyArray<ArtifactReferenceView>;
    error?: StructuredErrorView;
    createdAt: string;                      // ISO 8601
  }

  export type ComposerDisabledReason =
    | { kind: "agent_busy"; message: string }                       // "Agent is working — cancel to send a new message"
    | { kind: "auth_missing"; message: string }                     // "Add ANTHROPIC_API_KEY to apps/studio/.env"
    | { kind: "auth_invalid"; message: string };

  export interface ChatPanelState {
    messages: ReadonlyArray<ChatMessageView>;
    activeRequestId: string | null;         // non-null while streaming
    composerDisabled: ComposerDisabledReason | null;
    draft: string;                          // never lost to state transitions
    draftReferences: ReadonlyArray<LibraryReference>; // library references attached to the draft (imported from @studio/contract — library.ts, owned by library-panel)
  }

  export function reduceChatEvent(
    state: ChatPanelState,
    event: ServerMessage,                   // discriminated union from packages/contract
  ): ChatPanelState;
  ```

  ## Component Props Contract

  ```typescript
  // ChatPanel — panel registry entry point
  export interface ChatPanelProps {
    workspaceId: string;
  }

  // MessageList
  export interface MessageListProps {
    messages: ReadonlyArray<ChatMessageView>;
    onArtifactFocus: (ref: ArtifactReferenceView) => void;  // shared shell state
  }

  // Composer
  // LibraryReference is imported from @studio/contract (library.ts, owned by
  // library-panel). The composer is the receiving side of the seam: it accepts
  // incoming LibraryReference payloads (library-panel drag drop target +
  // programmatic intake for the explicit send action), renders them as
  // removable reference chips attached to the draft, and includes them as
  // `references` in the outgoing chat.send — ChatSendPayload is
  // { text, artifactId?, references?: LibraryReference[] }.
  export interface ComposerProps {
    draft: string;
    references: ReadonlyArray<LibraryReference>; // chips attached to the draft
    onDraftChange: (text: string) => void;
    onReferenceAdd: (ref: LibraryReference) => void;    // drop target + programmatic intake
    onReferenceRemove: (ref: LibraryReference) => void; // chip removal before send
    disabled: ComposerDisabledReason | null; // reason rendered adjacent, in place
    busy: boolean;                           // true → cancel control replaces send
    onSend: (text: string, references: ReadonlyArray<LibraryReference>) => void; // dispatches chat.send with references
    onCancel: () => void;                    // dispatches chat.cancel
  }

  // DecisionChips
  export interface DecisionChipsProps {
    chips: DecisionChipsView;
    onChange: (
      chip: "system" | "layout" | "platform",
      value: string,
    ) => void;                               // dispatches chip.update
  }

  // ToolProgress
  export interface ToolProgressProps {
    progress: ToolProgressView;
  }

  // StructuredError
  export interface StructuredErrorProps {
    error: StructuredErrorView;
  }

  // ArtifactReference
  export interface ArtifactReferenceProps {
    reference: ArtifactReferenceView;
    active: boolean;                         // currently focused on the canvas
    onFocus: (ref: ArtifactReferenceView) => void;
  }
  ```

