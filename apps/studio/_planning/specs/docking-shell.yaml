# Capability Spec — docking-shell
# 13-section architectural design
# Layer: ui | Wave: 5

capability: docking-shell
status: implemented

context: |
  The docking-shell capability is the first UI deliverable (Phase 2,
  Wave 5) of the Studio: the React SPA shell every panel capability
  mounts into. It arrives after the headless phase is verified — the
  studio-api WebSocket/HTTP surface (Wave 4) is the only thing it talks
  to. The shell is a docking system, not a fixed grid: the artifact
  canvas is always center; two rails flank it, each hosting zero or
  more panels. Panels are first-class citizens registered in a panel
  registry — chat and library first, with future panels (compliance
  detail, history, blueprint tree) plugging in without shell changes.

  The shell owns the docking mechanics, workspace routing, the
  WebSocket client, and the persistence plumbing. Panel CONTENTS are
  explicitly out of scope: chat-panel, canvas, and library-panel
  (Wave 6) own what renders inside the slots the shell provides. The
  architecture contract (apps/studio/_planning/architecture.md) is binding:
  React 19 + Vite + TypeScript strict in apps/studio/client, typed messages
  from packages/contract, layout persisted through GET/PUT
  /api/preferences, one WebSocket connection to /ws with workspace
  attachment by message.

problem_statement: |
  The headless server can run brief → generate → refine → compliance
  with no UI, but there is no browser surface at all:
  - No SPA exists in apps/studio/client; nothing consumes the Wave 4 API
  - Without a docking model, panel arrangement would be hard-coded and
    every future panel (compliance detail, history, blueprint tree)
    would require shell surgery
  - Without silent layout persistence, users would re-arrange panels
    every session or be forced into a save action
  - Without URL ↔ workspace routing, workspaces cannot be deep-linked
    or resumed where the user left off
  - Without a reconnect/resume WebSocket client, every network blip
    would orphan the chat stream and hide the failure — or surface it
    as a toast, which the UX philosophy prohibits
  - Without keyboard parity and reduced-motion handling at the shell
    level, every panel operation would be pointer-only and motion-heavy
    by default

scope:
  in:
    - Vite + React 19 + TypeScript strict application scaffold in apps/studio/client (npm workspace member)
    - ShellFrame layout — canvas slot always center, two flanking rails
    - Panel registry (PanelDefinition contract; future panels register without shell changes)
    - Dock state model (placements, stack order, per-rail active tab, collapsed state, rail widths)
    - Drag panel header to the other rail with drop indicators; per-panel settings toggle as fallback
    - Stack/tab behavior when multiple panels share a rail; both-panels-on-one-rail supported
    - Collapse-to-icon-strip per panel with one-click restore
    - Silent layout persistence via GET/PUT /api/preferences (no save action) and hydrate-before-first-paint restore
    - Workspace switcher with URL ↔ active workspace routing and last-workspace restore
    - WebSocket client (single /ws connection, typed envelope, reconnect with capped backoff, re-attach resume)
    - Inline connection state in shell chrome (never a toast); bridge.status and auth.status distribution
    - Keyboard parity for every panel operation (move, collapse, restore, focus, tab activation)
    - Reduced-motion respect for drag and collapse animations
    - Application error boundary surfacing render failures in place
  out:
    - Panel contents — chat rendering, canvas rendering, library browsing (see chat-panel, canvas, library-panel)
    - WebSocket message schema definitions (owned by studio-api in the contract package; the shell contributes UI-specific contract types like LayoutPreference)
    - Preferences storage mechanics (see workspace-store) and endpoint implementation (see studio-api)
    - Agent behavior, artifact lifecycle, compliance computation (server capabilities)
    - The showcase SPA at src/ (untouched, not migrated)
    - Multi-window or detached-panel layouts (future; single window, two rails)

dependencies:
  upstream:
    - "studio-api — GET/PUT /api/preferences, GET /api/workspaces (+ create), /ws WebSocket endpoint with the documented envelope"
    - "packages/contract — typed WS envelopes (workspace.attach, chat.*, chips.updated, artifact.*, bridge.status, auth.status) and HTTP payload types; this capability contributes the src/preferences.ts module (LayoutPreference) to the package already scaffolded in Wave 1"
    - "studio-server — static hosting for the built client bundle"
    - "Architecture contract (apps/studio/_planning/architecture.md) — stack, monorepo layout, envelope, endpoints; binding"
  downstream:
    - "chat-panel — registers in the panel registry, mounts in a rail slot, consumes the WS client subscription API"
    - "canvas — mounts in the always-center slot, consumes artifact events through the WS client"
    - "library-panel — registers in the panel registry, mounts in a rail slot"
    - "Future panels (compliance detail, history, blueprint tree) — register via PanelDefinition with zero shell changes"
  external:
    - "React 19, Vite, TypeScript strict (per architecture contract)"
    - "vitest + Testing Library (client test stack, per architecture contract)"

data_contracts: |
  ## Panel Registry Contract

  ```typescript
  // apps/studio/client/src/shell/types.ts
  import type { ComponentType, LazyExoticComponent } from "react";

  export type RailSide = "left" | "right";

  export interface PanelDefinition {
    id: string;                                   // kebab-case, unique ("chat", "library", future "compliance-detail")
    title: string;                                // panel header and tab label
    icon: ComponentType<{ size?: number }>;       // icon strip entry and tab glyph
    component: LazyExoticComponent<ComponentType>; // panel content, code-split
    defaultPlacement: { rail: RailSide; order: number };
    minWidth: number;                             // px; rail width clamps to the widest hosted panel
  }

  export interface PanelRegistry {
    register(definition: PanelDefinition): void;  // duplicate id is a startup error
    get(id: string): PanelDefinition | undefined;
    list(): readonly PanelDefinition[];
  }
  ```

  ## Rail / Dock Model (runtime state, reducer-owned)

  ```typescript
  export interface PanelPlacement {
    panelId: string;
    rail: RailSide;
    order: number;        // stack position within the rail (tab order)
    collapsed: boolean;   // true → panel lives in the rail's icon strip
  }

  export interface DockState {
    placements: readonly PanelPlacement[];
    activeTab: Record<RailSide, string | null>;   // visible panel when 2+ stack on a rail
    railWidths: Record<RailSide, number>;         // px, clamped to hosted minWidths
  }

  export type DockAction =
    | { type: "move"; panelId: string; rail: RailSide; order?: number }
    | { type: "collapse"; panelId: string }
    | { type: "restore"; panelId: string }
    | { type: "activateTab"; rail: RailSide; panelId: string }
    | { type: "resizeRail"; rail: RailSide; width: number }
    | { type: "hydrate"; layout: LayoutPreference };
  ```

  ## Layout Preference (wire shape, GET/PUT /api/preferences)

  ```typescript
  // apps/studio/packages/contract/src/preferences.ts — owned by docking-shell,
  // contributed to the already-scaffolded contract package (the shell never
  // creates the package). docking-shell is the semantic owner of this shape:
  // workspace-store persists the document opaquely (round-trips it without
  // interpreting fields) and studio-api's GET/PUT /api/preferences uses
  // LayoutPreference directly.
  export interface LayoutPreference {
    schemaVersion: 1;
    placements: PanelPlacement[];
    activeTab: { left: string | null; right: string | null };
    railWidths: { left: number; right: number };
    lastWorkspaceId: string | null;
  }
  ```

  ## WebSocket Client API

  ```typescript
  // Envelope unions come from packages/contract:
  // ClientEnvelope = workspace.attach | chat.send | chat.cancel | chip.update
  // ServerEnvelope = chat.message_started | chat.assistant_delta | chat.tool_started
  //   | chat.tool_finished | chat.message_completed | chat.error | chips.updated
  //   | artifact.version_created | artifact.compliance_completed | bridge.status | auth.status

  export type ConnectionState =
    | "connecting"     // initial connect in flight
    | "open"           // connected and attached
    | "reconnecting"   // dropped; capped exponential backoff in progress
    | "offline";       // backoff at cap; retries continue at the capped interval

  export type Unsubscribe = () => void;

  export interface StudioSocket {
    connect(): void;
    attachWorkspace(workspaceId: string): void;   // sends workspace.attach; re-sent automatically after every reconnect
    send(message: ClientEnvelope): SendResult;    // typed result while disconnected, never a silent drop
    on<T extends ServerEnvelope["type"]>(
      type: T,
      handler: (message: Extract<ServerEnvelope, { type: T }>) => void,
    ): Unsubscribe;
    onConnectionState(handler: (state: ConnectionState) => void): Unsubscribe;
    close(): void;
  }

  export type SendResult =
    | { ok: true }
    | { ok: false; reason: "disconnected"; state: ConnectionState };
  ```

