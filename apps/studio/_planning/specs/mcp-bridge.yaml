# Capability Spec — mcp-bridge
# 13-section architectural design
# Layer: infrastructure | Wave: 2

capability: mcp-bridge
status: implemented

context: |
  The mcp-bridge capability is the studio server's direct-call MCP client
  for the tkr-design-systems MCP server (tools/mcp-server/server.py,
  Python FastMCP over stdio). The studio runs a dual-connection topology
  (decided in architecture.md): the Claude Agent SDK owns its own MCP
  connection for agent-driven tool use (wf_generate, substitution,
  blueprint assembly); this bridge owns a second, independent stdio
  connection serving tool invocations that happen OUTSIDE the agent loop —
  the library endpoints and artifact-pipeline compliance runs. The MCP
  server is stateless per call, so dual connections are safe.

  The bridge wraps exactly six direct-call tools: ds_list_systems,
  ds_load_system, ds_get_rulebook, ds_check_compliance, wf_get_tokens,
  wf_read_component. It is built on the official MCP TypeScript SDK
  (@modelcontextprotocol/sdk) — Client + StdioClientTransport — where the
  transport spawns and owns the server subprocess from the launch command
  declared in repo-root .mcp.json (/usr/local/bin/python3
  tools/mcp-server/server.py, relative path resolved against the
  repo root as cwd). The bridge supervises that subprocess, serializes
  calls over the single transport, enforces per-call timeout and
  cancellation, and translates every failure mode into a typed
  BridgeResult — errors never thrown across the capability seam. Bridge
  state (up, restarting, failed) feeds the studio-server health registry
  and the bridge.status WS event. The bridge is injected into its
  consumers (artifact-pipeline, studio-api) via IoC — never imported as
  a singleton. Per the testing policy, bridge tests run against the REAL
  MCP server; it is never mocked.

problem_statement: |
  Studio's library endpoints and compliance pipeline need MCP tool results
  inside a Node process, but no client exists:
  - The MCP server speaks stdio JSON-RPC; nothing in the studio spawns,
    handshakes with, or supervises it for direct calls
  - The Agent SDK's connection is scoped to the agent loop; library
    browsing and per-version compliance runs happen outside any agent turn
  - A single stdio transport cannot multiplex naive concurrent callers;
    without serialization, interleaved calls corrupt request/response pairing
  - The Python skills return heterogeneous result shapes ({ok, data,
    warnings} envelopes, flat {ok, ...} dicts, string-vs-object error
    lists); consumers need one typed contract
  - A crashed or hung server subprocess must surface as a visible bridge
    state and in-place errors — never as an unhandled exception, a hung
    request, or a console-only failure

scope:
  in:
    - MCP client over stdio via @modelcontextprotocol/sdk (Client + StdioClientTransport)
    - Server subprocess spawn from the .mcp.json launch command (command, args, cwd resolved through studio-server config)
    - Subprocess supervision — crash detection, restart with exponential backoff, restart budget, failed terminal state
    - Call serialization/queueing over the single transport (FIFO, one in-flight call)
    - Per-call timeout (configurable default, per-call override) and AbortSignal cancellation
    - Typed wrappers for exactly six tools — ds_list_systems, ds_load_system, ds_get_rulebook, ds_check_compliance, wf_get_tokens, wf_read_component
    - Error translation (MCP protocol errors, tool-level failures, timeouts, cancellation, bridge-down) into BridgeResult — never thrown across the seam
    - Bridge status reporting (up, restarting, failed) into the studio-server health registry and the bridge.status WS event
    - Result payload handling (SVG source, token vocabularies, normalized specs, raw compliance results — incl. parsing JSON-string rule details into structured form)
    - McpBridge interface + createMcpBridge factory for IoC injection
    - Integration tests against the REAL design-systems MCP server (testing policy — never mocked)
  out:
    - Agent-driven tool calls — wf_generate, wf_build_substitution_request, wf_apply_substitutions, wf_select_layout, wf_assemble_from_blueprint run over the Agent SDK's own MCP connection (see agent-orchestration)
    - Registry mutation tools (ds_register_system, ds_unregister_system, ds_validate_spec) — system-authoring is deferred; not wrapped
    - Deciding which tool to call for an intent (see agent-orchestration)
    - Persisting generation or compliance results (see artifact-pipeline, workspace-store)
    - Caching of library responses (see studio-api library endpoints); the bridge exposes NO registry-change signal — studio-api watches systems/registry.yaml directly for cache invalidation
    - HTTP/WS delivery of bridge data and events (see studio-api)
    - MCP server implementation itself (tools/mcp-server, read-only dependency)

dependencies:
  upstream:
    - "studio-server — configuration (launch command, repo root, timeout/backoff settings), pino logger, health registry, WS event emission seam"
    - "tools/mcp-server/server.py — the MCP server (read-only; tool signatures are the source of truth)"
    - ".mcp.json (repo root) — launch command for the server subprocess (/usr/local/bin/python3 tools/mcp-server/server.py)"
    - "@modelcontextprotocol/sdk — official MCP TypeScript SDK (Client, StdioClientTransport)"
  downstream:
    - "artifact-pipeline — runs ds_check_compliance per artifact version through the injected bridge"
    - "studio-api — library endpoints (systems, tokens, components, rulebooks) proxy through the injected bridge; /api/health reports bridge state; bridge.status pushed over WS"
  external:
    - "Python 3 at /usr/local/bin/python3 with mcp, structlog, and the skill packages importable (existing working setup proven by Claude Code's own .mcp.json usage)"
    - "design-system-skill and wireframe-skill Python packages — produce the result shapes the wrappers type"

data_contracts: |
  ## Typed Result Model (the capability seam — errors never thrown)

  Declared in the contract package (architecture.md module ownership:
  bridge.ts is owned by mcp-bridge; consumers import, never redeclare).
  Translation functions from MCP/skill error shapes into these types are
  bridge-internal in apps/studio/server/src/mcp/errors.ts.

  ```typescript
  // apps/studio/packages/contract/src/bridge.ts (@studio/contract)
  export type BridgeErrorKind =
    | "protocol"     // transport/JSON-RPC failure, isError response, unparseable content
    | "tool"         // tool executed and returned ok: false (skill-level failure)
    | "timeout"      // per-call timeout expired
    | "cancelled"    // caller aborted via AbortSignal
    | "bridge_down"; // bridge failed/stopped, or restart budget exhausted

  export interface BridgeError {
    kind: BridgeErrorKind;
    message: string;
    code?: string;                     // stable skill code when kind === "tool":
                                       // SYSTEM_NOT_FOUND | SPEC_FILE_MISSING |
                                       // SPEC_PARSE_FAILED | SCHEMA_VALIDATION_FAILED |
                                       // REFERENCED_FILE_MISSING | INVALID_PATH |
                                       // RULESET_UNKNOWN | INTERNAL | ...
    detail?: Record<string, unknown>;  // skill error detail passthrough
  }

  export interface BridgeWarning {
    code: string;
    message: string;
    detail: Record<string, unknown>;
  }

  export type BridgeResult<T> =
    | { ok: true; value: T; warnings: BridgeWarning[] }
    | { ok: false; error: BridgeError };
  ```

  ## Bridge Interface (IoC — consumers receive it, never construct it)

  ```typescript
  // apps/studio/server/src/mcp/bridge.ts
  export interface CallOptions {
    timeoutMs?: number;     // overrides the configured default per call
    signal?: AbortSignal;   // cancellation
  }

  export interface McpBridge {
    start(): Promise<void>;
    stop(): Promise<void>;
    status(): BridgeStatus;
    onStatusChange(listener: (status: BridgeStatus) => void): () => void;

    listSystems(opts?: CallOptions): Promise<BridgeResult<SystemDescriptor[]>>;
    loadSystem(
      params: { systemId: string; validate?: boolean },  // → ds_load_system(system_id, validate=True)
      opts?: CallOptions,
    ): Promise<BridgeResult<LoadedSystemSpec>>;
    getRulebook(
      params: { systemId: string },                      // → ds_get_rulebook(system_id)
      opts?: CallOptions,
    ): Promise<BridgeResult<RulebookEntry[]>>;
    checkCompliance(
      params: { systemId: string; artifactPath: string; scope?: "component" | "artifact" },
      opts?: CallOptions,                                // → ds_check_compliance(system_id, artifact_path, scope=None)
    ): Promise<BridgeResult<RawComplianceResult>>;
    getTokens(
      params: { systemId: string },                      // → wf_get_tokens(system_id)
      opts?: CallOptions,
    ): Promise<BridgeResult<AuthoringTokens>>;
    readComponent(
      params: { systemId: string; componentId: string }, // → wf_read_component(system_id, component_id)
      opts?: CallOptions,
    ): Promise<BridgeResult<ComponentRead>>;
    readComponents(
      params: { systemId: string; componentIds: string[] }, // → wf_read_component(system_id, component_ids=[...])
      opts?: CallOptions,
    ): Promise<BridgeResult<ComponentRead[]>>;
  }

  export function createMcpBridge(config: BridgeConfig, logger: Logger): McpBridge;

  export interface BridgeConfig {
    command: string;          // "/usr/local/bin/python3" (from .mcp.json)
    args: string[];           // ["tools/mcp-server/server.py"]
    cwd: string;              // repo root — server.py path in .mcp.json is repo-relative
    defaultTimeoutMs: number;
    restart: { maxAttempts: number; initialDelayMs: number; maxDelayMs: number };
  }
  ```

  ## Tool Payload Types (mirror server.py and skill result shapes exactly)

  ```typescript
  // apps/studio/server/src/mcp/types.ts (bridge-internal — NOT in the contract package)

  // ds_list_systems — Result envelope, data = descriptor list.
  // Unreadable specs degrade to a stub descriptor plus a warning
  // (SPEC_FILE_MISSING / SPEC_PARSE_FAILED) — surfaced via warnings.
  export interface SystemDescriptor {
    id: string;
    name: string;
    tagline: string;
    grammar_family: string | null;
    version: string | null;
    spec_version: string | null;
    status: string;                    // e.g. "draft", "stable"
  }

  // ds_load_system — Result envelope, data = full normalized spec.
  export interface LoadedSystemSpec {
    system: Record<string, unknown>;             // id, name, tagline, version, ...
    tokens: Record<string, unknown>;             // colors, typography, spacing, borders, elevation, ...
    components: unknown;                         // component entries with absolute SVG paths
    layouts?: unknown;                           // layout templates
    rulebook?: RulebookEntry[];
    grammar_extensions?: Record<string, unknown>;
    _meta: { library_root: string; [key: string]: unknown };
    [key: string]: unknown;                      // spec sections are schema-versioned; unknown keys preserved
  }

  // ds_get_rulebook — Result envelope, data = flattened rule list.
  export interface RulebookEntry {
    id: string;
    rule: string;
    rationale: string | null;
    severity: string;
    check_method: string | null;
    check_scope: "component" | "artifact" | "both";
    applies_when: string | null;
    scope: "global" | "component";     // derived: component ⇢ "component", else "global"
    check_implementation: string | null;
  }

  // ds_check_compliance — Result envelope, data = raw result.
  export interface ComplianceRuleResult {
    rule_id: string;
    status: string;                    // pass | fail | advisory (mechanical check outcome)
    detail: Record<string, unknown>;   // structured — the bridge parses the wire's
                                       // JSON-string detail before returning; artifact-pipeline's
                                       // violation-to-node mapper depends on these fields
  }

  // Raw MCP result shape — bridge-internal. The name ComplianceReport belongs
  // exclusively to artifact-pipeline's domain model in @studio/contract (artifact.ts).
  export interface RawComplianceResult {
    system_id: string;
    artifact_path: string;
    scope: string;                     // "component" | "artifact" | "all" (auto-detected when not passed)
    passed: number;
    failed: number;
    advisory: number;
    results: ComplianceRuleResult[];
    ruleset: string | null;            // null when no mechanical ruleset exists for the system
    mechanical_only: boolean;
    note?: string;                     // present when ruleset is null
  }

  // wf_get_tokens — flat dict (NOT Result-enveloped): {ok: true, ...payload}
  // or {ok: false, errors: string[]} on load failure.
  export interface PaletteEntry {
    name: string;
    value: string;
    role: string;
    usage_constraint: string;
  }

  export interface AuthoringTokens {
    system_id: string;
    palette: PaletteEntry[];
    drawing_rules: Record<string, unknown>;  // SVG-ready attribute strings + CSS class block
    typography: Record<string, unknown>;     // type scale formatted for SVG authoring
    layout: Record<string, unknown>;         // spacing/layout constants
  }

  // wf_read_component — single: flat dict {ok: true, ...ComponentRead};
  // batch: {ok: true, components: ComponentRead[]};
  // {ok: false, errors: string[]} on failure.
  export interface ComponentRead {
    component_id: string;              // canonical id after variant resolution ("toggle" → "toggle-default")
    svg_source: string;                // raw SVG text
    viewBox: { w: number; h: number };
    rendering_notes: string | null;
    anatomy: unknown | null;           // anatomy labels from the parent component spec
    tier: string;                      // "primitive" | "composite" | "pattern" | "unknown"
    states: unknown | null;
    constraints: unknown | null;
  }
  ```

  ## Status Contract (shared with the client via packages/contract)

  The bridge contributes the bridge.ts module to the already-scaffolded
  @studio/contract package (skeleton created in Wave 1 by studio-server
  slice 1). mcp-bridge owns this module; BridgeState is canonical here —
  other capabilities import it and handle all five states. The module also
  carries BridgeResult/BridgeError/BridgeWarning (declared above).

  ```typescript
  // apps/studio/packages/contract/src/bridge.ts (continued)
  export type BridgeState = "starting" | "up" | "restarting" | "failed" | "stopped";

  export interface BridgeStatus {
    state: BridgeState;
    restartCount: number;   // restarts since process start
    lastError?: string;     // most recent crash/handshake failure summary
    since: string;          // ISO 8601 timestamp of the current state's start
  }

  // WS event: { type: "bridge.status", payload: BridgeStatus }
  ```

  ## Wire Notes (binding on the implementation)

  - FastMCP serializes each tool's dict return value as JSON text content;
    wrappers parse `content[0].text` into the typed payload. An isError
    response or unparseable content translates to kind "protocol".
  - ds_* tools return the skill Result envelope:
    `{ok: true, data, warnings?}` / `{ok: false, errors: [{code, message, detail}]}`.
    wf_get_tokens and wf_read_component return flat `{ok, ...}` dicts whose
    error lists are plain strings. The server's exception catchall
    (_error_result) also returns `{ok: false, errors: ["<message>"]}` —
    translation handles both object and string error entries.
  - Tool arguments are snake_case on the wire (system_id, artifact_path,
    component_id, component_ids, validate, scope); wrapper params are
    camelCase and mapped at the call site.
  - artifactPath for checkCompliance must be an absolute path — the MCP
    server resolves it against its own process, not the caller's.
  - Each compliance rule's `detail` arrives on the MCP wire as a JSON
    string; the checkCompliance wrapper parses it into
    `Record<string, unknown>` before returning RawComplianceResult —
    artifact-pipeline's violation-to-node mapper depends on the structured
    detail fields. An unparseable detail string translates to kind
    "protocol".

