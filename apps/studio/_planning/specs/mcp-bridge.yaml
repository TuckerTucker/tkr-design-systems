implementation_steps:
  - Declare BridgeResult, BridgeError, BridgeWarning in the contract bridge.ts module (contributed to the already-scaffolded @studio/contract package), then implement translation functions for the skill Result envelope, flat-dict shapes, and string-vs-object error lists (errors.ts, unit-tested first)
  - Define the six payload types from the actual server.py signatures and skill result shapes (types.ts, bridge-internal — incl. RawComplianceResult with rule detail typed Record<string, unknown>)
  - Implement transport.ts — resolve command/args/cwd from studio-server config (mirroring .mcp.json), construct StdioClientTransport, connect Client, pipe stderr to pino
  - Verify the handshake — listTools must include the six direct-call tool names; missing tools fail start() with a configuration error
  - Implement queue.ts — FIFO dispatch, one in-flight call, per-call timeout timer, AbortSignal handling, drain on shutdown/failure
  - Implement tools.ts — six wrappers mapping camelCase params to snake_case arguments, parsing FastMCP JSON text content, unwrapping envelopes through errors.ts, and parsing each compliance rule's JSON-string detail into Record<string, unknown>
  - Implement supervisor.ts — state machine (starting/up/restarting/failed/stopped), transport close/error hooks, exponential backoff with restart budget, queue hold during restarting
  - "Implement bridge.ts — createMcpBridge factory composing transport, supervisor, queue, and tools behind the McpBridge interface (IoC: config + logger injected)"
  - Add BridgeState/BridgeStatus to the contract bridge.ts module and wire onStatusChange into the studio-server health registry and bridge.status WS emission seam
  - Write errors.test.ts unit tests covering every BridgeErrorKind translation path
  - Write bridge.integration.test.ts against the real MCP server — start/stop, all six wrappers happy-path, SYSTEM_NOT_FOUND tool error, timeout, cancellation, serialization order
  - Write supervisor.integration.test.ts — kill the real subprocess mid-session, observe restarting → up, verify in-flight failure and post-restart success, exhaust the budget to reach failed
  - Document BridgeConfig defaults in studio-server config schema (command, args, cwd, defaultTimeoutMs, restart backoff settings)

error_handling: |
  - Spawn failure (python3 missing, server.py path wrong) → start() resolves the bridge into failed with lastError; health reports it; no throw
  - Handshake failure or missing direct-call tools in listTools → failed with a configuration-shaped lastError naming the missing tools
  - Subprocess crash while idle → supervisor logs exit code, transitions to restarting, emits bridge.status, restarts with backoff
  - Subprocess crash with calls in flight → in-flight call resolves {ok: false, kind: "protocol"}; queued calls hold through restarting and replay on up
  - Restart budget exhausted → failed (terminal until explicit restart); held and new calls resolve {ok: false, kind: "bridge_down"}
  - Per-call timeout expired → {ok: false, kind: "timeout"}; the transport is NOT torn down (the MCP server is stateless per call; a late response for a timed-out requestId is discarded)
  - Caller aborts via AbortSignal → queued call removed without dispatch; in-flight call resolves {ok: false, kind: "cancelled"}
  - Tool returns {ok: false, errors: [{code, message, detail}]} → {ok: false, kind: "tool", code, message, detail} (e.g. SYSTEM_NOT_FOUND, INVALID_PATH)
  - Tool returns {ok: false, errors: ["string message"]} (flat wf_* shape or _error_result catchall) → kind "tool", code undefined, message from the first entry, remainder in detail
  - JSON-RPC error response or isError content → kind "protocol" with the MCP error message
  - Unparseable tool content (not valid JSON) → kind "protocol", raw text excerpt in detail
  - Call invoked before start() or after stop() → {ok: false, kind: "bridge_down"} immediately
  - Every failure path logs structured pino (requestId, tool, kind, code) — errors cross the seam as values, never as thrown exceptions

edge_cases: |
  - ds_list_systems with an unreadable registered spec → success with a degraded stub descriptor (name=id, status="draft") plus a SPEC_FILE_MISSING/SPEC_PARSE_FAILED warning — warnings passed through, not flattened into an error
  - ds_check_compliance on a system with no mechanical ruleset → success with ruleset: null, zero counts, and a note string — consumers must branch on ruleset, not on failed === 0
  - ds_check_compliance with a relative artifact path → the server resolves it against its own cwd; the wrapper requires an absolute path and rejects relative input as INVALID_PATH-shaped tool misuse before dispatch
  - wf_read_component with a bare family id ("toggle") → server resolves to the default variant ("toggle-default"); ComponentRead.component_id carries the canonical id, not the requested one
  - wf_read_component batch where one id is unknown → the underlying read raises inside the server and the whole call returns the flat error shape; the wrapper surfaces one tool error (no partial batch)
  - Both componentId and componentIds supplied → wrapper API makes this unrepresentable (separate readComponent/readComponents methods); neither supplied is likewise impossible
  - Large payloads (full LoadedSystemSpec, multi-component batch SVG) → parsed in one buffer; no streaming; studio-api caching keeps repeat cost off the bridge
  - Cancellation racing completion → first settlement wins; a result arriving after abort is discarded, never delivered twice
  - Timeout racing completion → same single-settlement guarantee; late responses matched by requestId and dropped
  - Crash during restarting (server dies again before up) → backoff continues from the next attempt; restartCount increments per attempt
  - stop() while calls are queued → queue drains as bridge_down; subprocess terminated; no orphan python3 process (verified by integration test)
  - Two bridge instances in one process (tests) → safe by design: each owns its own subprocess; the MCP server is stateless per call

integration_points:
  - "studio-server: provides BridgeConfig (command/args/cwd from .mcp.json semantics, timeout and backoff settings), the pino logger, the health registry the bridge registers into, and the WS emission seam for bridge.status"
  - "artifact-pipeline: receives the injected McpBridge and calls checkCompliance(systemId, artifactPath) for every artifact version; branches on BridgeResult and on RawComplianceResult.ruleset === null; consumes the structured rule detail (Record<string, unknown>) in its violation-to-node mapper and projects the raw result into its own ComplianceReport domain model (contract artifact.ts)"
  - "studio-api: receives the injected McpBridge for the library endpoints — /api/library/systems (listSystems), /api/library/:systemId/tokens (getTokens), /api/library/:systemId/components/:componentId (readComponent), rulebook/spec data (getRulebook, loadSystem); caches at the API layer, not in the bridge — the bridge exposes no registry-change signal; studio-api watches systems/registry.yaml directly"
  - "packages/contract: mcp-bridge contributes the bridge.ts module (BridgeResult, BridgeError, BridgeWarning, BridgeState, BridgeStatus, bridge.status event payload) to the already-scaffolded @studio/contract package (skeleton created in Wave 1 by studio-server slice 1); declared once, imported by server and client — never redeclared"
  - "agent-orchestration: NO integration — the Agent SDK owns its own MCP connection; the bridge and the SDK never share a transport"
  - "tools/mcp-server: read-only upstream; tool signatures in server.py are the source of truth for wrapper types"

verification_criteria:
  - start() spawns the real MCP server from the .mcp.json command with cwd = repo root and completes the MCP handshake
  - listTools after handshake contains all six direct-call tool names; start() fails into failed state if any is missing
  - listSystems() returns the registered systems with id, name, tagline, grammar_family, version, spec_version, status fields populated
  - 'loadSystem({ systemId: "swiss" }) returns the normalized spec with tokens, components, rulebook, and _meta.library_root present'
  - getRulebook({ systemId }) returns entries with derived scope ("global" for artifact/both, "component" for component check_scope)
  - checkCompliance on a real generated SVG returns passed/failed/advisory counts and per-rule results whose detail is a structured Record<string, unknown> (parsed from the wire's JSON string, never a raw string); on a system without a mechanical ruleset returns ruleset null with a note
  - getTokens({ systemId }) returns palette entries with name/value/role/usage_constraint and drawing_rules/typography/layout sections
  - 'readComponent({ systemId, componentId: "toggle" }) resolves to the canonical default variant and returns non-empty svg_source with viewBox dimensions'
  - readComponents() returns one ComponentRead per requested id in order
  - 'loadSystem with an unknown system id resolves {ok: false, error.kind: "tool", error.code: "SYSTEM_NOT_FOUND"} — no exception observable by the caller'
  - Two concurrent calls are dispatched serially (FIFO) and both resolve correctly
  - A call with a deliberately small timeoutMs resolves kind "timeout" while the bridge stays up and a subsequent call succeeds
  - Aborting a queued call prevents dispatch; aborting an in-flight call resolves kind "cancelled"
  - Killing the server subprocess mid-session transitions status up → restarting → up, emits bridge.status on each transition, fails in-flight calls as protocol, and replays held calls after recovery
  - Exhausting the restart budget reaches failed; calls resolve bridge_down; /api/health reflects the failed bridge
  - stop() terminates the subprocess (no orphan python3 process remains) and drains pending calls as bridge_down
  - All bridge tests run against the real design-systems MCP server — no mock of the server appears anywhere in the test suite
  - TypeScript strict compilation passes; all exports are named; consumers receive the bridge via injection (no module-level singleton instance exported)

performance: |
  - Single in-flight call by design: throughput is bounded by serialization,
    which is correct for the workload — library reads are user-paced and
    compliance runs are per-version, not bulk. Bulk needs (batch component
    reads) go through readComponents, one MCP call for N components.
  - Per-call timeout default comes from BridgeConfig (a configuration
    value, tuned against real compliance-run behavior in integration
    tests), with per-call override for known-heavier calls like
    checkCompliance on large artifacts.
  - Payload sizes: LoadedSystemSpec and batch ComponentRead responses are
    the largest payloads (full spec + raw SVG text). They are parsed
    in-memory per call; the bridge holds no cache — repeat-read cost is
    absorbed by studio-api's library cache, keeping the bridge stateless.
  - Restart backoff is exponential between configured initial and max
    delays, so a flapping server cannot spin the CPU with spawn loops,
    and a healthy restart returns the bridge to up after a single attempt.
  - Queue depth is logged per call; sustained depth growth is the
    operational signal that a consumer is misusing the bridge for bulk
    work that belongs elsewhere.

security: |
  - Localhost-only, single-user deployment (product decision); the bridge
    adds no network surface — it speaks stdio to a local child process.
  - The launch command is sourced from server configuration mirroring the
    repo's own .mcp.json, never from user input, request payloads, or
    workspace files — no injection path into spawn arguments.
  - The subprocess inherits a minimal environment; ANTHROPIC_API_KEY is
    NOT passed to the bridge's MCP server subprocess (only the Agent SDK
    needs it, on its own connection).
  - artifactPath values originate from workspace-store version directories
    (server-controlled), not from raw client input; the wrapper rejects
    relative paths so the server never resolves paths against an
    unexpected cwd.
  - No secrets appear in tool arguments, results, or logs; pino redaction
    is configured at the studio-server layer and bridge logs carry only
    tool names, ids, paths, and error codes.
  - SVG content returned by the bridge is treated as untrusted data by
    downstream consumers (artifact-pipeline sanitizes before serving);
    the bridge passes it through verbatim and never evaluates it.
  - The MCP server runs with the same user privileges as the studio
    process and writes only to its own temp output directory; the bridge
    never grants it additional capabilities.
