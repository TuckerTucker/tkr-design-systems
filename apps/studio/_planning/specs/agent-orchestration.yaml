# Capability Spec — agent-orchestration
# 13-section architectural design
# Layer: domain | Wave: 3

capability: agent-orchestration
status: implemented

context: |
  The agent-orchestration capability is the conversational core of the
  Studio: it turns chat messages into wireframe artifacts. It is built on
  the Claude Agent SDK (TypeScript, @anthropic-ai/claude-agent-sdk) —
  decided in product.yaml architecture_decisions. The SDK manages the
  model loop and owns its OWN stdio connection to the design-systems MCP
  server (launch command per repo-root .mcp.json); mcp-bridge serves
  direct calls (library, compliance) over a second, independent
  connection. The MCP server is stateless per call, so dual connections
  are safe (architecture.md, binding).

  The agent drives five tools over its connection: wf_generate (brief →
  routing_request → layout_id → full 7-step run emitting SVG +
  spec.yaml), wf_select_layout (layout selection/routing — the agent may
  call it during intent routing to pick a pattern),
  wf_build_substitution_request + wf_apply_substitutions
  (two-pass content substitution with per-system grammar validation),
  and wf_assemble_from_blueprint (agent-authored LayoutBlueprint →
  validated, composited SVG). These signatures come from
  tools/mcp-server/server.py and the wireframe-skill SKILL.md
  (v3.0) — the two-pass flows exist precisely so the calling model
  supplies judgment while the skill stays deterministic.

  UX stance (binding philosophy): anticipate, don't ask. The agent picks
  system, layout archetype, and platform itself and surfaces the choices
  as editable decision chips; changing a chip re-runs the affected step.
  Per-artifact conversation context means "swap the header copy" needs
  no restatement. Everything streams as typed events consumed by
  studio-api (Wave 4), and every turn persists through workspace-store
  repositories (Wave 1).

problem_statement: |
  The Studio has no conversational path from intent to artifact:
  - Generation today happens through CLI skills and raw MCP tool calls;
    there is no agent loop that routes a chat message to the right flow
  - The two-pass flows (substitution, blueprint composition) require a
    judging model in the loop — without orchestration they are unusable
    from a UI
  - No per-artifact conversation context exists; every refinement would
    force the user to restate the brief, system, and platform
  - The agent's parameter choices (system, layout, platform) have no
    surface — asking up front violates the UX philosophy; deciding
    silently removes user control. Editable decision chips need a model
    and re-run semantics
  - No event contract exists for studio-api to stream assistant output,
    tool progress, and artifact production to the client
  - No API key handling exists — resolution, redaction, status
    reporting, and graceful keyless degradation are all unbuilt
  - An in-flight generation cannot be cancelled

scope:
  in:
    - Agent loop on the Claude Agent SDK (TypeScript) — query() per turn, SDK-owned MCP connection to tools/mcp-server configured from studio-server config
    - One AgentSession per workspace (SessionManager registry, lazy create, dispose on close/shutdown)
    - Intent routing — new generation, substitution refinement, blueprint composition, plain conversation (no tools)
    - Generate flow (wf_generate routing_request handling, layout_id selection — directly or via wf_select_layout — full run)
    - Two-pass substitution orchestration (wf_build_substitution_request → agent judgment → wf_apply_substitutions)
    - Compose flow (decomposition request → agent-authored LayoutBlueprint JSON → wf_assemble_from_blueprint, validation-failure recovery)
    - Default selection (system, layout archetype, platform) surfaced as editable decision chips; chip change re-runs the affected step
    - Per-workspace, per-artifact conversation context windows (refinements need no restatement)
    - AgentEvent stream contract (assistant deltas, tool started/finished, chips updated, artifact produced, message lifecycle, errors) in apps/studio/packages/contract/src/agent-events.ts
    - Transcript persistence through workspace-store repositories (messages, tool-call records, chip sets, routing results)
    - ANTHROPIC_API_KEY resolution (process env → apps/studio/.env), injection into the SDK subprocess env, pino redaction, auth status (configured/missing/invalid)
    - Graceful keyless degradation (generation refused with reason + fix in place; nothing crashes)
    - Cancellation (chat.cancel aborts the in-flight SDK query; transcript and artifact state stay consistent)
  out:
    - Direct-call MCP invocations outside the agent loop — ds_list_systems, wf_get_tokens, wf_read_component, ds_check_compliance run over mcp-bridge's connection (see mcp-bridge)
    - Artifact versioning, version graph, and compliance runs (see artifact-pipeline — it ingests this capability's artifact_produced events)
    - WebSocket delivery and message envelopes (see studio-api — it maps AgentEvents onto chat.*, chips.updated, auth.status)
    - Chat rendering and chip UI (see chat-panel)
    - Storage mechanics — file layout, atomic writes (see workspace-store; this capability consumes its repositories)
    - claude.ai subscription login — Anthropic policy prohibits it for embedded SDK apps; ANTHROPIC_API_KEY is the only auth path (decided)
    - Multi-system comparison fan-out (see system-comparison, deferred)
    - MCP server implementation (tools/mcp-server, read-only dependency)

dependencies:
  upstream:
    - "workspace-store — TranscriptRepository and workspace/artifact metadata access (IoC-injected repositories)"
    - "studio-server — configuration (MCP launch command, paths), pino logger factory, health surface"
    - "tools/mcp-server — wf_generate, wf_select_layout, wf_build_substitution_request, wf_apply_substitutions, wf_assemble_from_blueprint over the SDK's own MCP connection (external read-only dependency)"
    - "@anthropic-ai/claude-agent-sdk — query() API, MCP servers via options, streaming events, ANTHROPIC_API_KEY from subprocess env"
    - "@studio/contract (apps/studio/packages/contract) — already-scaffolded shared type package (skeleton created Wave 1 by studio-server slice 1); agent-orchestration contributes the agent-events.ts module"
  downstream:
    - "artifact-pipeline — consumes artifact_produced events (ArtifactSource — paths or text — plus provenance) to create immutable versions and run compliance"
    - "studio-api — consumes the AgentEvent stream and maps it onto the WS envelope (chat.message_started, chat.assistant_delta, chat.tool_started, chat.tool_finished, chat.message_completed, chat.error, chips.updated, auth.status); routes chat.send, chat.cancel, chip.update into sessions"
  external:
    - "Anthropic API — model access via ANTHROPIC_API_KEY (env → apps/studio/.env, gitignored)"
    - "repo-root .mcp.json — canonical launch command for tools/mcp-server"

data_contracts: |
  ## Agent Session API

  ```typescript
  // apps/studio/server/src/agent/session.ts
  export interface AgentSessionOptions {
    workspaceId: string;
    transcripts: TranscriptRepository;   // injected (IoC) from workspace-store
    config: AgentConfig;                 // MCP launch command, model, output staging dir
    auth: AuthState;
    logger: Logger;                      // pino child; ANTHROPIC_API_KEY redacted
  }

  export interface AgentSession {
    readonly workspaceId: string;
    send(request: ChatSendRequest): AsyncIterable<AgentEvent>;
    updateChip(update: ChipUpdate): AsyncIterable<AgentEvent>;
    cancel(requestId: string): Promise<CancelResult>;
    dispose(): Promise<void>;
  }

  export interface ChatSendRequest {
    requestId: string;                   // echoed on every emitted event
    text: string;
    artifactId?: string;                 // explicit refinement target; omitted → active artifact or new
  }

  export type CancelResult =
    | { ok: true; cancelled: true }
    | { ok: true; cancelled: false; reason: "not_running" | "already_completed" };

  export interface SessionManager {
    acquire(workspaceId: string): Promise<AgentSession>;  // lazy create
    release(workspaceId: string): Promise<void>;          // dispose
    disposeAll(): Promise<void>;                          // server shutdown
  }
  ```

  ## Intent Routing Result

  ```typescript
  // apps/studio/packages/contract/src/agent-events.ts
  export type Intent = "generate" | "substitute" | "compose" | "converse";

  export interface RoutingResult {
    intent: Intent;
    rationale: string;                   // why this route, persisted as TranscriptRecord kind "routing_result"
    artifactId: string | null;           // existing artifact targeted; null for new/converse
    defaults: DecisionDefaults | null;   // populated for tool-bearing intents
  }

  export interface DecisionDefaults {
    system: string;                      // registered system id (e.g. "swiss")
    layoutId: string | null;             // pattern id; null while the compose flow assembles
    platform: "mobile" | "desktop";
  }
  ```

  ## Decision Chips Model

  ```typescript
  // apps/studio/packages/contract/src/agent-events.ts
  export type ChipKind = "system" | "layout" | "platform";

  export interface DecisionChip {
    kind: ChipKind;
    value: string;
    options: string[];                   // real vocabularies: registry systems, routing_request patterns, ["mobile","desktop"]
    rerunStep: "generate" | "substitute" | "compose";  // which step a change re-runs
  }

  export interface ChipSet {
    artifactId: string;
    messageId: string;                   // agent turn that produced these chips
    chips: DecisionChip[];
  }

  // Domain shape. The wire payload is ChipUpdatePayload { messageId, kind: ChipKind, value }
  // (studio-api, ws-messages.ts); the studio-api relay resolves artifactId by looking up the
  // ChipSet emitted for that messageId, then hands the session this domain ChipUpdate.
  export interface ChipUpdate {
    requestId: string;
    artifactId: string;
    kind: ChipKind;
    value: string;                       // must be one of the chip's options (validated at the boundary)
  }
  ```

  ## Emitted Event Stream

  ```typescript
  // apps/studio/packages/contract/src/agent-events.ts — agent-orchestration's contributed module in the
  // already-scaffolded @studio/contract package; studio-api maps these onto the WS envelope
  export type AgentEvent =
    | { type: "message_started";   requestId: string; messageId: string }
    | { type: "assistant_delta";   requestId: string; messageId: string; text: string }
    | { type: "tool_started";      requestId: string; toolUseId: string; toolName: AgentToolName; summary: string }
    | { type: "tool_finished";     requestId: string; toolUseId: string; ok: boolean; summary: string }
    | { type: "chips_updated";     requestId: string; chipSet: ChipSet }
    | { type: "artifact_produced"; requestId: string; artifactId: string; source: ArtifactSource; provenance: Provenance }
    | { type: "message_completed"; requestId: string; messageId: string; routing: RoutingResult }
    | { type: "error";             requestId: string; code: AgentErrorCode; message: string; fix: string };

  // ArtifactSource is imported from artifact.ts (owned by artifact-pipeline), never redeclared:
  //   { kind: "paths", svgPath, specPath }   — wf_generate and wf_apply_substitutions emit files to disk
  //   { kind: "text",  svgText, specYaml? }  — wf_assemble_from_blueprint returns SVG text
  // artifact-pipeline ingestion accepts both.

  export type AgentToolName =
    | "wf_generate"
    | "wf_select_layout"
    | "wf_build_substitution_request"
    | "wf_apply_substitutions"
    | "wf_assemble_from_blueprint";

  export interface Provenance {
    brief: string;
    tool: AgentToolName;
    parameters: Record<string, unknown>;     // layout_id, system, platform, substitutions or blueprint
    parentArtifactVersion: number | null;    // null for a brand-new artifact
  }

  export type AgentErrorCode =
    | "auth_missing" | "auth_invalid"
    | "session_busy" | "cancelled"
    | "mcp_unavailable" | "tool_failed"
    | "blueprint_invalid" | "agent_failed";
  ```

  ## Auth State

  ```typescript
  // apps/studio/server/src/agent/auth.ts
  export type AuthStatus = "configured" | "missing" | "invalid";

  export interface AuthState {
    status: AuthStatus;
    source: "env" | "dotenv" | null;     // where the key was found; never the key itself
  }
  ```

