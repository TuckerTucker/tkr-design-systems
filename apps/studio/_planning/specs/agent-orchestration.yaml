implementation_steps:
  - Resolve ANTHROPIC_API_KEY (process env first, then apps/studio/.env) into AuthState; configure pino redaction paths
  - Wire auth status into studio-server health reporting and the auth.status event path
  - Build AgentConfig from studio-server configuration (MCP launch command per repo-root .mcp.json, model, output staging directory)
  - Declare AgentEvent, RoutingResult, chip models, and Provenance in apps/studio/packages/contract/src/agent-events.ts (agent-orchestration's module in the Wave-1-scaffolded @studio/contract package); import ArtifactSource from artifact.ts (artifact-pipeline-owned), never redeclare it
  - Implement SessionManager (per-workspace acquire/release, disposeAll on shutdown)
  - Implement AgentSession.send over query() with the design-systems MCP server in options and the key injected into the subprocess environment
  - Author the routing system prompt (four intents, default-selection rules, chip emission instructions, per-system grammar respect)
  - Implement SDK stream → AgentEvent translation with the ordering guarantee (message_started first, message_completed or error last)
  - 'Implement the generate flow (routing_request → layout_id selection, directly or via wf_select_layout → full run → artifact_produced handing off ArtifactSource { kind: "paths", svgPath, specPath })'
  - Implement the decision-chip model (vocabularies from registry/routing_request/platform set) and chips_updated emission
  - Implement updateChip (chip.update → re-run the affected step with the changed parameter)
  - Implement per-artifact context windows (transcript slices keyed by artifactId, active-artifact tracking, bounded assembly)
  - Implement transcript persistence (messages, tool-call records minus secrets, chip sets, routing results written as TranscriptRecord kind "routing_result") and restore-on-create
  - 'Implement the substitution flow (wf_build_substitution_request → agent judgment substitutions → wf_apply_substitutions; surface unapplied_finds and grammar_warnings; artifact_produced hands off ArtifactSource { kind: "paths" })'
  - 'Implement the compose flow (decomposition request → LayoutBlueprint authoring → wf_assemble_from_blueprint; bounded validation-failure recovery; artifact_produced hands off ArtifactSource { kind: "text", svgText, specYaml? })'
  - Implement cancellation (AbortController into query(), cancelled error event, transcript marked, no partial artifact)
  - Implement keyless degradation (typed auth_missing error with the fix in place; no SDK spawn)
  - Write vitest unit tests (auth resolution, redaction, chip mapping, context assembly) and integration tests against the real design-systems MCP server (generate, refine, compose, cancel, keyless)

error_handling: |
  - Missing API key → chat.send yields a single error event (code auth_missing, message naming ANTHROPIC_API_KEY, fix pointing at env or apps/studio/.env); no SDK process spawns; session stays usable once the key appears
  - Invalid API key → SDK auth failure maps to error code auth_invalid; AuthState flips to invalid and is pushed via auth.status; transcript records the failed turn
  - Second chat.send while a run is in flight → error code session_busy with the active requestId; the in-flight run is unaffected (single in-flight per workspace)
  - wf_generate returns ok:false (unknown system, invalid platform, no patterns) → error code tool_failed carrying the tool's own error messages; the agent surfaces available systems when the tool lists them
  - wf_apply_substitutions returns unapplied_finds → not an error; warnings flow into tool_finished summary and the transcript; artifact still produced
  - Grammar warnings (Revolt case rules, Editorial title case, Terminal snake case) → surfaced alongside the artifact, never silently dropped
  - wf_assemble_from_blueprint returns validation_errors → the agent revises the blueprint and retries (bounded); exhaustion yields error code blueprint_invalid listing the unresolved validation errors
  - MCP connection failure mid-run (server crash, transport close) → error code mcp_unavailable; the SDK connection re-establishes on the next turn; mcp-bridge's independent connection is unaffected
  - SDK/model failure (overloaded, network) → error code agent_failed with the upstream message; partial assistant text persists in the transcript
  - Cancellation → error code cancelled terminates the event stream; no partial artifact version is emitted; the prior head is untouched
  - chip.update with a value outside the chip's options → rejected at the boundary as a typed error before any re-run starts
  - TranscriptRepository write failure → the turn still completes for the client; the persistence failure logs structured and surfaces as a degraded-state warning on health (never a thrown exception across the seam)

edge_cases: |
  - First message in a brand-new workspace is a refinement ("make the header bigger") with no artifact → routed as converse; the agent explains there is nothing to refine yet and invites a brief
  - Plain conversation turn ("what systems are available?") → no tool calls from this capability's flows; the agent answers from context (library browsing is mcp-bridge's surface)
  - Brief names a system explicitly ("a login screen in Terminal") → default selection honors it; the system chip still renders as editable
  - Brief matches no authored pattern → the agent prefers the compose flow over a poor pattern fit; the routing rationale records why
  - routing_request returns zero available patterns and zero components → tool_failed with the gap stated; no silent fallback to the neutral library when a system was requested (explicit system invocation is a contract, per SKILL.md)
  - Chip change on a historical (non-head) turn → re-run uses that turn's context; the result lands as a new artifact_produced event (artifact-pipeline owns version graph semantics)
  - Platform chip change after substitutions were applied → re-run generates at the new platform, then replays the recorded substitutions where finds still match; unapplied finds reported
  - Two artifacts in one workspace → refinement with artifactId targets it explicitly; untargeted refinement goes to the active artifact; contexts never bleed across artifacts
  - Workspace reopened after server restart → session recreated lazily; transcript restore seeds context; the user continues without restating anything
  - Cancel raced with natural completion → CancelResult { cancelled: false, reason: "already_completed" }; the completed events stand
  - Cancel with an unknown requestId → CancelResult { cancelled: false, reason: "not_running" }; never an exception
  - Very long conversation on one artifact → context assembly truncates/summarizes oldest refinement turns; the brief and current defaults always survive truncation
  - apps/studio/.env present but missing the key line → AuthState missing (not invalid); fix message names the expected variable

integration_points:
  - "studio-api: routes chat.send / chat.cancel / chip.update into SessionManager; maps AgentEvents onto chat.message_started, chat.assistant_delta, chat.tool_started, chat.tool_finished, chat.message_completed, chat.error, chips.updated; pushes auth.status. Translation seam for chip.update: the wire payload is ChipUpdatePayload { messageId, kind: ChipKind, value } (ws-messages.ts, studio-api-owned); the relay resolves artifactId by looking up the ChipSet emitted for that messageId, then hands this capability its domain ChipUpdate { requestId, artifactId, kind, value }"
  - "artifact-pipeline: ingests artifact_produced (ArtifactSource — { kind: 'paths', svgPath, specPath } or { kind: 'text', svgText, specYaml? } — plus provenance) to create immutable versions, run ds_check_compliance, and emit artifact.version_created / artifact.compliance_completed"
  - "workspace-store: TranscriptRepository persists messages, tool-call records, chip sets, and routing results (written as TranscriptRecord kind 'routing_result' — included in the workspace-store union); workspace metadata supplies the active artifact"
  - "studio-server: configuration source (MCP launch command, paths), pino logger factory with redaction, /api/health includes auth and session status"
  - "tools/mcp-server: the SDK's own stdio connection drives wf_generate, wf_select_layout, wf_build_substitution_request, wf_apply_substitutions, wf_assemble_from_blueprint (external read-only dependency, never mocked in integration tests)"
  - "mcp-bridge: no runtime coupling — independent connections by design; bridge status never gates the agent loop"
  - "chat-panel (Phase 2): renders the streamed events and editable chips this capability emits; chip edits round-trip through chip.update"

verification_criteria:
  - Plain conversation message streams assistant deltas and completes with intent converse and zero tool calls
  - 'A fresh brief produces an artifact through wf_generate — routing_request handled, layout_id selected by the agent (directly or via wf_select_layout), artifact_produced carries ArtifactSource { kind: "paths", svgPath, specPath } and provenance'
  - Decision chips emitted on the generation turn carry real vocabularies (registry systems, routing_request patterns, mobile/desktop) and the agent never asked the user to choose
  - Changing the platform chip re-runs generation at the new platform and produces a new artifact result; system and layout chips re-run their steps likewise
  - '"Swap the header copy" on an existing artifact routes to the two-pass substitution flow with no brief restatement; substitutions respect grammar caveats; unapplied_finds and grammar_warnings surface'
  - A novel-layout brief routes to the compose flow; the agent-authored LayoutBlueprint assembles via wf_assemble_from_blueprint; an intentionally invalid blueprint recovers through revision
  - Event ordering holds on every turn — message_started first, message_completed or error last, deltas and tool events ordered between
  - Every turn persists through workspace-store; reopening the workspace restores the transcript and a refinement continues in context
  - Refinements to artifact A never alter the context of artifact B in the same workspace
  - With no ANTHROPIC_API_KEY, chat.send returns auth_missing with the fix named; no SDK process spawns; health reports auth missing
  - With an invalid key, the turn fails as auth_invalid and auth status updates to invalid
  - The key never appears in any log line (redaction verified) and never in any workspace file
  - chat.cancel mid-generation terminates the stream with code cancelled, persists the turn as cancelled, produces no partial artifact, and the next turn runs normally
  - Concurrent chat.send on a busy session is rejected as session_busy without disturbing the in-flight run
  - Integration suite runs against the real design-systems MCP server (never mocked) and a real temp workspace directory

performance: |
  - Streaming, not buffering — assistant deltas and tool events forward to the consumer as the SDK yields them; no turn-level buffering before emission
  - artifact_produced hands artifact-pipeline an ArtifactSource — file paths when the tool already wrote to disk (wf_generate, wf_apply_substitutions), in-memory text for wf_assemble_from_blueprint; no double disk round-trip inside the turn
  - Per-artifact context windows are bounded — assembly truncates/summarizes oldest refinement turns so context size does not grow with conversation length
  - One in-flight run per workspace bounds concurrent SDK processes and MCP load; sessions are reused across turns rather than recreated
  - Transcript writes append per turn through workspace-store; persistence never blocks event delivery to the consumer
  - Chip re-runs re-execute only the affected step (one tool flow), not the whole conversation
  - Session disposal releases the SDK subprocess and MCP connection; disposeAll bounds shutdown work to active workspaces

security: |
  - ANTHROPIC_API_KEY resolves from process env then apps/studio/.env (gitignored); it is injected only into the SDK subprocess environment
  - The key is never logged (pino redaction paths cover every agent logger), never serialized into AgentEvents, transcripts, provenance parameters, or any workspace file
  - claude.ai subscription login is prohibited for embedded SDK apps by Anthropic policy — not implemented, not offered as a fallback
  - AuthState exposes status and source only, never key material
  - Single-user, local-only deployment (binding) — no multi-tenant isolation claims; the session boundary is per-workspace context hygiene, not a security boundary
  - Tool-call records persisted to transcripts exclude environment and credentials; parameters are limited to tool inputs (brief, layout_id, substitutions, blueprint)
  - The agent writes artifacts only via MCP tool output_dir staging governed by server config; workspace files are written exclusively through workspace-store repositories
  - Errors cross the capability seam as typed results — no thrown exceptions leaking stack internals to the API surface
  - The MCP subprocess launch command comes from repo-root .mcp.json via server config, not from user input
