  - studio/server/src/config/resolve-config.ts — resolution (defaults → .mcp.json → env overrides) and validation
  - studio/server/src/logging/create-logger.ts — pino factory with redaction and child-logger convention
  - studio/server/src/server/create-server.ts — buildServer factory (Fastify 5 instance, route/plugin registration)
  - studio/server/src/server/lifecycle.ts — start/shutdown, signal handlers, shutdown hooks, fatal capture
  - studio/server/src/health/status-registry.ts — StatusRegistry implementation (provider isolation, per-provider timeout)
  - studio/server/src/health/health-route.ts — GET /api/health handler and HealthResponse assembly
  - studio/server/src/static/client-hosting.ts — @fastify/static registration, SPA fallback, missing-build page
  - studio/server/src/ws/connection-gateway.ts — /ws upgrade, WsConnection wrapper, heartbeat, not-ready envelope
  - studio/server/test/config/resolve-config.test.ts — unit tests for resolution and validation
  - studio/server/test/health/status-registry.test.ts — unit tests for provider isolation and timeout
  - studio/server/test/integration/server-lifecycle.test.ts — real HTTP start/answer/shutdown, hook ordering
  - studio/server/test/integration/health-endpoint.test.ts — stub providers (ok, throwing, hanging, unregistered)
  - studio/server/test/integration/static-hosting.test.ts — asset, SPA fallback, missing dist, /api precedence
  - studio/server/test/integration/ws-gateway.test.ts — real WebSocket connect, not-ready envelope, heartbeat, close 1001
  - studio/package.json — npm-workspaces monorepo root (scaffolded here in Wave 1, slice 1)
  - studio/packages/contract/package.json — @studio/contract package skeleton (package.json + empty src/, scaffolded here in Wave 1; the npm name @studio/contract resolves to the path studio/packages/contract via npm workspaces; each capability contributes its own modules in its own wave)
  - studio/packages/contract/src/health.ts — HealthResponse and StatusReport (canonical, owned by studio-server; imported by the client and scripted clients, never redeclared)
  - .mcp.json — repo-root MCP launch definition (READ-ONLY source for config.mcpLaunch)

implementation_steps:
  - Scaffold the studio/ npm-workspaces monorepo root (studio/package.json), the @studio/contract package skeleton (studio/packages/contract — package.json + empty src/; each capability contributes its own modules in its own wave), and the studio/server package (TypeScript strict, ES modules, vitest)
  - Define StudioConfig, ConfigError, ConfigResult types
  - Implement resolveConfig — defaults, .mcp.json parsing for mcpLaunch (cwd pinned to repo root), env overrides, validation as typed result
  - Unit-test every resolution default, override, and validation failure path
  - Implement createLogger — pino at config.logLevel, redaction paths, child-logger convention
  - Implement StatusRegistry — register/snapshot with provider isolation and per-provider timeout; "unregistered" placeholders
  - Implement buildServer — Fastify 5 with the injected pino instance, requestId generation, route registration
  - Implement lifecycle — start (listen 127.0.0.1, EADDRINUSE messaging), shutdown (idempotent, WS close 1001, reverse-order hooks, deadline force-exit), signal handlers, unhandledRejection/uncaughtException capture
  - Declare HealthResponse and StatusReport in studio/packages/contract/src/health.ts (studio-server-owned contract module), then implement GET /api/health assembling HealthResponse from process info plus the registry snapshot
  - Implement static client hosting — @fastify/static, SPA fallback excluding /api and /ws, missing-build page, cache headers
  - Implement the /ws connection gateway — @fastify/websocket, WsConnection wrapper, heartbeat ping/pong, not-ready error envelope when no handler is registered
  - Write the composition root index.ts wiring config → logger → registry → server → start
  - Write integration tests over real HTTP and WebSocket connections per the testing policy
  - Document env overrides and the run commands in studio/server (package scripts)

error_handling: |
  - Invalid config (missing repo root, unparseable .mcp.json, missing MCP entry
    script, bad port, unknown log level) → process logs every ConfigError with
    field/message/fix and exits non-zero before binding; no partial start
  - .mcp.json missing the tkr-design-systems entry → ConfigError naming the
    expected key and the file path
  - EADDRINUSE on listen → structured error naming the port and the
    STUDIO_PORT override as the fix; exit non-zero
  - Status provider throws → that component reports status "unavailable" with
    the error message as detail; health endpoint still answers 200
  - Status provider hangs → per-provider timeout converts it to "unavailable"
    with a timeout detail; other components unaffected
  - Client dist missing → / serves a plain page naming the build command;
    /api and /ws unaffected; warning logged at startup
  - WS message arrives before studio-api registers a handler → typed
    server.not_ready error envelope sent on the connection; connection stays
    open
  - WS client misses heartbeat pongs → connection terminated; reason logged
    with connectionId
  - Shutdown hook rejects → error logged with the hook name; remaining hooks
    still run; process exits non-zero
  - Shutdown exceeds the deadline → abandoned hooks logged by name; force-exit
    non-zero
  - unhandledRejection / uncaughtException → fatal structured log with stack,
    then graceful shutdown attempt (never a silent crash)

edge_cases: |
  - Second SIGINT during an in-flight shutdown → immediate force-exit (the
    user is insisting); first signal path remains the graceful one
  - shutdown() called twice (signal plus fatal capture racing) → idempotent;
    second call awaits the first
  - Zero status providers registered (Wave 1, before siblings exist) →
    bridge/store/auth all report "unregistered"; overall status derives only
    from registered providers, so the endpoint reports ok with placeholders
  - Hooks registered during shutdown → rejected with a logged warning (the
    teardown set is frozen once shutdown begins)
  - STUDIO_PORT set to a non-numeric or out-of-range value → ConfigError, not
    NaN propagation
  - Repo root resolved but .mcp.json args point at a script that moved →
    validation catches the missing file at startup, not at first bridge spawn
  - SPA fallback requested for a path with a file extension (e.g. /logo.png
    not in dist) → 404, not index.html (only extensionless routes fall back)
  - /api/unknown route → 404 JSON from Fastify, never the SPA fallback
  - WS connection closes mid-heartbeat interval → timers cleared; no orphan
    intervals (asserted in tests via open-handle checks)
  - Client connects to /ws during shutdown → upgrade refused; HTTP requests
    in flight complete before the listener closes
  - index.html absent but dist directory present (partial build) → treated as
    missing build (plain page + warning), not a confusing 404

integration_points:
  - "mcp-bridge: receives config.mcpLaunch (command, args, cwd) to spawn its stdio connection; registers the bridge status provider; registers a shutdown hook to terminate the subprocess"
  - "workspace-store: receives config.workspacesDir; registers the store status provider; registers a shutdown hook to flush pending writes"
  - "agent-orchestration: receives config and a child logger; registers the auth status provider (configured/missing/invalid); the Agent SDK connection reuses config.mcpLaunch"
  - "studio-api: mounts /api routes on StudioServer.app and registers the WsConnectionHandler that owns message semantics over the /ws plumbing"
  - "docking-shell: built client lands in studio/client/dist and is served by the static hosting with SPA fallback"
  - ".mcp.json: read-only source for the MCP launch command; studio-server never writes it"
  - "packages/contract: studio-server scaffolds the @studio/contract package skeleton in Wave 1 and owns its src/health.ts module (HealthResponse, StatusReport); each capability contributes its own modules in its own wave — the server.not_ready error envelope shape lands in studio-api's errors.ts module when studio-api arrives (Wave 4)"

verification_criteria:
  - resolveConfig returns defaults when no env overrides are set; each STUDIO_* override takes effect independently
  - resolveConfig reads command and args from .mcp.json and pins cwd to the repo root
  - Every validation failure produces a ConfigError with field, message, and fix; the process exits non-zero without binding
  - Server listens on 127.0.0.1 only; a connection attempt to a non-loopback interface on the same port fails
  - EADDRINUSE produces the documented error naming STUDIO_PORT and exits non-zero
  - Every HTTP request log carries a requestId; WS lifecycle logs carry a connectionId
  - Logger redacts ANTHROPIC_API_KEY and authorization values (asserted against captured log output)
  - GET /api/health returns process (pid, uptimeSeconds, version) plus bridge/store/auth fields
  - Unregistered components report "unregistered"; a registered ok provider flips its field and the overall status derivation
  - A throwing provider yields "unavailable" for its component only; the endpoint still answers 200
  - A hanging provider is timed out and reported "unavailable"; response latency stays bounded
  - Built client assets are served from clientDistDir; extensionless unknown paths serve index.html; /api and /ws take precedence
  - Missing client build serves the plain instruction page while /api/health still answers
  - A real WebSocket client connects to /ws and receives a server.not_ready envelope for any message before a handler is registered
  - With a registered stub handler, onConnection receives a WsConnection whose send/onMessage round-trips raw strings
  - A client that never answers pings is terminated; the reason is logged with its connectionId
  - SIGTERM closes open WS connections with code 1001, runs shutdown hooks in reverse registration order, and exits 0
  - A rejecting shutdown hook is logged and does not prevent remaining hooks; the process exits non-zero
  - An injected unhandled rejection produces a fatal structured log followed by a shutdown attempt
  - npm test passes with real-seam integration tests (real HTTP, real WebSocket, real temp dist directory) per the testing policy

performance: |
  - Startup (config resolution → listening): < 1 second on a warm Node process
  - GET /api/health: < 50ms with responsive providers; per-provider timeout
    caps worst case at the timeout budget (default 1000ms per provider,
    resolved concurrently)
  - Static asset serving: streamed by @fastify/static; hashed assets carry
    immutable cache headers so repeat loads are browser-cache hits
  - WS heartbeat: one ping per connection per interval (default 30s) —
    negligible for a single-user tool with one or two connections
  - Graceful shutdown: bounded by the hook deadline (default 5000ms total)
    before force-exit
  - Logging: pino JSON to stdout; no synchronous transports in the hot path

security: |
  - Localhost-only binding (127.0.0.1, literal type, no override) is the
    deliberate security boundary for this single-user local tool — the
    server is never reachable from another machine
  - No authentication middleware by decision; anything needing auth semantics
    (the Anthropic API key) lives in agent-orchestration, which only reports
    a status string through the registry
  - ANTHROPIC_API_KEY and authorization values are redacted at the logger
    level; config logging emits paths and the port, never env contents
  - Config validation rejects malformed input before the server binds, so an
    invalid state cannot serve traffic
  - Static hosting is rooted at clientDistDir with path traversal prevented
    by @fastify/static; nothing outside the dist directory is servable
  - The WS gateway forwards raw strings without evaluation; parsing and
    validation happen in studio-api at the boundary
  - studio-server writes nothing to disk (logs go to stdout); the workspaces
    directory is workspace-store's domain
  - TypeScript strict mode and named exports throughout; typed results across
    capability seams, never thrown exceptions
