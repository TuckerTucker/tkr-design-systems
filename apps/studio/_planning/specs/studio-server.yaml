# Capability Spec — studio-server
# 13-section architectural design
# Layer: infrastructure | Wave: 1

capability: studio-server
status: implemented

context: |
  studio-server is the Wave 1 foundation of the Studio product: the single
  Fastify 5 process every other server-side capability mounts into. The
  architecture contract (studio/_planning/architecture.md) fixes the stack —
  Node >= 22, TypeScript strict, ES modules, named exports, Fastify 5 with
  native pino, @fastify/websocket, vitest with real-seam integration tests —
  and the monorepo layout (studio/server/ inside an npm-workspaces root).

  The studio is single-user and local-only by decision: the server binds
  127.0.0.1, there is no authentication layer, and the localhost binding is
  the security boundary. studio-server provides the seams its siblings plug
  into: a typed config object (including the design-systems MCP launch
  command resolved from the repo-root .mcp.json, which mcp-bridge and the
  Agent SDK both consume), a shared pino logger with correlation IDs, a
  StatusRegistry that lets mcp-bridge, workspace-store, and
  agent-orchestration report bridge/store/auth health without studio-server
  importing them, a shutdown-hook registration point for orderly teardown,
  static hosting for the built Vite client, and a WebSocket upgrade gateway
  whose message semantics are deliberately left to studio-api.

problem_statement: |
  Nothing of the Studio server stack exists yet:
  - No process to mount capabilities into; mcp-bridge, workspace-store, and
    studio-api (Waves 2–4) all list studio-server as their dependency
  - No configuration resolution; the MCP launch command lives only in the
    repo-root .mcp.json and the workspace path only in the architecture doc
  - No shared logger; without one, capabilities would each construct pino
    and correlation IDs would not propagate
  - No health surface; bridge/store/auth status would have nowhere to land
  - No host for the built client and no WebSocket acceptance point, so the
    Phase 2 SPA and the Wave 4 protocol have no front door
  - No lifecycle discipline; an unhandled rejection would kill the process
    silently and shutdown would orphan the MCP subprocess

scope:
  in:
    - Monorepo scaffolding — the studio/ npm-workspaces root (studio/package.json) and the @studio/contract package skeleton (studio/packages/contract with package.json + empty src/), delivered in Wave 1 slice 1
    - studio/server package scaffold (TypeScript strict, ES modules, named exports, vitest)
    - Typed config resolution (repo root, MCP launch command from .mcp.json, workspace path, client dist path, port, log level) with env overrides and typed validation errors
    - Fastify 5 bootstrap via buildServer(deps) — dependencies injected, never constructed (IoC)
    - pino structured logging with requestId/connectionId correlation and secret redaction
    - Localhost-only binding (127.0.0.1, not configurable)
    - GET /api/health with process/bridge/store/auth fields backed by a StatusRegistry interface
    - Static hosting of the built client with SPA fallback and missing-build handling
    - WebSocket upgrade acceptance at /ws — connection plumbing only (connectionId, heartbeat, close semantics, injected handler seam)
    - Graceful shutdown (signals, reverse-order shutdown hooks, WS close 1001, deadline force-exit)
    - Unhandled-rejection and uncaught-exception capture with structured fatal logs
  out:
    - MCP protocol communication and subprocess supervision (mcp-bridge owns the connection; studio-server only resolves the launch command)
    - WebSocket message schemas, routing, and session semantics (studio-api)
    - HTTP API routes beyond /api/health (studio-api)
    - Workspace data persistence and the workspaces directory contents (workspace-store; studio-server only resolves the path)
    - Agent loop, API key usage, and auth-status computation (agent-orchestration supplies the auth status value via the registry)
    - Authentication middleware or multi-user support (localhost binding is the boundary by decision)
    - The client build itself (docking-shell; studio-server only serves the output)

dependencies:
  upstream:
    - "Architecture contract (studio/_planning/architecture.md) — stack, layout, routes, envelope, logging, testing policy"
    - "Repo-root .mcp.json — source of truth for the design-systems MCP launch command (command + args, repo-root-relative)"
    - "Node >= 22, Fastify 5, @fastify/websocket, @fastify/static, pino, vitest"
  downstream:
    - "mcp-bridge — consumes config.mcpLaunch, the shared logger, the StatusRegistry (bridge status), and a shutdown hook"
    - "workspace-store — consumes config.workspacesDir, the shared logger, the StatusRegistry (store status), and a shutdown hook"
    - "agent-orchestration — consumes config and logger; registers the auth status provider"
    - "studio-api — mounts routes on the Fastify instance and registers the WsConnectionHandler"
    - "docking-shell — its build output is served from config.clientDistDir"
  external:
    - "design-systems/mcp-server (Python) — referenced by the launch command only; never spawned by studio-server"
    - "studio/.env (gitignored) — environment file the composition root loads before config resolution"

data_contracts: |
  ## Config Contract

  ```typescript
  // studio/server/src/config/types.ts
  export interface McpLaunchConfig {
    command: string;   // e.g. "/usr/local/bin/python3" (from .mcp.json)
    args: string[];    // e.g. ["design-systems/mcp-server/server.py"]
    cwd: string;       // repo root — args are repo-root-relative
  }

  export type LogLevel = "fatal" | "error" | "warn" | "info" | "debug" | "trace";

  export interface StudioConfig {
    repoRoot: string;        // absolute path to the tkr-design-systems checkout
    mcpLaunch: McpLaunchConfig;
    workspacesDir: string;   // default <repoRoot>/studio/workspaces
    clientDistDir: string;   // default <repoRoot>/studio/client/dist
    port: number;            // default 4400; STUDIO_PORT override
    host: "127.0.0.1";       // literal type — binding is not configurable
    logLevel: LogLevel;      // default "info"; STUDIO_LOG_LEVEL override
  }

  export interface ConfigError {
    field: string;     // e.g. "mcpLaunch"
    message: string;   // what is wrong
    fix: string;       // how to fix it, in place
  }

  export type ConfigResult =
    | { ok: true; config: StudioConfig }
    | { ok: false; errors: ConfigError[] };

  export function resolveConfig(env: NodeJS.ProcessEnv): ConfigResult;
  ```

  ## Health Contract (canonical types in the shared contract package)

  ```typescript
  // studio/packages/contract/src/health.ts — owned by studio-server.
  // The canonical home for HealthResponse and StatusReport, so the client
  // and scripted clients import them from the contract package instead of
  // redeclaring server-internal shapes.
  export interface StatusReport {
    status: string;    // e.g. "ok" | "up" | "restarting" | "failed" |
                       //      "configured" | "missing" | "invalid" |
                       //      "unregistered" | "unavailable"
    detail?: string;   // human-readable context, shown in place
  }

  export interface HealthResponse {
    status: "ok" | "degraded";
    process: { pid: number; uptimeSeconds: number; version: string };
    bridge: StatusReport;   // supplied by mcp-bridge
    store: StatusReport;    // supplied by workspace-store
    auth: StatusReport;     // supplied by agent-orchestration
  }
  ```

  ## Status Registry Contract (server-internal; health values supplied by other capabilities)

  ```typescript
  // studio/server/src/health/status-registry.ts
  import type { StatusReport } from "@studio/contract";

  export type StatusComponent = "bridge" | "store" | "auth";

  export interface StatusRegistry {
    register(component: StatusComponent, provider: () => Promise<StatusReport>): void;
    snapshot(): Promise<Record<StatusComponent, StatusReport>>;
  }
  ```

  ## Server Lifecycle Contract

  ```typescript
  // studio/server/src/server/create-server.ts
  export interface ServerDependencies {
    config: StudioConfig;
    logger: Logger;                        // pino instance from createLogger(config)
    statusRegistry: StatusRegistry;
    connectionHandler?: WsConnectionHandler; // studio-api registers later
  }

  export interface StudioServer {
    app: FastifyInstance;
    start(): Promise<void>;                          // listen on host:port
    shutdown(reason: string): Promise<void>;         // idempotent
    registerShutdownHook(name: string, hook: () => Promise<void>): void;
  }

  export function buildServer(deps: ServerDependencies): StudioServer;
  ```

  ## WebSocket Plumbing Contract (semantics belong to studio-api)

  ```typescript
  // studio/server/src/ws/connection-gateway.ts
  export interface WsConnection {
    connectionId: string;                    // UUID, bound into logs
    send(raw: string): void;
    close(code: number, reason: string): void;
    onMessage(listener: (raw: string) => void): void;
    onClose(listener: (code: number, reason: string) => void): void;
  }

  export interface WsConnectionHandler {
    onConnection(connection: WsConnection): void;
  }
  ```

