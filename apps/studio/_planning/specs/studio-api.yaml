# Capability Spec — studio-api
# 13-section architectural design
# Layer: api | Wave: 4

capability: studio-api
status: implemented

context: |
  studio-api is the protocol surface between the studio server and any
  client — the headless-first Phase 1 deliverable. It sits on top of
  studio-server (Fastify 5 process, /ws upgrade handling, localhost-only
  binding), agent-orchestration (the Claude Agent SDK loop and its event
  stream), artifact-pipeline (versioning and compliance events), and
  workspace-store (plain-file persistence). mcp-bridge supplies the
  direct-call MCP tool set the library endpoints proxy.

  The architecture contract (apps/studio/_planning/architecture.md) is binding:
  the HTTP route table under /api, the single /ws endpoint with
  message-based workspace attachment, the ClientEnvelope/ServerEnvelope
  split ({ type, requestId, payload }, seq on server→client only), the
  four client→server message types, and the eleven server→client event
  types are reproduced here exactly. Every message and payload type is
  declared once in the @studio/contract package (npm name @studio/contract
  ↔ filesystem path apps/studio/packages/contract, resolved via npm workspaces)
  and imported by both server and client — no stringly-typed messages.

  Single-user, local-only by decision: no authentication, no
  multi-tenancy, server bound to localhost. Business logic lives below
  this capability — studio-api validates, routes, relays, and shapes
  payloads; agent-orchestration and artifact-pipeline do the work.

problem_statement: |
  Waves 1–3 produce a working server stack with no way in:
  - The agent loop, artifact pipeline, and stores are only reachable
    programmatically inside the process; no client can drive them
  - No shared message contract exists; without one, server and future
    client would drift into stringly-typed, mutually inconsistent shapes
  - Chat streaming has no delivery channel; agent events die in-process
  - A dropped connection mid-generation would lose the stream with no
    way to resume; reconnect semantics must exist before any UI does
  - Library data (systems, tokens, components, layouts) is only
    reachable through MCP tool calls; clients need cached HTTP access
  - Nothing rejects invalid input before domain code; malformed requests
    would surface as deep, unactionable failures
  - The headless-first strategy requires the full conversational loop —
    brief → generate → refine → compliance — to be provable by a
    scripted client with no UI; without this capability Phase 1 has no
    exit criterion

scope:
  in:
    - Shared contract modules contributed to @studio/contract (package skeleton scaffolded in Wave 1 by studio-server slice 1) — envelope.ts (ClientEnvelope/ServerEnvelope), ws-messages.ts, http-payloads.ts, errors.ts: every WS message, every HTTP payload, structured error type, domain literal unions
    - WebSocket session management on /ws — workspace.attach binding, per-workspace event journal with monotonic seq, reconnect with resume (missed-event replay or state re-sync)
    - Chat streaming relay — chat.send/chat.cancel/chip.update into agent-orchestration; assistant deltas, tool progress, chips, and artifact events out as contract envelopes
    - HTTP endpoints per the architecture route table — workspaces CRUD, artifact metadata/SVG/spec/compliance serving, POST /api/workspaces/:wsId/artifacts/:artId/versions/:n/restore (restore-as-new-head, delegated to artifact-pipeline), preferences get/put
    - Library endpoints proxying mcp-bridge (ds_list_systems, wf_get_tokens, wf_read_component, layouts from loaded specs) with caching, invalidated by watching systems/registry.yaml directly via fs.watch (path from studio-server config)
    - Input validation at the boundary — every HTTP body/param and WS message validated against the contract before domain code; invalid states rejected with structured errors (what failed, how to fix)
    - Typed-result error seam — domain failures mapped to HTTP status + ApiError / chat.error, never thrown across the boundary
    - Integration tests over real HTTP/WS per the testing policy, including the headless conversational loop (Phase 1 exit criterion)
  out:
    - Business logic — intent routing, tool selection, blueprint authoring (agent-orchestration); versioning, compliance runs, violation mapping (artifact-pipeline)
    - Authentication and multi-user concerns — single-user local tool by decision; a future capability if ever hosted
    - MCP protocol communication and subprocess supervision (mcp-bridge)
    - Storage mechanics and file layout (workspace-store)
    - Process lifecycle, /api/health route, WS upgrade/heartbeat/close mechanics, static hosting (studio-server) — HealthResponse lives in contract module health.ts owned by studio-server; studio-api only references it
    - UI rendering of any kind (docking-shell, chat-panel, canvas, library-panel)
    - Export formats and rasterization (export-surface, deferred)

dependencies:
  upstream:
    - "studio-server — Fastify instance, /ws upgrade handling, config, pino logger, localhost binding"
    - "agent-orchestration — agent loop entry point and event stream (assistant tokens, tool progress, decision chips, errors), cancellation, chip re-run"
    - "artifact-pipeline — artifact/version/compliance read models and event emissions (version created, compliance completed)"
    - "workspace-store — workspace CRUD, transcript reads for re-sync, artifact version content (SVG, spec, compliance), preference store"
    - "mcp-bridge — typed direct-call wrappers (ds_list_systems, ds_load_system, wf_get_tokens, wf_read_component) and bridge status for library endpoints"
    - "Architecture contract (apps/studio/_planning/architecture.md) — binding route table, envelope, and event vocabulary"
  downstream:
    - "docking-shell — WebSocket client with reconnect/resume, preferences endpoints, contract types"
    - "chat-panel — chat message vocabulary, decision chips, streaming events"
    - "canvas — artifact SVG/metadata/compliance endpoints, artifact events"
    - "library-panel — library endpoints and payload types"
    - "export-surface (deferred) — artifact serving endpoints as its read path"
  external:
    - "Fastify 5 + @fastify/websocket (server framework, decided in architecture)"
    - "yaml package — spec.yaml parsing for the /spec endpoint (never hand-rolled)"
    - "vitest — integration test runner"
    - "tools/mcp-server — real MCP server exercised (via mcp-bridge) in integration tests; never mocked"

data_contracts: |
  All types live in apps/studio/packages/contract/src and are the single
  declaration imported by server and client. Names below are the
  contract; the WS type strings reproduce architecture.md exactly.
  Per the contract ownership table in architecture.md, studio-api owns
  envelope.ts, ws-messages.ts, http-payloads.ts, and errors.ts; types
  owned by other capabilities (BridgeState, HealthResponse, the domain
  ComplianceReport, LayoutPreference, LibraryReference, ChipUpdate) are
  imported, never redeclared.

  ## Envelope

  Two envelope types per architecture.md — client code cannot emit a
  sequence number by construction:

  ```typescript
  // packages/contract/src/envelope.ts
  export interface ClientEnvelope<TType extends string, TPayload> {
    type: TType;
    /** uuid — echoed back on the server's responses when applicable */
    requestId?: string;
    payload: TPayload;
  }

  export interface ServerEnvelope<TType extends string, TPayload> {
    type: TType;
    /** uuid — echoes the client request when applicable */
    requestId?: string;
    /** monotonic per-workspace sequence for reconnect-with-resume */
    seq: number;
    payload: TPayload;
  }
  ```

  ## Client → server messages

  ```typescript
  // packages/contract/src/ws-messages.ts
  import type { LibraryReference } from "./library.js"; // owned by library-panel

  export interface WorkspaceAttachPayload {
    workspaceId: string;
    /** last seq the client saw; omit for first attach / full re-sync */
    lastEventSeq?: number;
  }

  export interface ChatSendPayload {
    text: string;
    /** scope the turn to an artifact's conversation context */
    artifactId?: string;
    /** library references attached by the composer; the agent receives
        them as grounding */
    references?: LibraryReference[];
  }

  export interface ChatCancelPayload {
    messageId: string;
  }

  export type ChipKind = "system" | "layout" | "platform";

  export interface ChipUpdatePayload {
    messageId: string;
    kind: ChipKind;
    value: string;
  }

  export type ClientMessage =
    | ClientEnvelope<"workspace.attach", WorkspaceAttachPayload>
    | ClientEnvelope<"chat.send", ChatSendPayload>
    | ClientEnvelope<"chat.cancel", ChatCancelPayload>
    | ClientEnvelope<"chip.update", ChipUpdatePayload>;
  ```

  chip.update carries no artifactId on the wire. The chat-relay performs
  a named translation step — chip-update resolution: it resolves the
  artifactId by looking up the ChipSet previously emitted for that
  messageId (every ChipSet carries { artifactId, messageId }), then hands
  agent-orchestration its domain ChipUpdate
  { requestId, artifactId, kind, value }. The field is named kind on
  both sides.

  ## Server → client messages

  ```typescript
  export interface MessageStartedPayload {
    messageId: string;
    workspaceId: string;
    artifactId?: string;
  }

  export interface AssistantDeltaPayload {
    messageId: string;
    delta: string;
  }

  export interface ToolStartedPayload {
    messageId: string;
    toolCallId: string;
    tool: string;            // e.g. "wf_generate"
    summary: string;         // human-readable, e.g. "generating in Swiss…"
  }

  export interface ToolFinishedPayload {
    messageId: string;
    toolCallId: string;
    tool: string;
    status: "ok" | "error";
    detail?: string;
  }

  export interface ArtifactRef {
    artifactId: string;
    version: number;
  }

  export interface MessageCompletedPayload {
    messageId: string;
    artifactRefs: ArtifactRef[];
    cancelled: boolean;
  }

  export interface ChatErrorPayload {
    messageId?: string;      // absent for protocol-level rejections
    error: ApiError;
  }

  // DecisionChip and ChipKind are imported from agent-events.ts (owned by
  // agent-orchestration): { kind: ChipKind, value, options, rerunStep } —
  // never redeclared here.

  export interface ChipsUpdatedPayload {
    messageId: string;
    chips: DecisionChip[];
  }

  export interface VersionCreatedPayload {
    artifactId: string;
    version: VersionSummary;
  }

  export interface ComplianceCompletedPayload {
    artifactId: string;
    version: number;
    compliance: ComplianceResponse;
  }

  // BridgeState is owned by mcp-bridge (contract module bridge.ts):
  // "starting" | "up" | "restarting" | "failed" | "stopped" — studio-api
  // imports it; consumers handle all five states.
  import type { BridgeState } from "./bridge.js";
  export interface BridgeStatusPayload {
    state: BridgeState;
    detail?: string;
  }

  export type AuthState = "configured" | "missing" | "invalid";
  export interface AuthStatusPayload {
    state: AuthState;
    /** how to fix, e.g. "set ANTHROPIC_API_KEY in apps/studio/.env" */
    fix?: string;
  }

  export type ServerMessage =
    | ServerEnvelope<"chat.message_started", MessageStartedPayload>
    | ServerEnvelope<"chat.assistant_delta", AssistantDeltaPayload>
    | ServerEnvelope<"chat.tool_started", ToolStartedPayload>
    | ServerEnvelope<"chat.tool_finished", ToolFinishedPayload>
    | ServerEnvelope<"chat.message_completed", MessageCompletedPayload>
    | ServerEnvelope<"chat.error", ChatErrorPayload>
    | ServerEnvelope<"chips.updated", ChipsUpdatedPayload>
    | ServerEnvelope<"artifact.version_created", VersionCreatedPayload>
    | ServerEnvelope<"artifact.compliance_completed", ComplianceCompletedPayload>
    | ServerEnvelope<"bridge.status", BridgeStatusPayload>
    | ServerEnvelope<"auth.status", AuthStatusPayload>;
  ```

  ## Structured errors (HTTP and WS share one shape)

  ```typescript
  // packages/contract/src/errors.ts
  export interface ApiError {
    code: string;       // machine-readable, e.g. "workspace_not_found"
    message: string;    // what failed
    fix: string;        // how to fix it, in place
    field?: string;     // offending input field when applicable
  }

  export interface ErrorResponse {
    error: ApiError;
  }
  ```

  ## Key HTTP payloads

  ```typescript
  // packages/contract/src/http-payloads.ts
  // HealthResponse (GET /api/health) lives in health.ts, owned by
  // studio-server — studio-api references it, never redeclares it.
  export type Platform = "mobile" | "desktop";

  export interface WorkspaceSummary {
    id: string;              // kebab-case slug
    name: string;
    created: string;         // ISO 8601
    updated: string;
    activeArtifactId?: string;
  }

  export interface WorkspaceCreateRequest {
    name?: string;           // auto-named when omitted
  }

  export interface WorkspaceSettings {
    defaultSystem?: string;
    defaultPlatform?: Platform;
  }

  export interface WorkspacePatchRequest {
    name?: string;
    settings?: WorkspaceSettings;
  }

  export interface ArtifactSummary {
    id: string;
    name: string;
    system: string;
    platform: Platform;
    headVersion: number;
  }

  export interface ArtifactDetail extends ArtifactSummary {
    versions: VersionSummary[];
  }

  export type ComplianceStatus = "pass" | "warn" | "fail";

  export interface VersionSummary {
    number: number;          // matches the zero-padded directory, as int
    parent?: number;
    brief: string;
    tool: string;            // wf_generate | wf_apply_substitutions | wf_assemble_from_blueprint
    parameters: Record<string, unknown>;
    created: string;
    complianceStatus?: ComplianceStatus;
  }

  /** POST …/versions/:n/restore — the new head's VersionSummary (the
      canvas needs the new version number for its inline Undo) */
  export type RestoreResponse = VersionSummary;

  export interface RuleResult {
    ruleId: string;
    status: ComplianceStatus;
    message?: string;
    nodeIds: string[];       // SVG node references for highlighting
  }

  /** HTTP/WS projection of artifact-pipeline's domain ComplianceReport
      (artifact.ts): violation nodeIds are resolved via the pipeline's
      violation-to-node mapping before serving */
  export interface ComplianceResponse {
    status: ComplianceStatus;
    rules: RuleResult[];
  }

  // GET/PUT /api/preferences uses LayoutPreference imported from
  // preferences.ts (owned by docking-shell) — the single preferences
  // shape on the wire and on disk; no studio-api preferences type.
  import type { LayoutPreference } from "./preferences.js";

  export interface LibrarySystem {
    id: string;
    name: string;
    tagline?: string;
    status: string;
  }

  export interface TokenSetResponse {
    systemId: string;
    tokens: Record<string, unknown>;   // shape as returned by wf_get_tokens
  }

  export interface ComponentIndexEntry {
    id: string;
    name: string;
    variants: string[];
  }

  export interface ComponentDetail extends ComponentIndexEntry {
    svg: string;
  }

  export interface LayoutTemplate {
    id: string;
    name: string;
    archetype: string;
    platforms: Platform[];
  }
  ```

  ## Non-JSON responses

  - GET …/versions/:n/svg returns raw SVG with Content-Type
    image/svg+xml (not a JSON wrapper); stable node IDs preserved
  - GET …/versions/:n/spec returns the parsed wireframe.spec.yaml as
    application/json (yaml package on the server side)

  ## Restore

  - POST /api/workspaces/:wsId/artifacts/:artId/versions/:n/restore
    (undo semantics) delegates to artifact-pipeline's restore-as-new-head
    and returns RestoreResponse — the new head's VersionSummary; the
    restore emits artifact.version_created through the normal pipeline
    path, identical to generation

