implementation_steps:
  - Contribute studio-api's protocol modules (envelope.ts, ws-messages.ts, http-payloads.ts, errors.ts) to @studio/contract — the package skeleton is scaffolded in Wave 1 by studio-server slice 1 (strict tsconfig, ES modules, named exports, zero runtime dependencies)
  - Define ClientEnvelope (no seq) and ServerEnvelope (seq) with requestId echo
  - Define client→server payloads and the ClientMessage union (workspace.attach, chat.send with optional LibraryReference[] from library.ts, chat.cancel, chip.update with kind field)
  - Define server→client payloads and the ServerMessage union (all eleven event types from architecture.md); import BridgeState from bridge.ts (mcp-bridge)
  - Define ApiError/ErrorResponse and the error-code literal union
  - Define HTTP payload types (workspaces, artifacts, versions, RestoreResponse, ComplianceResponse, library); import HealthResponse from health.ts and LayoutPreference from preferences.ts rather than redeclaring
  - Add type-level tests asserting the unions cover the architecture message list exactly
  - Build validation schemas in apps/studio/server/src/api/validation.ts derived from the contract (bodies, params, WS messages)
  - Build the typed-result → HTTP status/ApiError mapper in apps/studio/server/src/api/errors.ts
  - Mount the API plugin on the studio-server Fastify instance
  - Implement the WS connection registry and workspace.attach handling with pino correlation
  - Implement the per-workspace event journal (monotonic seq, bounded retention) and seq stamping
  - Implement resume replay (lastEventSeq inside window) and state re-sync (outside window or no cursor) via existing event types
  - Implement the chat relay — chat.send into agent-orchestration, event mapping to contract envelopes, requestId echo
  - Implement chat.cancel (turn always closes) and chip-update resolution — look up the ChipSet emitted for the messageId, resolve artifactId, hand agent-orchestration the domain ChipUpdate { requestId, artifactId, kind, value }
  - Implement artifact event relay (artifact.version_created, artifact.compliance_completed) and bridge/auth status pushes
  - Enforce single in-flight turn per workspace with structured busy rejection
  - Implement workspaces CRUD routes against workspace-store (auto-naming, soft-delete)
  - Implement artifact routes (metadata, version list, raw SVG, spec-as-JSON, compliance as ComplianceResponse)
  - Implement the restore route (POST …/versions/:n/restore) delegating to artifact-pipeline's restore-as-new-head, returning RestoreResponse; artifact.version_created flows through the normal pipeline path
  - Implement preferences get/put routes (LayoutPreference shape from preferences.ts)
  - Implement library routes over mcp-bridge with the response cache, invalidated by an fs.watch on systems/registry.yaml (path from studio-server config)
  - Write the integration test suite over real HTTP/WS (real store temp dir, real MCP server) — sessions, relay, CRUD, serving, library, validation matrix
  - Write the headless conversational loop test: attach → brief → generation stream → refinement → compliance fetch → version lineage assertions
  - Write reconnect-resume, cancellation, and keyless-mode integration tests

error_handling: |
  - Malformed JSON or unknown WS message type → chat.error envelope with
    requestId echo (when parseable), code "invalid_message", message
    naming what failed, fix naming the expected shape; connection stays open
  - workspace.attach for unknown workspace → chat.error with code
    "workspace_not_found" and fix listing GET /api/workspaces
  - chat.send before any attach → chat.error "not_attached" with the fix
    (send workspace.attach first)
  - chat.send while a turn is in flight → chat.error "turn_in_progress"
    with the fix (cancel or wait for chat.message_completed)
  - Agent failure mid-turn → chat.error carrying the agent's typed failure;
    the turn closes (no dangling message_started)
  - chat.send with auth missing/invalid → chat.error "auth_missing" /
    "auth_invalid" with the documented fix (ANTHROPIC_API_KEY via
    environment or apps/studio/.env); auth.status pushed alongside
  - HTTP validation failure → 400 ErrorResponse with code, message, fix,
    and the offending field; domain code never runs
  - Unknown workspace/artifact/version on HTTP → 404 ErrorResponse with a
    discovery fix (the listing endpoint to call)
  - Library request with bridge down and cache cold → 503 ErrorResponse
    "bridge_unavailable" referencing bridge.status; warm cache entries
    still served
  - Store failure (disk error) → 500 ErrorResponse with code
    "store_failure"; internals logged via pino, never sent to the client
  - Domain results cross the seam as typed results; any uncaught exception
    in a handler is a bug — caught by the studio-server error boundary,
    logged, and returned as a generic 500 ErrorResponse without internals
  - WS send failure to a dead socket → connection reaped; journal retained
    for resume

edge_cases: |
  - Reconnect with lastEventSeq exactly at the journal head → empty replay,
    no duplicates, stream continues live
  - Reconnect with lastEventSeq older than the journal window → full state
    re-sync (transcript as completed chat events, artifact heads,
    bridge/auth status); client treats it as authoritative replacement
  - Reconnect while a turn is still streaming → replay catches up, then
    live deltas continue under the same messageId
  - Attach to workspace B while attached to A → A's binding released
    first; events for A stop, B's state syncs
  - Two connections attached to the same workspace (two tabs) → both
    receive the event stream; the single in-flight turn rule applies
    workspace-wide
  - chat.cancel after the turn already completed → no-op; chat.error
    "turn_not_active" with requestId echo (nothing to undo)
  - chip.update naming a messageId with no chips → chat.error
    "chips_not_found" with fix
  - DELETE on an already soft-deleted workspace → 404 (soft-deleted
    workspaces are invisible to the API; recovery is a store-level
    operation)
  - PATCH rename to an empty string → 400 validation failure (field:
    name) before the store is touched
  - Version param "0007" vs 7 → route accepts the integer form; slugs and
    version numbers validated by shape before any path resolution
  - Artifact with a single version → versions/:n/spec and /compliance work
    for n=1; parent absent in VersionSummary
  - Compliance not yet completed for a fresh version → /compliance returns
    404 "compliance_pending" with the fix (await
    artifact.compliance_completed); the WS event announces readiness
  - Registry change while a library request is in flight → in-flight
    response completes from the pre-flush snapshot; next request
    repopulates
  - GET /api/library/:systemId/components for a system with zero authored
    components → 200 with an empty index, not an error
  - PUT /api/preferences with unknown panelIds → accepted and persisted
    (forward compatibility for future panels); shape still validated
  - Keyless mode (no ANTHROPIC_API_KEY) → all HTTP endpoints and WS attach
    work; only chat.send is rejected, with the fix shown in place

integration_points:
  - "agent-orchestration: chat relay invokes the agent loop and subscribes to its event stream; cancellation and chip re-run forwarded; auth status consumed"
  - "artifact-pipeline: version/compliance read models served over HTTP (compliance as ComplianceResponse, nodeIds resolved via the violation-to-node mapping); restore route delegates to restore-as-new-head; version-created and compliance-completed events relayed to attached clients"
  - "workspace-store: workspaces CRUD, transcript reads for re-sync, artifact version content (SVG/spec/compliance files), preferences persistence"
  - "mcp-bridge: library endpoints call ds_list_systems, ds_load_system, wf_get_tokens, wf_read_component; bridge status drives bridge.status pushes and 503 degradation"
  - "studio-server: API mounted as a Fastify plugin; WS upgrade, heartbeat, localhost binding, /api/health route, and the error boundary owned there"
  - "packages/contract: imported by apps/studio/server and (Phase 2) apps/studio/client; the only message/payload declaration point"
  - "docking-shell / chat-panel / canvas / library-panel (Phase 2): consume this protocol unchanged — the headless verification is their contract guarantee"

verification_criteria:
  - packages/contract compiles under TypeScript strict; named exports only; zero runtime dependencies
  - ClientMessage and ServerMessage unions contain exactly the architecture.md message types — type-level test fails on any extra or missing member
  - A scripted WebSocket client completes the full headless conversational loop with no UI — attach → brief via chat.send → chat.message_started, chat.assistant_delta stream, chat.tool_started/finished, chips.updated, artifact.version_created, artifact.compliance_completed, chat.message_completed → follow-up refinement chat.send (two-pass substitution) without restating the brief → new version with parent link → SVG, spec, and compliance fetched over HTTP (Phase 1 exit criterion)
  - workspace.attach binds the connection; events for that workspace arrive with monotonic seq
  - Reconnect with lastEventSeq inside the journal window replays exactly the missed events — none lost, none duplicated (asserted by dropping the socket mid-stream)
  - Reconnect outside the window re-syncs full state using only existing event types
  - chat.cancel mid-generation closes the turn (message_completed with cancelled true, or chat.error) — never silence
  - Second chat.send during an in-flight turn is rejected with code turn_in_progress
  - chip.update re-runs the affected step and yields chips.updated plus a new artifact version
  - Workspaces CRUD works over real HTTP — create (auto-named when name omitted), list, read, rename, soft-delete; deleted workspaces return 404
  - Artifact endpoints serve metadata with full version lineage, raw SVG as image/svg+xml with stable node IDs, spec.yaml as JSON, and the ComplianceResponse
  - POST …/versions/:n/restore creates a new head via artifact-pipeline's restore-as-new-head, returns RestoreResponse (the new head's VersionSummary), and emits artifact.version_created through the normal pipeline path — observed by an attached WS client
  - Preferences round-trip through GET/PUT (LayoutPreference shape) and persist across server restart
  - Library endpoints return systems, tokens, component index, component SVG, and layouts matching the registered design systems
  - Repeated library request is served from cache (asserted by bridge call count); registry change invalidates and the next request repopulates
  - With the bridge down, cached library entries still serve; cold requests return 503 with a structured error
  - Every malformed input in the validation matrix (bad body, bad slug, unknown WS type, out-of-range version) is rejected with ApiError carrying code, message, fix, and field — before any domain code runs
  - No stack trace or internal path ever appears in a client-facing error body
  - Keyless mode: library, artifact serving, and attach all work; chat.send fails with the auth fix in place
  - All integration tests run against a real server instance, a real temp-directory store, and the real design-systems MCP server — no mocks at the seams

performance: |
  - WS event relay adds no buffering beyond the journal append — assistant
    deltas are forwarded as they arrive from the agent stream, target
    < 10ms added latency per envelope
  - Event journal is in-memory with bounded retention (configurable cap
    per workspace, oldest-evicted); memory stays flat across long sessions
  - Resume replay streams from the journal without blocking live events;
    re-sync reads transcript and artifact heads once
  - Library cache turns repeat token/component reads into in-memory hits —
    target < 5ms server-side; only cold requests pay bridge round-trips
  - SVG serving streams file content (no full-buffer JSON wrapping);
    spec parsing uses the yaml package once per request, cacheable later
    if profiling justifies it
  - Validation schemas are compiled once at startup, not per request
  - Single-user local deployment: concurrency target is a handful of
    connections (multiple tabs), not horizontal scale — correctness of
    the journal and turn-serialization over throughput

security: |
  - Single-user, local-only by decision: server binds localhost; no
    authentication or session tokens by design — the boundary is the
    machine, not a login
  - ANTHROPIC_API_KEY never crosses this API: not in any payload, any
    error body, or any log line (pino redaction configured upstream);
    auth.status carries state and fix text only
  - Path-traversal hardening: wsId/artId validated as kebab-case slugs
    and version as a bounded integer before any store call; client input
    is never concatenated into filesystem paths — the store resolves
    paths from validated identifiers
  - SVG served as prepared by artifact-pipeline (sanitized, stable node
    IDs); the API sets explicit Content-Type and does not transform content
  - Structured errors expose what failed and how to fix it — never stack
    traces, internal paths, or dependency internals
  - WS origin checking is unnecessary for localhost-only binding but the
    upgrade path rejects non-local origins as defense in depth
  - Library endpoints are read-only proxies; no MCP tool with write or
    registration semantics (ds_register_system, ds_unregister_system) is
    exposed over HTTP
  - Validation rejects unknown fields on write payloads (workspaces,
    preferences) so the store never persists unvetted shapes
