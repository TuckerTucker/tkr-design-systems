# Slices — library-panel
# Layer: ui | Wave: 6

capability: library-panel

slices:

  # ── system-switcher ─────────────────────────────────────────────

  - title: "Library panel scaffold and system switcher"
    number: 1
    layer: ui
    delivers:
      - "LibraryPanel registered in the docking-shell panel registry (swappable, stackable, collapsible like every panel)"
      - "System switcher fed by GET /api/library/systems (id, name, tagline, grammar_family, version, spec_version, status)"
      - "Status rendering (registered vs. draft badge; draft systems selectable)"
      - "Active-system context — selection scopes all panel sections to one system"
      - "Last-viewed system persisted silently via the preferences endpoints"
      - "Library data cache keyed by system id with fetched-at metadata (CachedLibraryData envelope)"
      - "Staleness handling — bridge.status events flip cached payloads to stale; indicator rendered in place, browsing continues on cached data"
      - "Inline loading and error states (what failed, how to fix — no toasts, no console-only errors)"
      - "Keyboard parity (switcher operable by keyboard, focus management on system change)"
    depends_on: []
    story_ids:
      - designer-switches-design-systems
      - designer-browses-with-bridge-down

  # ── token-browser ───────────────────────────────────────────────

  - title: "Token browser with real-size specimens"
    number: 2
    layer: ui
    delivers:
      - "Token data from GET /api/library/:systemId/tokens (wf_get_tokens: palette, drawing_rules, typography, layout)"
      - "Palette swatches — color chip, name, hex value, role, usage_constraint per entry; click-to-copy hex with inline confirmation"
      - "Type-scale specimens rendered at real px sizes in the system's structural font stack, labeled with size and role"
      - "Case and tracking rules displayed alongside the specimens they govern"
      - "Spacing-grid visualization (grid_unit, allowed_steps as proportional bars; page margins, component_gap, section_gap labeled)"
      - "Border-radius examples drawn for radius_default / radius_inputs / radius_chrome (including radius 0 systems)"
      - "Elevation rendering — borders-only systems draw stroke_border / stroke_border_strong rules; other strategies (e.g. Swiss typographic) render the elevation_note"
      - "Collapsible sections with persisted expand/collapse state (progressive disclosure)"
      - "WCAG AA labels and contrast on swatches and specimens"
    depends_on: [1]
    story_ids:
      - designer-browses-system-tokens

  # ── component-gallery ───────────────────────────────────────────

  - title: "Component gallery with progressive SVG loading"
    number: 3
    layer: ui
    delivers:
      - "Component index from GET /api/library/:systemId/components (id, anatomy, tier, constraints, variants)"
      - "Gallery grid of component cards grouped/badged by tier, one scrollable surface (no pagination)"
      - "Progressive loading — per-card SVG fetch via GET /api/library/:systemId/components/:componentId triggered by IntersectionObserver, non-blocking placeholders"
      - "Native inline SVG rendering scaled from the component viewBox (no rasterization)"
      - "Variant toggle per multi-variant component — swaps the rendered SVG in place, selection retained per card"
      - "Details on demand — rendering_notes, anatomy, states, constraints revealed per card, hidden by default"
      - "Per-card fetch failure rendered inline on that card; remaining cards unaffected"
      - "Keyboard and screen-reader support (focusable cards, keyboard-operable variant toggles, accessible SVG names)"
    depends_on: [1]
    story_ids:
      - designer-explores-component-gallery

  # ── layout-browser ──────────────────────────────────────────────

  - title: "Layout-template browser"
    number: 4
    layer: ui
    delivers:
      - "Layout template list from GET /api/library/:systemId/layouts (template id, description, layout SVG)"
      - "Thumbnail grid rendering each template's real layout SVG scaled down (native SVG)"
      - "Template id and spec description shown with each thumbnail"
      - "Progressive thumbnail loading reusing the gallery's scroll-triggered mechanism"
      - "In-panel expanded preview on activation (click or keyboard; no modal navigation away)"
      - "Per-template load failure rendered inline on that thumbnail"
    depends_on: [1, 3]
    story_ids:
      - designer-browses-layout-templates

  # ── search-and-chat-reference ───────────────────────────────────

  - title: "Library search and filter"
    number: 5
    layer: ui
    delivers:
      - "Single search field scoped to the active system, filtering live as the user types"
      - "Client-side matching over the cached index (no network per keystroke)"
      - "Component matching (component id, variant ids, anatomy labels, rendering notes)"
      - "Token matching (palette names, hex values, roles)"
      - "Filtered sections with per-section match counts; non-matches removed, sections never silently vanish"
      - "Empty result state in place with one-click clear-filter affordance"
      - "Keyboard flow (focus search, arrow into results, Escape clears)"
    depends_on: [2, 3]
    story_ids:
      - designer-filters-library-content

  - title: "Reference-into-chat"
    number: 6
    layer: ui
    delivers:
      - "LibraryReference discriminated union (component | token | layout) as the typed reference payload — declared in @studio/contract (packages/contract/src/library.ts, owned by library-panel)"
      - "Drag-to-chat from gallery cards, palette swatches, and layout thumbnails with a typed drag payload"
      - "Explicit send-to-chat action on every referenceable item (keyboard-reachable parity for drag)"
      - "Composer integration — reference lands as a removable chip via the composer's reference intake and rides the next chat.send as ChatSendPayload's references field to ground the agent's next step"
      - "Collapsed-chat handling — reference restores/indicates the chat panel, never silently dropped"
      - "Reference metadata (system id, component/variant or token path or template id, human label) sufficient for the agent to resolve the exact artifact"
    depends_on: [2, 3, 4]
    story_ids:
      - designer-references-component-into-chat
