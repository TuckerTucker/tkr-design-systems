# Slices — studio-server
# Layer: infrastructure | Wave: 1

capability: studio-server

slices:

  # ── config-resolution ───────────────────────────────────────────

  - title: "Typed config resolution from repo, .mcp.json, and env"
    number: 1
    layer: infrastructure
    delivers:
      - "apps/studio/package.json — npm-workspaces monorepo root, scaffolded here in Wave 1"
      - "@studio/contract package skeleton — apps/studio/packages/contract with package.json + empty src/ (the npm name @studio/contract resolves to apps/studio/packages/contract via npm workspaces); each capability contributes its own modules in its own wave"
      - "apps/studio/server workspace package (package.json, tsconfig strict, ES modules, vitest)"
      - "StudioConfig type (repoRoot, mcpLaunch, workspacesDir, clientDistDir, port, host, logLevel)"
      - "resolveConfig() — defaults, then <repoRoot>/.mcp.json for the MCP launch command, then env overrides (STUDIO_REPO_ROOT, STUDIO_WORKSPACES_DIR, STUDIO_CLIENT_DIST, STUDIO_PORT, STUDIO_LOG_LEVEL)"
      - "MCP launch parsing — mcpServers[\"tkr-design-systems\"].command + args from .mcp.json, cwd pinned to repo root (args are repo-root-relative)"
      - "host fixed to 127.0.0.1 (literal type, no override path)"
      - "Typed validation result — { ok: true, config } | { ok: false, errors }, each error with field, message, fix"
      - "Validation rules (repo root exists, .mcp.json parses, MCP entry script exists, port 1024–65535 integer, known pino level)"
      - "Unit tests for defaults, each env override, and every validation failure path"
    depends_on: []
    story_ids:
      - developer-resolves-config-with-env-overrides

  # ── server-bootstrap-and-lifecycle + structured-logging ─────────

  - title: "Fastify 5 bootstrap, pino logging, and process lifecycle"
    number: 2
    layer: infrastructure
    delivers:
      - "createLogger(config) — pino instance at config.logLevel with redaction paths (ANTHROPIC_API_KEY, authorization)"
      - "buildServer(deps) factory — Fastify 5 instance from injected config, logger, status registry, optional WS handler (IoC; no globals)"
      - "StudioServer interface (app, start, shutdown, registerShutdownHook)"
      - "Listen on 127.0.0.1:config.port only; EADDRINUSE exits non-zero with the STUDIO_PORT fix in the error"
      - "requestId per HTTP request (UUID) bound into request logs; child-logger convention for capability components"
      - "SIGINT/SIGTERM → graceful shutdown exactly once (second signal force-exits)"
      - "Shutdown sequence — stop accepting, run hooks in reverse registration order, flush logs, exit 0; hook deadline force-exits non-zero"
      - "unhandledRejection/uncaughtException capture — structured fatal log, then shutdown attempt"
      - "Composition root index.ts (config → logger → registry → server → start)"
      - "Integration tests over real HTTP (server starts, answers, shuts down cleanly, hooks run in order)"
    depends_on: [1]
    story_ids:
      - developer-starts-and-stops-studio-server
      - developer-traces-request-with-correlation-id

  # ── health-and-readiness ────────────────────────────────────────

  - title: "Health endpoint with pluggable status registry"
    number: 3
    layer: infrastructure
    delivers:
      - "StatusRegistry interface (register(component, provider), snapshot()) injected into buildServer"
      - "HealthResponse and StatusReport declared in apps/studio/packages/contract/src/health.ts (canonical, owned by studio-server; client and scripted clients import them, never redeclare)"
      - "GET /api/health → { status, process, bridge, store, auth }"
      - "process field (pid, uptimeSeconds, version) owned by studio-server"
      - "bridge/store/auth resolved through registered providers; \"unregistered\" placeholder when no provider exists yet"
      - "Overall status derivation (ok when all registered providers report ok/configured; degraded otherwise)"
      - "Provider isolation — a throwing provider degrades only its component (status \"unavailable\" with detail); endpoint always answers"
      - "Per-provider timeout so a hanging provider cannot stall the response"
      - "HTTP 200 for both ok and degraded (readiness in the body)"
      - "Integration tests with stub providers (ok, throwing, hanging, unregistered)"
    depends_on: [2]
    story_ids:
      - scripted-client-checks-health-readiness

  # ── client-hosting-and-ws-upgrade ───────────────────────────────

  - title: "Static hosting of the built client"
    number: 4
    layer: infrastructure
    delivers:
      - "Static serving of clientDistDir at / (@fastify/static)"
      - "SPA fallback — unknown non-/api, non-/ws GET paths serve index.html"
      - "/api and /ws precedence over the static fallback"
      - "Missing-build handling — / serves a plain page naming the client build command; /api and /ws unaffected"
      - "Asset cache headers (immutable for hashed assets, no-cache for index.html)"
      - "Integration tests (asset served, SPA fallback, missing dist, /api precedence)"
    depends_on: [2]
    story_ids:
      - user-loads-built-client

  - title: "WebSocket upgrade plumbing at /ws"
    number: 5
    layer: infrastructure
    delivers:
      - "@fastify/websocket registration with single endpoint /ws"
      - "WsConnection abstraction (connectionId, send, close, onMessage, onClose) decoupling consumers from the ws library"
      - "Injected WsConnectionHandler seam — studio-api later registers the handler that owns message semantics"
      - "No-handler behavior — connection accepted; inbound messages answered with a typed server.not_ready error envelope"
      - "Heartbeat — interval ping, missed-pong termination with logged reason"
      - "Close semantics — client close logged with code; shutdown closes all connections with code 1001 before hooks run"
      - "connectionId bound into all connection lifecycle logs"
      - "Integration tests over a real WebSocket client (connect, not-ready envelope, heartbeat termination, shutdown close code)"
    depends_on: [2]
    story_ids:
      - scripted-client-opens-websocket-connection
