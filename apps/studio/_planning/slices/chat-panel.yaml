# Slices — chat-panel
# Layer: ui | Wave: 6

capability: chat-panel

slices:

  # ── transcript-and-accessibility ────────────────────────────────

  - title: "Chat panel scaffold and transcript restore"
    number: 1
    layer: ui
    delivers:
      - "ChatPanel registered in the docking-shell panel registry (right rail default)"
      - "Message list rendering user and assistant turns in transcript order"
      - "Message view model derived from packages/contract types (ChatMessageView reducer over WS payloads)"
      - "Transcript restore on workspace.attach (messages, tool-call records, chips, artifact references, errors)"
      - "Scroll restored to latest message; composer focused after restore"
      - "Empty state for a fresh workspace (invites the first brief, no blank void)"
      - "Draft and scroll position preserved across panel collapse/restore"
    depends_on: []
    story_ids:
      - designer-resumes-conversation-on-workspace-open

  # ── message-stream ──────────────────────────────────────────────

  - title: "Streaming assistant rendering with aria-live region"
    number: 2
    layer: ui
    delivers:
      - "chat.message_started opens a streaming assistant message keyed by requestId"
      - "chat.assistant_delta deltas appended to the active message without re-rendering the full list"
      - "chat.message_completed closes the streaming message and persists final view state"
      - "aria-live=polite region announcing streamed text without focus theft"
      - "Auto-scroll pinned to bottom during streaming; user scroll-up suspends pinning"
      - "Streaming indicator on the active message (visually distinct, reduced-motion respected)"
    depends_on: [1]
    story_ids:
      - designer-watches-assistant-stream

  # ── composer ────────────────────────────────────────────────────

  - title: "Composer with disabled-with-reason, auth guidance, and cancel"
    number: 3
    layer: ui
    delivers:
      - "Multiline auto-grow composer (Enter to send, Shift+Enter for newline)"
      - "chat.send dispatch with optimistic user-message append (rolled back in place on send failure)"
      - "Disabled-with-reason while the agent is busy (reason text adjacent to the input, not a tooltip-only state)"
      - "Disabled-with-reason on auth.status missing/invalid — in-place guidance: 'Add ANTHROPIC_API_KEY to apps/studio/.env'"
      - "Re-enable on auth.status configured, chat.message_completed, and chat.error"
      - "Cancel control replacing submit during generation, sending chat.cancel"
      - "Draft text preserved across every busy/disabled transition"
      - "Library reference intake — incoming LibraryReference payloads (library-panel drag or explicit send action) render as removable chips on the draft and ride chat.send as references (ChatSendPayload)"
    depends_on: [1, 2]
    story_ids:
      - designer-sends-brief-from-composer
      - designer-sees-missing-key-guidance
      - designer-cancels-generation

  # ── message-stream (tool progress + errors) ─────────────────────

  - title: "Inline tool progress and structured error display"
    number: 4
    layer: ui
    delivers:
      - "chat.tool_started renders an inline progress marker inside the owning message ('generating in Swiss…')"
      - "chat.tool_finished resolves the marker to a completed state (tool name, outcome)"
      - "Human-readable progress labels derived from tool name and parameters (wf_generate, substitution, blueprint assembly)"
      - "chat.error renders a structured error block in place on the failed turn — what failed, how to fix"
      - "No toasts and no console-only errors anywhere in the chat surface"
      - "Progress and error blocks persisted in the view model so transcript restore reproduces them"
    depends_on: [2, 3]
    story_ids:
      - designer-watches-assistant-stream
      - designer-recovers-from-generation-error

  # ── decision-chips ──────────────────────────────────────────────

  - title: "Decision chips with re-run on change"
    number: 5
    layer: ui
    delivers:
      - "Chip row on agent turns from chips.updated (system, layout, platform)"
      - "Editable selects populated from the option lists in the chips.updated payload"
      - "chip.update sent on change; affected step re-runs and streams as normal chat events"
      - "Chips disabled-with-reason while a re-run is in flight (no double-fire)"
      - "Historical turns render chips read-only; only the latest decision set is editable"
      - "Visible label + aria-label per chip ('Design system', 'Layout', 'Platform')"
    depends_on: [2, 3]
    story_ids:
      - designer-edits-decision-chip

  # ── artifact-references ─────────────────────────────────────────

  - title: "Artifact references with canvas focus"
    number: 6
    layer: ui
    delivers:
      - "artifact.version_created correlated to the producing message via requestId"
      - "Inline artifact reference affordance (artifact name, version number, system/platform summary)"
      - "Click/Enter focuses that version on the canvas via shared shell state (no navigation, conversation stays visible)"
      - "Active-version indication when the referenced version is currently on the canvas"
      - "References persisted in the transcript and clickable after restore"
      - "Multiple references per message supported"
    depends_on: [2, 4]
    story_ids:
      - designer-focuses-artifact-from-message

  # ── transcript-and-accessibility (keyboard + SR pass) ───────────

  - title: "Keyboard and screen-reader pass (WCAG AA)"
    number: 7
    layer: ui
    delivers:
      - "Logical tab order — messages, chip selects, artifact references, composer, send/cancel"
      - "Focus management (focus returns to composer after send and cancel; no focus theft during streaming)"
      - "Screen-reader labelling for every interactive element (composer, send, cancel, chips, references)"
      - "aria-live announcements verified for streamed text, tool progress, and structured errors"
      - "WCAG AA color contrast on all chat surfaces including disabled-with-reason states"
      - "Reduced-motion preference respected for streaming indicators"
      - "axe/Testing Library accessibility assertions wired into the vitest suite"
    depends_on: [1, 2, 3, 4, 5, 6]
    story_ids:
      - keyboard-user-operates-chat-panel
